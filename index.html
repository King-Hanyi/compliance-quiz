护公共安全的目的"], "answer": "D", "explanation": "", "id": "s9"}, {"type": "single", "question": "下列选项违反收集个人信息的最小必要原则的是?(  )", "options": ["A.甲使用一款导航App导航，该App要求甲输入出发地和目的地并要求打开手机的位置权限。", "B.乙使用一款导航App,该App还包含了网约车功能，但要求用户提供电话号码、支付方式才能使用网约车功能。", "C.丙使用一款外卖App,该App要求丙提供个人的收货地址、联系方式、支付方式和位置权限。", "D.丁使用一款购物App,该App要求丁提供个人的收货地址、联系方式和支付方式。"], "answer": "C", "explanation": "C要位置权限无意义，属于非必须的个人信息。", "id": "s10"}, {"type": "single", "question": "以下哪种情况可以向第三方提供收集到的敏感个人信息?(  )", "options": ["A.经过处理无法识别特定个人且不能复原", "B.向个人详细说明向第三方提供个人信息的用途和范围", "C.收集个人信息前已经通过一揽子授权的方式取得了个人的同意", "D.第三方承诺不对外泄露提供的敏感个人信息"], "answer": "A", "explanation": "BCD均错误。B没有征得个人的单独同意，C同样，D承诺没有意义，必须征得个人单独同意，除非是法律规定的例外情况。", "id": "s11"}, {"type": "single", "question": "在处理下列哪种个人信息时，应当制定专门的个人信息处理规则?", "options": ["A.敏感个人信息", "B.不满十四周岁未成年人个人信息", "C.关键信息基础设施收集的个人信息", "D.向境外提供的个人信息"], "answer": "B", "explanation": "根据《个人信息保护法》第三十一条“个人信息处理者处理不满十四周岁未成年人个人信息的，应当制定专门的个人信息处理规则。”,B选项正确，当选；A、C、D均未要求必须制定专门的处理规则，都不当选。", "id": "s12"}, {"type": "single", "question": "个人信息主体请求注销账户，注销过程如需进行身份核验，要求个人信息主体再次提供的个人信息类型应：", "options": ["A.要求和注册时提供的个人信息类型一样多", "B.不多于注册、使用等服务环节收集的个人信息类型", "C.根据实际情况，由个人信息处理者确定提供的个人信息类型", "D.至少包括联系方式和身份证号码"], "answer": "B", "explanation": "《GB/T35273—2020个人信息安全规范》8.5个人信息主体注销账户对个人信息控制者的要求包括：\na)通过注册账户提供产品或服务的个人信息控制者，应向个人信息主体提供注销账户的方法，且方法简便易操作；\nb)受理注销账户请求后，需要人工处理的，应在承诺时限内(不超过15个工作日)完成核查和处理；\nc)注销过程如需进行身份核验，要求个人信息主体再次提供的个人信息类型不应多于注册、使用等服务环节收集的个人信息类型；\nd)注销过程不应设置不合理的条件或提出额外要求增加个人信息主体义务，如注销单个账户视同注销多个产品或服务，要求个人信息主体填写精确的历史操作记录作为注销的必要条件等；", "id": "s13"}, {"type": "single", "question": "小安在某求职网站上上传了自己的一些基本信息，希望有公司会聘用他，但是有一天他发现该网站公布的他的信息有错误，小安连忙联系了网站的运营方，该运营方应当为小安：", "options": ["A.提供注销账户的方法", "B.提供请求更正或补充信息的方法", "C.提供删除信息的方法", "D.提供信息复制的方法"], "answer": "B", "explanation": "《个人信息保护法》第四十六条：个人发现其个人信息不准确或者不完整的，有权请求个人信息处理者更正、补充。个人请求更正、补充其个人信息的，个人信息处理者应当对其个人信息予以核实，并及时更正、补充。", "id": "s14"}, {"type": "single", "question": "下列哪一项是个人信息处理者委托处理个人信息时的正确做法?(  )", "options": ["A.在委托合同中约定个人信息安全保护措施", "B.受托人超过受托范围处理个人信息", "C.不对受托人的个人信息处理活动进行监督", "D.未经委托人同意，转委托他人处理个人信息"], "answer": "A", "explanation": "《个人信息保护法》第二十一条个人信息处理者委托处理个人信息的，应当与受托人约定委托处理的目的、期限、处理方式、个人信息的种类、保护措施以及双方的权利和义务等，并对受托人的个人信息处理活动进行监督。\n受托人应当按照约定处理个人信息，不得超出约定的处理目的、处理方式等处理个人信息；委托合同不生效、无效、被撤销或者终止的，受托人应当将个人信息返还个人信息处理者或者予以删除，不得保留。\n未经个人信息处理者同意，受托人不得转委托他人处理个人信息。\n根据前述规定，B、C、D错误，A选项符合受托人与委托人约定约定保护措施的规定。", "id": "s15"}, {"type": "single", "question": "个人信息保护影响评估应包括的内容是?(  )", "options": ["A、个人信息的处理目的、处理方式等是否合法、正当、必要", "B、对个人权益的影响及安全风险", "C、所采取的保护措施是否合法、有效并与风险程度相适应", "D、以上都包含"], "answer": "D", "explanation": "《个人信息保护法》第五十六条\n个人信息保护影响评估应当包括下列内容：\n(一)【合规性】个人信息的处理目的、处理方式等是否合法、正当、必要；\n(二)【影响】对个人权益的影响及安全风险；\n(三)【针对影响采取的控制措施】所采取的保护措施是否合法、有效并与风险程度相适应。\n个人信息保护影响评估报告和处理情况记录应当至少保存三年。", "id": "s16"}, {"type": "single", "question": "下列选项，应当将个人信息存储在中华人民共和国境内的是?(  )", "options": ["A.甲县民政局收集的婚姻登记信息", "B.乙公司是一家初创企业，非关键信息基础设施运营者，拥有十多万消费者客户,因业务需要签订的一千份电子合同，合同上有客户个人信息。", "C.丙公司是关键信息基础设施运营者，其在非洲援建时在非洲收集的当地员工个人信息。", "D.丁公司处理敏感个人信息量达到了一个亿，其在香港的分公司收集的香港居民个人信息。"], "answer": "A", "explanation": "", "id": "s17"}, {"type": "single", "question": "下列选项违反《个人信息保护法》的是?(  )", "options": ["A.甲平台利用个人信息进行自动化决策，识别出是新用户后，会给新用户提供一张8折优惠券。", "B.乙公司通过自动化决策方式向用户进行个性化广告推荐，乙公司会在个性化推荐之外同时展示了其他的广告。", "C.丙公司通过自动化决策向用户进行个性化广告推荐，丙公司向用户提供了关闭个性化广告推荐的选项，但用户很难找到该选项。", "D.丁银行的App有自动判断用户贷款额度的功能，用户对App自动判断的额度有异议的，可以申请人工复核。"], "answer": "C", "explanation": "", "id": "s18"}, {"type": "single", "question": "下列关于未成年人个人信息保护的选项正确的是?(  )", "options": ["A.18周岁以下未成年人的个人信息为敏感个人信息。", "B.处理16周岁以下未成年人个人信息应当取得该未成年人父母或其他监护人同意", "C.处理16周岁以下未成年人个人信息应当制定专门的处理规则。", "D.15岁的小明在注册账号时，只需自己同意就可以填写相关个人信息。(正确答案)"], "answer": "D", "explanation": "", "id": "s19"}, {"type": "single", "question": "小王是公司的数据管理专员，目前正在忙于数据出境安全评估的申报工作。在申报之前，公司应当先进行自评估，下列哪一项不属于自评估应当考虑的?(  )", "options": ["A.拟向境外提供的数据的经济价值", "B.拟向境外提供的数据的规模", "C.境外接收方处理数据的必要性", "D.境外接收方是否有能力保障出境数据的安全"], "answer": "A", "explanation": "", "id": "s20"}, {"type": "single", "question": "下列哪项行为行为需要进行网络安全审查?(  )", "options": ["A.境内A公司是一家视频网站，注册用户100万，想到纳斯达克上市。", "B.境内B公司是一家网购平台，平台用户注册量有1000万，欲到香港上市。", "C.境内C公司是一家提供跨国订酒店业务的公司，注册用户500万，因业务需要需要向境外提供个人信息。", "D.境内D公司自上年1月1日起累计向境外提供了10万个人信息。"], "answer": "A", "explanation": "网络安全审查办法第七条 掌握超过100万用户个人信息的网络平台运营者赴国外上市，必须向网络安全审查办公室申报网络安全审查。", "id": "s21"}, {"type": "single", "question": "下列哪项行为会被认为“未公开收集使用个人信息规则”?(  )", "options": ["A.在App中设有独立隐私政策文本", "B.隐私政策需要通过4次操作才能访问", "C.在App首次运行时通过弹窗方式提示用户阅读隐私政策", "D.隐私政策的文字又小又密，阅读吃力。"], "answer": "D", "explanation": "", "id": "s22"}, {"type": "single", "question": "以下哪项行为属于“未明示收集使用个人信息的目的、方式和范围”?(  )", "options": ["A.个人信息使用规则对应的内容通俗易懂", "B.在隐私政策中明示App收集使用个人信息的目的、方式和范围", "C.直接更新隐私政策，不通知用户。", "D.申请打开收集个人信息权限时同步告知用户目的"], "answer": "C", "explanation": "", "id": "s23"}, {"type": "single", "question": "以下哪项行为不会被认定为“未经用户同意收集使用个人信息”?(  )", "options": ["A.实际收集的个人信息没有超出用户授权范围", "B.以默认选择同意隐私政策等非明示方式征求用户同意", "C.故意隐瞒、掩饰收集使用个人信息的真实目的，误导用户同意收集个人信息", "D.违反公布的收集使用规则收集使用个人信息。"], "answer": "A", "explanation": "", "id": "s24"}, {"type": "single", "question": "收集使用个人信息的目的、方式、范围发生变化时，下列哪项行为不属于通知用户的适当方式?（）", "options": ["A.直接更新", "B.弹窗消息", "C.邮件告知", "D.红点提示"], "answer": "A", "explanation": "", "id": "s25"}, {"type": "single", "question": "下列哪项活动适用《个人信息保护法》?(  )", "options": ["A.甲参加同学聚会，为了方便同学日后联系，收集了同学们的联系方式并建立了同学录。", "B.乙参加同学聚会，为了向同学们推送自家产品，收集了同学们的联系方式。(正确答案)", "C.丙喜欢追星，会去收集喜欢明星的生日、爱好、个人行程等信息。", "D.丁的爷爷奶奶想出去旅游，丁收集爷爷奶奶的身份信息帮他们订机票，酒店。"], "answer": "B", "explanation": "解析：B。\n《个人信息保护法》第七十二条自然人因个人或者家庭事务处理个人信息的，不适用本法。\n法律对各级人民政府及其有关部门组织实施的统计、档案管理活动中的个人信息处理有规定的，适用其规定。", "id": "s26"}, {"type": "single", "question": "下列告知方式符合法律规定的是?(  )", "options": ["A.甲App的某项需要收集用户的位置信息，在隐私政策里告知用户需要使用位置信息的是哪些功能，并在该功能需要调用位置信息时弹窗告知用户。", "B.乙App在其隐私政策里写到：为了更好地为用户提供服务，将会收集用户姓名、位置信息和检索记录等信息。", "C.丙App在其隐私政策里详尽地列出了哪种功能需要处理哪种个人信息，同时为了让隐私政策更可信，使用了大量的专业术语。", "D.丁App在其隐私政策里使用通俗易懂的语言告知了用户需要哪些功能需要处理哪种个人信息，但其隐私政策使用字体过小、排版紧凑，用户阅读起来很费劲。"], "answer": "A", "explanation": "", "id": "s27"}, {"type": "single", "question": "下列处理个人信息的活动，无需对个人进行告知的是?(  )", "options": ["A.甲到房屋登记中心办理房屋登记，房屋登记中心需要收集甲的姓名、身份证号和房屋信息。", "B.乙到银行办理贷款业务，银行需要查询乙的征信信息。", "C.公安机关办理一起涉黑案件，经有关办案程序批准后对犯罪嫌疑人丙进行监听。", "D.丁医院急诊室来了一名的患者，为了对进行救治，需要了解其个人基本信息、既往病史等，医生通过系统直接获取用户信息。"], "answer": "C", "explanation": "解析：C。\n《个人信息保护法》第十八条个人信息处理者处理个人信息，有法律、行政法规规定应当保密或者不需要告知的情形的，可以不向个人告知前条第一款规定的事项\n紧急情况下为保护自然人的生命健康和财产安全无法及时向个人告知的，个人信息处理者应当在紧急情况消除后及时告知。", "id": "s28"}, {"type": "single", "question": "哪项技术是个人信息合规审计中用于验证数据完整性和未被篡改的关键手段?", "options": ["A.数字签名", "B.数据去重", "C.入侵检测", "D.数据脱敏"], "answer": "A", "explanation": "A.数字签名。数字签名可以验证数据的完整性和来源。", "id": "s29"}, {"type": "single", "question": "在个人信息合规审计中，哪项技术可以帮助处理敏感数据?", "options": ["A.数据挖掘", "B.数据脱敏", "C.数据加密", "D.数据仓库"], "answer": "B", "explanation": "答案：B.数据脱敏。数据脱敏技术可以替换或修改敏感数据，以保护个人信息的隐私和安全。", "id": "s30"}, {"type": "single", "question": "在进行个人信息合规审计时，哪项技术有助于识别和防止未授权的数据访问?", "options": ["A.加密通信", "B.数据挖掘", "C.去标识化", "D.访问控制"], "answer": "D", "explanation": "D.访问控制。访问控制技术可以限制对数据的访问，只有经过授权的用户才能访问相关数据。", "id": "s31"}, {"type": "single", "question": "个人信息处理者应当每年编制本组织个人信息保护合规审计计划，年度审计计划应当报(  )批准，并确保相关方知悉。", "options": ["A.IT管理部门", "B.组织最高管理层", "C.法务部门", "D.内部审计部门"], "answer": "B", "explanation": "", "id": "s32"}, {"type": "single", "question": "处理超过(  )个人信息的个人信息处理者，每年至少开展一次；其他个人信息处理者，每(  )年至少开展一次。", "options": ["A.10万人；1", "B.100万人；1", "C.10万人；2", "D.100万人；2"], "answer": "D", "explanation": "", "id": "s33"}, {"type": "single", "question": "个人信息保护合规审计过程中收集或发现的与审计依据有关并能够证实的记录、事实陈述或其他信息，是(  )。", "options": ["A.审计证据", "B.审计发现", "C.审计结论", "D.审计结果"], "answer": "A", "explanation": "", "id": "s34"}, {"type": "single", "question": "执行个人信息保护合规审计的专业机构应当保持独立性和客观性，连续为同一审计对象开展个人信息保护合规审计不得超过(  )次。", "options": ["A.1", "B.2", "C.3", "D.4"], "answer": "C", "explanation": "", "id": "s35"}, {"type": "single", "question": "审计个人信息处理者在个人信息安全事件应急预案方面的合规性时，哪一项不是必需的?(  )", "options": ["A.公司是否制定个人信息安全事件应急预案(若有，则提供该预案的文本)", "B.公司的个人信息安全事件应急预案是否经过信息安全专家审定", "C.公司是否就个人信息安全事件应急预案实施演练(若有，请提供演练记录)", "D.预案是否与公司面临的风险相适应"], "answer": "B", "explanation": "", "id": "s36"}, {"type": "single", "question": "执行个人信息保护合规审计任务时，审计团队收集的审计证据不包括以下哪项?(  )", "options": ["A.用户交互界面截图", "B.同行的数据合规实践", "C.公司内部流程与记录", "D.信息安全等技术文档"], "answer": "B", "explanation": "", "id": "s37"}, {"type": "single", "question": "审计个人信息处理者在个人信息权利响应上的合规时，可以从下列哪个方面收集审计证据?(  )", "options": ["A.应用的用户交互界面", "B.隐私政策/个人信息保护政策", "C.技术措施", "D.以上都需要"], "answer": "D", "explanation": "", "id": "s38"}, {"type": "single", "question": "审计下列哪项合规义务，审计团队需进入信息系统收集审计证据?(  )", "options": ["A.处理敏感个人信息前，应向个人告知处理敏感个人信息的必要性以及对个人权益的影响", "B.对外提供个人信息前应实施个人信息保护影响评估", "C.获取儿童监护人的同意前，应验证儿童监护人的身份。", "D.对于通过信息系统收集处理个人信息的个人信息处理者，如收集处理个人信息是基于取得用户同意的，则个人信息处理者应对用户的同意进行记录。"], "answer": "D", "explanation": "", "id": "s39"}, {"id": "s123", "type": "single", "question": "审计隐私政策(个人信息保护政策)时，下列哪项不应被判定为不合规?", "options": ["A.更新隐私政策中，将原本为订票而收集的地理位置权限同时用于网约车叫车，未重新取得用户同意。", "B.更新隐私政策时，增加了隐私政策中陈述收集的个人信息字段，未重新取得用户同意", "C.更新的隐私政策中变更了处理者的联系邮箱，仅告知用户，未重新取得用户同意。", "D.隐私政策陈述的安全保护措施与公司实际不一致"], "answer": "C", "explanation": ""}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，该办法自何时起施行？", "options": ["A.2024年5月20日", "B.2025年5月1日", "C.2024年2月12日", "D.2025年1月1日"], "answer": "B", "explanation": "", "id": "s40"}, {"type": "single", "question": "处理超过多少万人个人信息的个人信息处理者，应当每两年至少开展一次个人信息保护合规审计？", "options": ["A.100万", "B.500万", "C.1000万", "D.5000万"], "answer": "C", "explanation": "", "id": "s41"}, {"type": "single", "question": "以下哪项不属于《App违法违规收集使用个人信息行为认定方法》中定义的“未公开收集使用规则”的行为？", "options": ["A.在App中没有隐私政策", "B.隐私政策内容晦涩难懂、冗长繁琐", "C.未逐一列出App收集使用个人信息的目的、方式、范围", "D.征得用户同意前就开始收集个人信息"], "answer": "D", "explanation": "", "id": "s42"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，个人信息保护合规审计是指对个人信息处理者的个人信息处理活动是否遵守什么的情况进行审查和评价的监督活动？", "options": ["A.法律、行政法规", "B.公司内部规定", "C.行业最佳实践", "D.用户协议"], "answer": "A", "explanation": "", "id": "s43"}, {"type": "single", "question": "App以默认选择同意隐私政策等非明示方式征求用户同意，可被认定为什么行为？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的", "C.未经用户同意收集使用个人信息", "D.违反必要原则"], "answer": "C", "explanation": "", "id": "s44"}, {"type": "single", "question": "对个人信息处理者指定的个人信息保护负责人履职情况进行合规审计时，不属于重点审查事项的是？", "options": ["A.是否具有相关的工作经历和专业知识", "B.是否被赋予充分的权限", "C.是否公开联系方式", "D.是否为公司高层管理人员"], "answer": "D", "explanation": "", "id": "s45"}, {"type": "single", "question": "在申请打开可收集个人信息的权限，或申请收集用户身份证号、银行账号等个人敏感信息时，未同步告知用户其目的，属于下列哪种行为？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的、方式和范围", "C.未经用户同意收集使用个人信息", "D.超范围收集个人信息"], "answer": "B", "explanation": "", "id": "s46"}, {"type": "single", "question": "《网络安全标准实践指南——个人信息保护合规审计要求》文件的发布机构是？", "options": ["A.全国网络安全标准化技术委员会", "B.国家互联网信息办公室", "C.工业和信息化部", "D.公安部"], "answer": "A", "explanation": "", "id": "s47"}, {"type": "single", "question": "利用用户个人信息和算法定向推送信息，但未提供非定向推送信息的选项，这可被认定为什么？", "options": ["A.算法滥用", "B.算法歧视", "C.未经用户同意收集使用个人信息", "D.超出用户授权范围"], "answer": "C", "explanation": "", "id": "s48"}, {"type": "single", "question": "根据《个人信息保护合规审计指引》，对个人信息处理者开展的个人信息保护相关的安全教育和培训情况进行合规审计时，应当重点审查？", "options": ["A.培训内容、方式、对象、频率等能否满足需要", "B.培训是否收费", "C.培训讲师的资历", "D.员工是否全部参加"], "answer": "A", "explanation": "", "id": "s49"}, {"type": "single", "question": "App更新时自动将用户设置的权限恢复到默认状态，这是什么行为？", "options": ["A.技术故障", "B.未经用户同意更改其设置的可收集个人信息权限状态", "C.提升用户体验的必要措施", "D.未明示收集规则"], "answer": "B", "explanation": "", "id": "s50"}, {"type": "single", "question": "以下哪项不是《网络安全标准实践指南——个人信息保护合规审计要求》中列出的审计依据？", "options": ["A.《个人信息保护法》", "B.《App违法违规收集使用个人信息行为认定方法》", "C.GB/T35273《信息安全技术-个人信息安全规范》", "D.《欧盟通用数据保护条例》（GDPR）"], "answer": "D", "explanation": "", "id": "s51"}, {"type": "single", "question": "个人信息处理者发生或者可能发生个人信息泄露、篡改、丢失事件时，未采取补救措施，属于违反了？", "options": ["A.安全保障义务", "B.告知同意义务", "C.必要原则", "D.透明度原则"], "answer": "A", "explanation": "", "id": "s52"}, {"type": "single", "question": "在App首次运行时，未通过弹窗、文本链接及附件等明确方式，向用户展示隐私政策，属于？", "options": ["A.未公开收集使用规则", "B.未明示收集目的", "C.未经用户同意", "D.违反必要原则"], "answer": "A", "explanation": "", "id": "s53"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，当保护部门发现个人信息处理活动存在较大风险时，可以要求个人信息处理者做什么？", "options": ["A.立即停止运营", "B.缴纳罚款", "C.委托专业机构进行合规审计", "D.公开道歉"], "answer": "C", "explanation": "", "id": "s54"}, {"type": "single", "question": "某App收集用户的行踪轨迹信息用于“改进产品体验”，但“改进产品体验”的描述过于模糊，难以理解，这可被认定为？", "options": ["A.未公开收集规则", "B.未明示收集使用个人信息的目的", "C.超范围收集", "D.欺诈诱骗"], "answer": "B", "explanation": "", "id": "s55"}, {"type": "single", "question": "某App以“不授权某权限就退出App”的方式强迫用户授权，这属于？", "options": ["A.典型的商业模式", "B.未公开收集规则", "C.正常的用户引导", "D.违反必要原则，以多种方式强制用户同意"], "answer": "D", "explanation": "", "id": "s56"}, {"type": "single", "question": "《个人信息保护合规审计指引》中，对“处理个人信息的合法性”进行审计，不包括审查哪项内容？", "options": ["A.个人信息处理活动是否具有明确、合理的目的", "B.个人信息处理是否具有合法性基础", "C.个人信息处理是否遵循“告知-同意”规则", "D.个人信息处理是否能为企业带来最大收益"], "answer": "D", "explanation": "", "id": "s57"}, {"type": "single", "question": "用户明确表示不同意某App收集其个人信息后，该App仍频繁征求用户同意，干扰其正常使用，这属于？", "options": ["A.正常提醒", "B.未经用户同意收集使用个人信息", "C.技术BUG", "D.尽力争取用户"], "answer": "B", "explanation": "", "id": "s58"}, {"type": "single", "question": "个人信息处理者自行开展个人信息保护合规审计的，审计主体可以是？", "options": ["A.只能是外部专业机构", "B.只能是公司法务部门", "C.内部机构或者委托专业机构", "D.只能是公司CEO"], "answer": "C", "explanation": "", "id": "s59"}, {"type": "single", "question": "处理超1000万以上的个人信息处理者，要求每几年至少开展一次合规审计（）", "options": ["A、1年", "B、2年", "C、3年", "D、4年"], "answer": "B", "explanation": "", "id": "s60"}, {"type": "single", "question": "某平台分发应用程序时，发现其中有应用程序存在违法违规收集个人信息情况，应（ ）", "options": ["A、正常分发", "B、向用户告知该情况", "C、停止分发", "D、将该应用程序放在平台程序列表末尾"], "answer": "C", "explanation": "", "id": "s61"}, {"type": "single", "question": "以下属于无效的审计证据的是（ ）", "options": ["A、被篡改的日志", "B、由测试机构加盖公章的测试报告", "C、被访谈人员签字或书面确认的记录", "D、经过了正当的起草或批准程序并生效实施的管理制度"], "answer": "A", "explanation": "", "id": "s62"}, {"type": "single", "question": "个人信息处理者按照保护部门要求开展个人信息保护合规审计的，在完成合规审计后，应 （ ）", "options": ["A、将审计报告提交给监管部门备案", "B、个人信息保护合规审计报告应当由专业机构主要负责人、合规审计负责人签字并加盖专业机构公章。", "C、无需任何后续操作", "D、将审计报告公开发布"], "answer": "B", "explanation": "", "id": "s63"}, {"type": "single", "question": "哪项活动前，法律规定必须进行个人信息保护影响评估？", "options": ["A.对个人权益具有重大影响的个人信息处理活动", "B. 所有的个人信息处理活动", "C. 每次App版本更新", "D. 公司市场推广活动"], "answer": "A", "explanation": "", "id": "s64"}, {"type": "single", "question": "某App的隐私政策中使用大量专业术语，导致用户难以理解，这可被认定为？", "options": ["A. 未明示收集使用个人信息的目的、方式和范围", "B. 技术实力强的表现", "C. 法律文件规范性的体现", "D. 未公开收集使用规则"], "answer": "A", "explanation": "", "id": "s65"}, {"type": "single", "question": "以下哪项不是《个人信息保护法》规定的个人信息处理原则？", "options": ["A. 合法、正当、必要", "B. 诚实信用", "C. 公开、透明", "D. 商业利益最大化"], "answer": "D", "explanation": "", "id": "s66"}, {"type": "single", "question": "App将所收集的个人信息，在未告知用户的情况下，共享给关联公司，这违反了什么原则？", "options": ["A. 最小必要原则", "B. 存储期限最小化原则", "C. 公开透明与告知同意原则", "D. 数据安全原则"], "answer": "C", "explanation": "", "id": "s67"}, {"type": "single", "question": "某App要求用户一次性同意开启所有权限，包括非必要的权限，否则无法使用。这种行为属于？", "options": ["A. 优化用户体验", "B. 违反必要原则，强迫用户同意", "C. 行业惯例", "D. 高效的授权方式"], "answer": "B", "explanation": "", "id": "s68"}, {"type": "single", "question": "审计报告中“审计发现”部分不包含以下哪个内容？", "options": ["A. 问题的详细描述", "B. 问题的性质定性", "C. 问题产生的原因分析", "D. 对被审计人员的处罚建议"], "answer": "D", "explanation": "", "id": "s69"}, {"type": "single", "question": "某App收集了用户的通讯录信息，但其核心功能是播放音乐，这种行为很可能被认定为？", "options": ["A. 违反必要原则，收集与提供服务无关的个人信息", "B. 丰富了App的功能", "C. 为未来的“社交听歌”功能做准备", "D. 用户已同意，不构成违规"], "answer": "A", "explanation": "", "id": "s70"}, {"type": "single", "question": "个人信息处理者向他人提供其处理的个人信息的，应当向个人告知接收方的相关信息，但不包括？", "options": ["A. 接收方的名称或者姓名", "B. 联系方式", "C. 处理目的、处理方式和个人信息的种类", "D. 接收方的员⼯数量"], "answer": "D", "explanation": "", "id": "s71"}, {"type": "single", "question": "当收集使用个人信息的目的、方式、范围发生变化时，App运营者应该怎么做？", "options": ["A. 无需任何操作", "B. 以适当方式通知用户，如更新隐私政策并提醒阅读", "C. 在后台默默更新即可", "D. 等待下次用户重新安装App时再告知"], "answer": "B", "explanation": "", "id": "s72"}, {"type": "single", "question": "某App以利益诱惑的方式，如“同意授权即送红包”，诱导用户同意提供非必要的个人信息，这种行为属于？", "options": ["A. 正常的营销活动", "B. 提升用户福利", "C. 以欺诈、诱骗等不正当方式误导用户", "D. 创新的用户互动方式"], "answer": "C", "explanation": "", "id": "s73"}, {"type": "single", "question": "《个人信息保护合规审计指引》中，对数据出境情况进行审计，不包括以下哪个方面？", "options": ["A. 是否符合法定条件和要求", "B. 是否向个人告知相关情况并取得其单独同意", "C. 是否进行了个人信息保护影响评估", "D. 境外接收方的国家是否与我国有时差"], "answer" 需向境外提供个人信息", "B.按照劳动合同实施跨境人力资源管理，确需向境外提供员工个人信息", "C.为员工招聘实施跨境人力资源管理，确需向境外提供员工个人信息", "D.为履行境外证券监管法定义务，确需向境外提供个人信息"], "answer": "A", "explanation": "", "id": "s95"}, {"type": "single", "question": "《个人信息保护合规审计管理办法》的制定主要依据是以下哪部法律", "options": ["A.《网络安全法》", "B.《数据安全法》", "C.《个人信息保护法》", "D.《电子商务法》"], "answer": "C", "explanation": "", "id": "s96"}, {"type": "single", "question": "某大型电商平台(注册用户8000万，月活用户2000万)自行开展个人信息保护合规审计时，必须履行以下哪项义务", "options": ["A.指定个人信息保护负责人负责审计工作", "B.成立主要由外部成员组成的独立监督机构", "C.聘请第三方专业机构实施年度审计", "D.向网信部门备案审计管理制度"], "answer": "B", "explanation": "", "id": "s97"}, {"type": "single", "question": "某短视频平台注册用户达1.2亿人，根据《个人信息保护合规审计管理办法》，其开展个人信息保护合规审计的最低频率要求是", "options": ["A.每三年至少一次", "B.每两年至少一次", "C.每五年至少一次", "D.根据风险自主确定频率"], "answer": "B", "explanation": "", "id": "s98"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，审计人员查验“知情同意”合法性时，必须核验的关键要点是", "options": ["A.是否在业务合同中约定个人信息处理条款", "B.个人是否自愿、明确作出同意，无默认/强制同意", "C.是否通过电子邮件发送隐私政策", "D.是否每半年更新一次同意记录"], "answer": "B", "explanation": "", "id": "s99"}, {"type": "single", "question": "某电商平台使用用户行为数据自动化设定商品价格，审计人员查验其是否防止“不合理差别待遇”时，最关键的方法是", "options": ["A. 要求平台公开全部算法逻辑", "B.审查个人信息保护影响评估报告中的风险措施", "C.核验是否对所有用户提供人工复核选项", "D.检查自动化决策系统是否明示“可能影响交易条件“"], "answer": "B", "explanation": "", "id": "s100"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》关于敏感个人信息处理的要求，个人信息处理者在处理敏感个人信息前必须履行哪项核心义务", "options": ["A.向主管部门提交年度数据安全报告", "B.公开披露敏感个人信息的处理目的", "C.获得个人信息主体的单独同意", "D.在事前进行个人信息保护影响评估"], "answer": "D", "explanation": "", "id": "s101"}, {"type": "single", "question": "若数据处理者需要向外国司法或执法机构提供存储于中国境内的个人信息，必须首先满足以下哪项法定条件", "options": ["A.获得国家网信部门的数据出境安全评估批准", "B.经过中华人民共和国主管机关的书面批准", "C.向个人信息主体逐项告知并获取单独同意", "D.在省级公安机关完成备案登记"], "answer": "B", "explanation": "", "id": "s102"}, {"type": "single", "question": "审计个人信息处理者是否保障个人在个人信息处理活动中的权利时，首要核查的核心义务是什么", "options": ["A.确保所有权利申请均在5个工作日内处理完毕", "B.建立便捷的个人行使权利的申请受理和处理机制", "C.向用户提供数据跨境传输的详细路径说明", "D.公开披露个人信息安全事件的历史记录"], "answer": "B", "explanation": "", "id": "s103"}, {"type": "single", "question": "根据我国《数据安全法》，下列陈述正确的是", "options": ["A.所有的数据处理者都应当设立数据安全负责人和数据安全管理机构", "B.所有的数据处理都应当设立专门的数据安全管理机构，但不要求设立数据安全负责人", "C.重要数据处理者应当设立数据安全负责人和数据安全管理机构", "D.重要数据处理应当设立专门的数据安全管理机构，但不要求设立数据安全负责人"], "answer": "C", "explanation": "", "id": "s104"}, {"type": "single", "question": "根据我国《数据安全法》，关于数据处理者义务的陈述正确的是", "options": ["A.数据处理者向境外提供数据时，都应当经过国家网信部门组织的数据出境安全评估", "B.数据处理者向境外提供个人信息时，都应当经过国家网信部门组织的数据出境安全评估", "C.数据处理者向境外提供重要数据时，可以采用标准合同的方式", "D.关键信息基础设施运营者向境外提供重要数据时应当经过国家网信部门组织的数据出境安全评估"], "answer": "D", "explanation": "", "id": "s105"}, {"type": "single", "question": "响应个人信息主体对其个人信息的査询、更正、删除、副本获取，撤回授权同意，注销账户的请求，个人信息处理者应在()期限内作出答复及合理解释，并告知个人信息主体外部纠纷解决途径。", "options": ["A.十五天内", "B.三十天内", "C.十五天内或法律法规规定的期限内", "D.三十天内或法律法规规定的期限内"], "answer": "D", "explanation": "", "id": "s106"}, {"id": "s124", "type": "single", "question": "个人信息保护影响评估报告和处理情况记录应当至少保存多少年？", "options": ["A.一年", "B.两年", "C.三年", "D.五年"], "answer": "C", "explanation": ""}, {"type": "single", "question": "以下说法中正确的是", "options": ["A.个人信息处理者与其他方有共享、转让协议的情况下，个人生物识别信息可以共享、转让", "B.在采集终端中直接使用个人生物识别信息实现身份识别、认证等功能", "C.将个人生物识别信息与个人身份信息存储在一个数据库表中", "D.收集个人生物识别信息前，无需单独征得个人信息主体的明示同意"], "answer": "B", "explanation": "", "id": "s107"}, {"type": "single", "question": "个人信息控制者向其他个人信息控制者提供个人信息前，应向个人信息主体告知接收方的名称或姓名、联系方式、处理目的、处理方式和个人信息的( )等。", "options": ["A.数量", "B.类型", "C.存储期限", "D.敏感程度"], "answer": "B", "explanation": "", "id": "s108"}, {"type": "single", "question": "个人信息控制者应将隐私政策发布在( )，并便于访问和阅读。", "options": ["A.内部办公系统", "B.企业内部宣传栏", "C.不易被发现的网站角落", "D.其收集使用个人信息的产品或服务的显著位置"], "answer": "D", "explanation": "", "id": "s109"}, {"type": "single", "question": "根据GB/T 45574-2025，个人信息处理者处理生物识别信息，在符合第5章和GB/T( )要求的基础上，符合其提出的特殊要求。", "options": ["A. 37988(数据安全能力成熟度模型)", "B. 41817(个人信息安全工程指南)", "C. 40660(生物特征识别信息保护基本要求)", "D. 37964(个人信息去标识化指南)"], "answer": "C", "explanation": "1、 我们讨论的主题是敏感个人信息处理的特殊安全要求，特别关注生物识别信息的处理。2. 提到在处理生物识别信息时，个人信息处理者需遵循第五章及相关国家标准的要求。\n在考试场景中，可能仅给出一串数字如373798 418174066037964，没有文字解释，要求考生识别出这是与敏感信息处理相关的标准代码。\n强调考生需要熟悉与敏感个人信息处理相关的国家标准，以便在考试中能够识别并正确回答相关问题。\n本题正确答案为C", "id": "s110"}, {"type": "single", "question": "个人信息处理者在什么情况下可以免于取得个人同意?", "options": ["A.为订立、履行合同所必需", "B.为提供个性化推荐服务", "C.为提高用户参与度进行用户画像", "D.为商业营销目的收集信息"], "answer": "A", "explanation": "", "id": "s111"}, {"type": "single", "question": "个人信息处理者向境外提供个人信息时，不需要向个人告知哪项内容?", "options": ["A.境外接收方的身份", "B.境外接收方的联系方式", "C.境外接收方的股东结构", "D.个人向境外接收方行使权利的方式"], "answer": "C", "explanation": "", "id": "s112"}, {"type": "single", "question": "在互联网房产经纪服务场景中，业主自行填写并提交房产信息后，平台应当:", "options": ["A.立即发布房源信息", "B.再次电话告知发布影响并取得同意", "C.等待3天后自动发布", "D.仅需系统审核即可发布"], "answer": "B", "explanation": "", "id": "s113"}, {"type": "single", "question": "GB/T 41391标准定义了“第三方应用”，以下不属于第三方应用提供的形式的是():", "options": ["A.小程序", "B.Web页面", "C.未直接向用户提供服务的SDK", "D. SDK"], "answer": "C", "explanation": "", "id": "s114"}, {"type": "single", "question": "以下哪项不属于敏感个人信息()", "options": ["A.身份证号", "B.设备IMEI号", "C.行踪轨迹", "D.健康状况"], "answer": "B", "explanation": "", "id": "s115"}, {"type": "single", "question": "根据GB/T 41391标准，不应频繁申请权限干扰用户正常使用，下列说法不属于“频繁”的形式是()", "options": ["A.单个场景在用户拒绝授权后，48h内弹框提示用户打开权限的次数超过1次;", "B.在用户拒绝授权后，24h内弹框提示用户打开权限的次数超过1次;", "C.每次重新打开App，都向用户索要权限", "D.使用相关业务功能时，提示用户缺少相关权限"], "answer": "D", "explanation": "", "id": "s116"}, {"type": "single", "question": "收集通讯录信息时，下列说法错误的是", "options": ["A、当用户使用添加或输入特定联系人信息(全量通讯录)等功能时，应仅读取用户选取的特定联系人信息，并允许用户自主输入联系人信息;", "B、通过系统权限读写通讯录的行为应由用户主动触发,并仅在相应业务功能使用时申请;集用户通讯录信息的删除渠道;", "C、如用户撤回同意通讯录权限，应提供已收通讯录信息提供至第三方。", "D.不应在未取得用户同意的情况下，在通讯录中增加、删除、修改联系人信息，或将收集的"], "answer": "C", "explanation": "", "id": "s117"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，敏感个人信息是一旦泄露或者非法使用，容易导致自然人的（）受到侵害或者人身、财产安全受到危害的个人信息，包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息，以及不满十四周岁未成年人的个人信息。", "options": ["A、人身安全", "B、人格尊严", "C、人格权益", "D、人身权利"], "answer": "B", "explanation": "", "id": "s118"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，个人信息处理者在处理个人信息前，应当以显著方式、清晰易懂的语言真实、准确、完整地向个人告知下列事项中哪一项是错误的：", "options": ["A、个人信息处理者的名称或者姓名和联系方式；", "B、个人信息的处理目的、处理方式，处理的个人信息种类、保存期限；", "C、个人行使本法规定权利的方式和程序；", "D、个人信息的处理目的、处理方式，处理的个人信息种类。"], "answer": "D", "explanation": "", "id": "s119"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，履行个人信息保护职责的部门在履行职责中，发现违法处理个人信息涉嫌犯罪的，应当及时移送（）依法处理。", "options": ["A、公安机关", "B、检察机关", "C、检查机关", "D、通信管理局"], "answer": "A", "explanation": "", "id": "s120"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，（）的个人信息处理者共同决定个人信息的处理目的和处理方式的，应当约定各自的权利和义务。但是，该约定不影响个人向其中任何一个个人信息处理者要求行使本法规定的权利。", "options": ["A、三个以上", "B、一个以上", "C、五个以上", "D、两个以上"], "answer": "D", "explanation": "", "id": "s121"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，履行个人信息保护职责的部门在履行职责中，发现个人信息处理活动存在（）或者发生个人信息安全事件的，可以按照规定的权限和程序对该个人信息处理者的法定代表人或者主要负责人进行约谈，或者要求个人信息处理者委托专业机构对其个人信息处理活动进行合规审计。", "options": ["A、低风险", "B、高风险", "C、风险", "D、较大风险"], "answer": "D", "explanation": "", "id": "s122"}, {"type": "multi", "question": "个人信息处理者利用个人信息进行自动化决策，应当保证决策的透明度和结果公平、公正，不得对个人在交易价格等交易条件上实行不合理的差别待遇。个人信息处理者应：(  )", "options": ["A.在使用过程中定期(至少每年一次)开展个人信息保护影响评估，并依评估结果改进保护个人信息主体的措施。", "B.在使用过程中定期(至少每半年一次)开展个人信息保护影响评估，并依评估结果改进保护个人信息主体的措施。", "C.在规划设计阶段或首次使用前开展个人信息保护影响评估，并依评估结果采取有效的保护个人信息主体的措施。", "D.向个人信息主体提供针对自动决策结果的投诉渠道，并支持对自动决策结果的人工复核。"], "answer": "ACD", "explanation": "标准35273 个人信息安全规范中7.7章节原文。", "id": "m1"}, {"type": "multi", "question": "依据《个人信息保护法》规定，下列哪些情形，个人信息处理者应当主动删除个人信息?(个人信息处理者未删除的，个人有权请求删除)(  )", "options": ["A.处理目的已实现、无法实现或者为实现处理目的不再必要", "B.个人信息处理者停止提供产品或者服务，或者保存期限已届满", "C.个人撤回同意", "D.人信息处理者违反法律、行政法规或者违反约定处理个人信息"], "answer": "ABCD", "explanation": "", "id": "m2"}, {"type": "multi", "question": "以下哪些行为违反了个人信息主体针对多项业务功能自主选择的要求?(  )", "options": ["A.以改善服务质量、提升使用体验、研发新产品、增强安全性等为由，强制要求个人信息主体同意收集其个人信息。", "B.当个人信息主体自主作出肯定性动作，如主动点击、勾选、填写等动作后，个人信息处理者在个人信息主体开启该业务功能前就开始收集个人信息。", "C.关闭或退出业务功能的途径或方式与个人信息主体选择使用业务功能的途径或方式同样方便。", "D.个人信息主体不授权同意使用、关闭或退出特定业务功能的，频繁征求个人信息主体的授权同意。"], "answer": "ABD", "explanation": "", "id": "m3"}, {"type": "multi", "question": "个人信息主体要求注销账户时，注销过程不应设置不合理的条件或提出额外要求增加个人信息主体义务，如(  )", "options": ["A.注销单个账户视同注销多个产品或服务", "B.注销账户后删除个人信息", "C.要求个人信息主体填写精确的历史操作记录作为注销的必要条件", "D.注销账户时必须要做身份核验"], "answer": "AC", "explanation": "", "id": "m4"}, {"type": "multi", "question": "个人信息主体权益定性方式可以分为以下几个维度?(  )", "options": ["A.限制个人自主决定权", "B.个人名誉受损或遭受精神压力", "C.引发差别性待遇", "D.人身财产受损"], "answer": "ABCD", "explanation": "", "id": "m5"}, {"type": "multi", "question": "依据《个人信息保护法》,哪些情况下个人信息处理者需要进行个人信息保护影响评估?(  )", "options": ["A.处理敏感个人信息", "B.利用个人信息进行自动化决策", "C.委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息", "D.向境外提供个人信息"], "answer": "ABCD", "explanation": "", "id": "m6"}, {"type": "multi", "question": "以下属于个人信息去标识化的有哪些?(  )", "options": ["A.住址：北京市昌平区天通苑8号楼808室→北京市**区**苑*号楼*室", "B.月薪：12000元→10000元～20000元(", "C.姓名：王小明→王重阳", "D.手机号152****1111"], "answer": "ABCD", "explanation": "", "id": "m7"}, {"type": "multi", "question": "委托第三方专业机构进行个人信息保护合规审计的，应由第三方专业机构组建审计组，必要时，在保持独立原则的前提下，组织内部的（）等具有审计或个人信息保护相关专业能力的人员可以参与审计并提供支持。*", "options": ["A.内审团队", "B.安全团队", "C.法务团队", "D.研发团队"], "answer": "ABC", "explanation": "", "id": "m8"}, {"type": "multi", "question": "审计方案编制完成后，审计组长和被审计方应对审计方案进行评审，审计方案评审应重点考虑以下哪些事项？（）", "options": ["A.结合以往开展的审计工作，审计方案是否可以改进。", "B.审计工作的过程和输出物是否遵循相关的法律法规、标准规范等的要求", "C.与审计工作有关的保密和安全事宜", "D.相关方对审计工作进一步的需求和期望"], "answer": "ABCD", "explanation": "", "id": "m9"}, {"type": "multi", "question": "个人信息保护合规审计常用的审计方法有哪些？（）", "options": ["A.访谈交流", "B.文件检查", "C.现场检查", "D.日志分析"], "answer": "ABCD", "explanation": "", "id": "m10"}, {"type": "multi", "question": "以下哪些行为可被认定为“未经用户同意收集使用个人信息”？", "options": ["A.征得用户同意前就开始收集个人信息", "B.用户明确表示不同意后，仍频繁征求用户同意、干扰用户正常使用", "C.实际收集的个人信息超出用户授权范围", "D.以默认选择同意隐私政策等非明示方式征求用户同意"], "answer": "ABCD", "explanation": "", "id": "m11"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，保护部门在哪些情况下可以要求个人信息处理者委托专业机构进行合规审计？", "options": ["A.发现个人信息处理活动存在较大风险的", "B.个人信息处理活动可能侵害众多个人权益的", "C.发生或者可能发生重大个人信息安全事件的", "D.个人信息处理者年度盈利未达预期的"], "answer": "ABC", "explanation": "", "id": "m12"}, {"type": "multi", "question": "《网络安全标准实践指南——个人信息保护合规审计要求》中，审计依据可包括哪些？", "options": ["A.国家法律，如《个人信息保护法》", "B.部门规章，如《个人信息保护合规审计办法》", "C.规范性文件，如《App违法违规收集使用个人信息行为认定方法》", "D.国家标准，如GB/T35273《个人信息安全规范》"], "answer": "ABCD", "explanation": "", "id": "m13"}, {"type": "multi", "question": "对个人信息保护影响评估情况进行合规审计时，应当重点审查哪些内容？", "options": ["A.是否依照法律规定开展评估", "B.是否对个人信息的处理目的、处理方式等进行合法、正当、必要评估", "C.是否对个人权益的影响及安全风险进行评估", "D.是否对所采取的保护措施的合法性、有效性进行评估"], "answer": "ABCD", "explanation": "", "id": "m14"}, {"type": "multi", "question": "以下哪些属于个人敏感信息？", "options": ["A.行踪轨迹", "B.设备MAC地址", "C.身份证号", "D.银行账号"], "answer": "ACD", "explanation": "", "id": "m15"}, {"type": "multi", "question": "以下哪些行为可被认定为“未明示收集使用个人信息的目的、方式和范围”？", "options": ["A.未逐一列出App收集使用个人信息的目的、方式、范围", "B.收集使用个人信息的目的发生变化时，未以适当方式通知用户", "C.申请收集身份证号时，未同步告知用户其目的", "D.有关收集使用规则的内容晦涩难懂、冗长繁琐"], "answer": "ABCD", "explanation": "", "id": "m16"}, {"type": "multi", "question": "对个人信息处理者指定的个人信息保护负责人履职情况进行合规审计，应重点审查？", "options": ["A.是否具有相关的工作经历和专业知识", "B.是否被赋予充分的权限", "C.是否在重大事项决策前有权提出意见和建议", "D.其薪酬水平是否在行业内具有竞争力"], "answer": "ABC", "explanation": "", "id": "m17"}, {"type": "multi", "question": "个人信息处理者在处理个人信息时，应遵循的基本原则包括？", "options": ["A.合法、正当、必要和诚信原则", "B.目的明确、合理，并与处理目的直接相关", "C.采取对个人权益影响最小的方式", "D.公开处理规则，明示处理的目的、方式和范围"], "answer": "ABCD", "explanation": "", "id": "m18"}, {"type": "multi", "question": "以下哪些行为违反了个人信息收集的“最小必要”原则？", "options": ["A.一款手电筒App，要求读取用户的通讯录", "B.一款地图App，要求获取用户的位置信息", "C.一款阅读App，要求开启用户的摄像头权限", "D.一款计算器App，要求收集用户的个人照片"], "answer": "ACD", "explanation": "", "id": "m19"}, {"type": "multi", "question": "个人在个人信息处理活动中享有的权利包括？", "options": ["A.知情权、决定权", "B.查阅、复制权", "C.更正、补充权", "D.删除权"], "answer": "ABCD", "explanation": "", "id": "m20"}, {"type": "multi", "question": "哪些属于《App违法违规收集使用个人信息行为认定方法》中认定的违法违规行为大类？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的、方式和范围", "C.未经用户同意收集使用个人信息", "D.违反必要原则收集与其提供的服务无关的个人信息"], "answer": "ABCD", "explanation": "", "id": "m21"}, {"type": "multi", "question": "对个人信息处理的“安全保障”情况进行审计，可以包括审查？", "options": ["A.是否制定了内部管理制度和操作规程", "B.是否采取了加密、去标识化等安全技术措施", "C.是否制定并组织实施了个人信息安全事件应急预案", "D.是否购买了商业保险"], "answer": "ABC", "explanation": "", "id": "m22"}, {"type": "multi", "question": "个人信息处理者向境外提供个人信息，应当具备下列哪些条件之一？", "options": ["A.通过国家网信部门组织的安全评估", "B.按照国家网信部门的规定经专业机构进行个人信息保护认证", "C.与境外接收方订立标准合同", "D.获得公司董事会批准"], "answer": "ABC", "explanation": "", "id": "m23"}, {"type": "multi", "question": "专业的审计机构在进行个人信息保护合规审计时，应保持？", "options": ["A.独立性", "B.与被审计单位的良好私人关系", "C.客观性", "D.专业性"], "answer": "ACD", "explanation": "", "id": "m24"}, {"type": "multi", "question": "App运营者在定向推送新闻信息服务时，应当如何保障用户权益？", "options": ["A.向用户明示提供了定向推送服务", "B.向用户便捷的关闭定向推送服务的选项", "C.关闭定向推送后，App功能将受限", "D.必须付费才能关闭定向推送"], "answer": "AB", "explanation": "", "id": "m25"}, {"type": "multi", "question": "审计报告的“审计发现”部分，通常需要描述问题的哪些方面？", "options": ["A.事实", "B.定性", "C.原因", "D.影响或后果"], "answer": "ABCD", "explanation": "《数据安全技术个人信息保护合规审计要求》中审计报告包含内容原文。", "id": "m26"}, {"type": "multi", "question": "以下那些属于敏感个人信息（    ）", "options": ["A、用于登录终端的指纹", "B、抑郁症的医疗记录", "C、参加个保审计的考试地点", "D、CTO的宗教信仰"], "answer": "ABD", "explanation": "", "id": "m27"}, {"type": "multi", "question": "下列满足个人信息处理合规性的是（    ）", "options": ["A、贷款，分析收入支出数据", "B、未告知将个人信息共享给第三方", "C、疫情防控要求提供位置信息给疾控中心", "D、地产公司按照行业惯例查看人脸信息"], "answer": "AC", "explanation": "", "id": "m28"}, {"type": "multi", "question": "下列哪类个人信息向境外提供时应该开展数据出境安全评估（    ）", "options": ["a.3000个人信息同步给英国服务器", "b.关键基础设施处理者", "c.10万敏感个人信息", "d.99万个人信息"], "answer": "BC", "explanation": "", "id": "m29"}, {"type": "multi", "question": "哪个场景需要开展个人信息安全影响评估（    ）", "options": ["A、处理敏感个人信息", "B、利用个人信息进行自动化决策", "C、委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息", "D、向境外提供个人信息"], "answer": "ABCD", "explanation": "", "id": "m30"}, {"type": "multi", "question": "行使个人信息转移请求权，应当具备如下那些条件（    ）", "options": ["A.能够验证请求人的真实身份", "B.请求转移的是本人同意提供的或者基于合同收集的个人信息", "C.转移个人信息不损害他人合法权益", "D.支付合理的费用"], "answer": "ABC", "explanation": "GB/T 35273《信息安全技术 个人信息安全规范》8.7 响应个人信息主体的请求\n对个人信息控制者的要求包括：c)对合理的请求原则上不收取费用，但对一定时期内多次重复的请求，可视情收取一定成本费用。\n其中“支付合理费用”非行使个人信息转移请求权的必要条件，因此不选。", "id": "m31"}, {"type": "multi", "question": "以下哪些场景，个人信息处理者处理个人信息无需取得个人同意？", "options": ["A. 为订立、履行个人作为一方当事人的合同所必需", "B. 为履行法定职责或者法定义务所必需", "C. 为提升产品推荐精准度所必需", "D. 为应对突发公共卫生事件所必需"], "answer": "ABD", "explanation": "", "id": "m32"}, {"type": "multi", "question": "以下哪些做法有助于App运营者履行“告知”义务？", "options": ["A. 在App首次启动时，主动弹窗展示隐私政策摘要", "B. 在申请麦克风、相册等敏感权限时，同步说明使用目的", "C. 将隐私政策链接放在不显眼的位置", "D. 隐私政策内容清晰易懂，不使用晦涩术语"], "answer": "ABD", "explanation": "", "id": "m33"}, {"type": "multi", "question": "个人信息处理者应当对以下哪些活动定期进行合规审计？", "options": ["A. 遵守法律、行政法规的情况", "B. 个人信息处理活动的全过程", "C. 所采取的保护措施的有效性", "D. 公司的财务状况"], "answer": "ABC", "explanation": "", "id": "m34"}, {"type": "multi", "question": "一份完整的个人信息保护合规审计报告，其内容结构通常包括？", "options": ["A. 审计概述", "B. 审计依据", "C. 审计发现", "D. 审计结论与建议"], "answer": "ABCD", "explanation": "", "id": "m35"}, {"type": "multi", "question": "行使个人信息转移请求权，应当具备如下那些条件:)", "options": ["A.能够验证请求人的真实身份:", "B.请求转移的是本人同意提供的或者基于合同收集的个人信息;", "C.转移个人信息具备技术可行性;", "D.转移个人信息不损害他人合法权益;E.支付合理费用"], "answer": "ABCD", "explanation": "", "id": "m36"}, {"type": "multi", "question": "关于重要数据的范围，哪些说法是错误的:", "options": ["A.1000万人以上的个人信息是重要数据;", "B.汽车行业超过10万人的个人信息是重要数据;", "C.大量依法公开的企业工商数据是重要数据;", "D.超过10万人的敏感个人信息是重要数据,"], "answer": "ABCD", "explanation": "", "id": "m37"}, {"type": "multi", "question": "关于数据爬取，以下哪些说法是正确的:", "options": ["A.数据爬取均是违法活动;", "B.数据爬取不得非法侵入他人网络;", "C.数据爬取的流量不得超过网站日均流量三分之一;", "D.数据爬取不得破坏数据保护措施;E.数据爬取不得干扰网络服务正常运行。"], "answer": "BE", "explanation": "", "id": "m38"}, {"type": "multi", "question": "审计关键信息基础设施运营者(CIO)向境外提供个人信息时，审计人员必须执行哪些程序", "options": ["A. 查验数据出境安全评估报告，核验评估是否经国家网信部门组织", "B.检查平台系统记录，确认是否存在未经安全评估或超范围向境外提供个人信息", "C.审查评估报告中问题整改记录的完整性与有效性", "D.要求CIO提供所有接收方的当地数据保护认证证明"], "answer": "ABC", "explanation": "", "id": "m39"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，专业机构开展个人信息保护合规审计时应满足哪些要求？", "options": ["A.不得将审计工作转委托给其他机构", "B.同一审计负责人对同一对象审计不得超过三次", "C.依法保密审计中获得的商业秘密和保密商务信息", "D.审计结束后应及时删除获取的个人信息"], "answer": "ACD", "explanation": "", "id": "m40"}, {"type": "multi", "question": "审计人员检查个人信息处理者是否履行删除或匿名化义务时，需执行哪些审计程序", "options": ["A. 查验是否建立个人信息删除或匿名化处理机制", "B.审查内部制度是否覆盖“停止服务\"或“注销账号”场景的处理规则", "C.检查删除或匿名化记录及系统日志，确认义务实际履行", "D.核验删除/匿名化操作是否通过自动化系统执行"], "answer": "ABC", "explanation": "", "id": "m41"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，审计个人信息保护负责人(DPO)职情况时，必须核查以下哪些事项", "options": ["A. DPO是否具备个人信息保护相关专业背景及法律熟悉度", "B.DPO是否被明确赋予跨部门协调权限", "C.企业是否公开DPO联系方式并向监管部门备案", "D.DPO是否有权制止内部数据处理违规行为"], "answer": "ABCD", "explanation": "", "id": "m42"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，个人信息处理者应向审计人员提供的证据类型包括哪些", "options": ["A.个人信息保护影响评估报告、数据出境安全自评估报告", "B.个人信息全流程安全保护制度、应急响应规程", "C.自动化决策技术文档及实地演示记录", "D.个人信息转移、公开及响应删除请求的操作记录"], "answer": "ABCD", "explanation": "", "id": "m43"}, {"type": "multi", "question": "根据我国《数据安全法》要求，重要数据处理者负有以下义务", "options": ["A.应当定期开展风险评估，并向有关主管部门报关风险评估报告", "B.发现数据安全缺陷、漏洞等风险时，应当立即采取补救措施", "C.应当制定数据开放目录，并向社会公开", "D.向境外提供重要数据，应当通过国家网信部门组织的数据出境安全评估"], "answer": "ABD", "explanation": "", "id": "m44"}, {"type": "multi", "question": "根据我国《网络安全法》要求，关键信息基础设施运营者负有以下义务", "options": ["A.安全保护措施应当与关键信息基础设施同步规划、同步建设、同步使用", "B.应当设置专门安全管理机构和安全管理负责", "C.应当对重要系统和数据库进行容灾备份", "D.应当至少每两年一次进行安全监测评估"], "answer": "ABC", "explanation": "", "id": "m45"}, {"type": "multi", "question": "根据我国《网络安全法》要求，网络产品:服务的提供者负有以下义务", "options": ["A.网络产品、服务应当符合相关国家标准的强制性要求", "B.不得设置恶意程序", "C.发现其网络产品、服务存在安全缺陷、漏洞等风险时，应当对外保密", "D.应当为其产品、服务持续提供安全维护"], "answer": "ABD", "explanation": "", "id": "m46"}, {"type": "multi", "question": "根据GB/T 45574-2025，以下哪些属于典型的敏感个人信息()", "options": ["A. 金融账户信息", "B. 宗教信仰信息", "C. 个人上网浏览记录", "D. 个人健康生理信息E. 14周岁以下未成年人信息"], "answer": "ABDE", "explanation": "", "id": "m47"}, {"type": "multi", "question": "根据GBIT 45574-2025，以下哪些属于其他敏感个人信息()-多选", "options": ["A. 精准定位信息", "B. 居民身份证照片", "C. 性取向", "D. 不宜公开的身份信息E. 犯罪记录信息"], "answer": "ABCE", "explanation": "", "id": "m48"}, {"type": "multi", "question": "下列哪些情形需要取得个人的单独同意?(选择所有符合的)", "options": ["A.向境外提供个人信息", "B.处理个人生物识别信息", "C.收集用户设备型号信息", "D.在公共场所收集个人图像用于商业目的"], "answer": "ABD", "explanation": "", "id": "m49"}, {"type": "multi", "question": "个人信息处理者留存同意证据时，可以包括哪些内容?(选择所有符合的)", "options": ["A.告知和同意方案的设计记录", "B.与个人关联的同意记录", "C.个人信息处理规则文本及版本", "D.与其他个人信息处理者的约定记录"], "answer": "ABCD", "explanation": "", "id": "m50"}, {"type": "multi", "question": "以下哪些情形属于“合法、正当、必要”的收集行为()(多选)", "options": ["A.金融类App收集身份证号用于实名认证", "B.地图App收集位置信息用于导航", "C.社交App收集通讯录用于“可能认识的人”推荐", "D.网络直播类App收集手机号用于登录"], "answer": "ABC", "explanation": "", "id": "m51"}, {"type": "multi", "question": "App需删除用户个人信息的情形包括()(多选)", "options": ["A.用户撤回同意", "B.实现处理目的后", "C.发现数据泄露", "D.用户注销账户"], "answer": "ABD", "explanation": "", "id": "m52"}, {"type": "multi", "question": "GB/T 35273-2020《信息安全技术 个人信息安全规范》中规定以下哪些情形应进行个人信息保护影响评估?", "options": ["A.收集敏感个人信息前", "B.开展汇聚融合前", "C.使用自动化决策前", "D.存储敏感个人信息前"], "answer": "ABC", "explanation": "", "id": "m53"}, {"type": "multi", "question": "GB/T 35273-2020《信息安全技术个人信息安全规范》中，个人信息收集的方式包括()。", "options": ["A.个人信息主体在制定界面中填写提交", "B.白动采集个人信息行为", "C.间接获取个人信息行为", "D.个人信息主体填写纸质表格提供"], "answer": "ABCD", "explanation": "", "id": "m54"}, {"type": "multi", "question": "个人信息主体的权利包括()", "options": ["A.知情权", "B.决定权", "C.访问权", "D.删除权"], "answer": "ABCD", "explanation": "", "id": "m55"}, {"type": "multi", "question": "根据 GB/T 35273-2020《信息安全技术 个人信息安全规范》，个人信息控制者共享、转让个人信息时，应满足的条件有()。", "options": ["A.事先征得个人信息主体的明示同意", "B.与接收方签订相关协议，明确双方责任和义务", "C.向个人信息主体告知共享、转让的目的、数据接收方的类型等", "D.确保接收方具备足够的数据安全能力"], "answer": "ABCD", "explanation": "", "id": "m56"}, {"type": "judgment", "question": "通过个人信息保护影响评估可以发现企业日常经营管理中的风险，指导企业建立合规机制避免违规事件的发生。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j1"}, {"type": "judgment", "question": "为了保障用户个人信息安全，在收集用户信息后，宜将去标识化后的信息与可用于恢复识别个人的信息分开存储，确保在针对去标识化信息的后续处理中不重新识别个人。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j2"}, {"type": "judgment", "question": "内部合规审计是内审部门对组织中各类业务和控制进行独立评价。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j3"}, {"type": "judgment", "question": "外审从改善内部管理出发，通过对发现的问题采取相应纠正措施、预防措施，推动质量改进。", "options": ["对", "错"], "answer": "错", "explanation": "内审‌：从改善内部管理出发，通过对发现的问题采取相应纠正措施、预防措施，推动质量改进；外审‌：通过对实验室质量管理体系和技术能力的评价，为顾客承认或第三方认可/注册提供依据‌", "id": "j4"}, {"type": "judgment", "question": "审计过程中，收集机房检查记录、产品或服务实际运行检查记录等审计证据，只需要1名个人信息保护合规审计人员参加检查并在检查记录签字即证明证据有效。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j5"}, {"type": "judgment", "question": "个人信息保护合规审计可采信履行个人信息保护职责的部门本年度组织的或者仍处于有效期内的网络安全、数据安全、个人信息保护相关安全评估、认证结果。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j6"}, {"type": "judgment", "question": "不符合项指的是一种潜在的问题或者一种虽然当前未违反具体规定，但如果不加以改进可能会导致未来出现安全风险的现象。", "options": ["对", "错"], "answer": "错", "explanation": "不符合项不一定会导致风险发生。不符合项‌是指未满足相关要求、标准或规定的情况。", "id": "j7"}, {"type": "judgment", "question": "个人信息处理者应当妥善保管个人信息保护合规审计底稿、报告等档案资料，相关资料至少保存3年。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j8"}, {"type": "judgment", "question": "医院在收集了病人的基因数据前采取了线上方式收集个人的同意，具体方式是患者在平板收电脑上签署《提供基因数据授权同意书》，并对该同意书进行存档，以便随时调取，审计团队认为这不符合书书面形式要求，审计团队的意见是正确。", "options": ["对", "错"], "answer": "错", "explanation": "平板线上签署也是书面同意，审计团队的意见不正确。", "id": "j9"}, {"type": "judgment", "question": "对于用户为注册App提供的个人邮箱，用户同意的隐私文本没有将邮箱用于其他文本的内容，现公司营销部门向这些邮箱发送新品广告，且在邮件底部提供了退订按钮，被审计团队判定为违规，审计团队的意见是合理的。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j10"}, {"type": "judgment", "question": "《个人信息保护合规审计管理办法》是国家法律。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j11"}, {"type": "judgment", "question": "任何情况下处理个人信息都必须取得用户的明示同意。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j12"}, {"type": "judgment", "question": "用户一旦同意隐私政策，App就可以永久使用其个人信息。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j13"}, {"type": "judgment", "question": "处理不足1000万人个人信息的处理者，无需开展个人信息保护合规审计。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j14"}, {"type": "judgment", "question": "利用用户个人信息进行自动化决策，应保证决策的透明度和结果公平、公正。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j15"}, {"type": "judgment", "question": "App将隐私政策默认勾选，只要用户没取消就视为同意，这是合规的。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j16"}, {"type": "judgment", "question": "个人信息保护负责人必须由公司的CEO或CTO担任。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j17"}, {"type": "judgment", "question": "为了方便用户，App更新时可以自动为用户开启之前关闭的权限。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j18"}, {"type": "judgment", "question": "个人信息处理者委托专业机构进行审计的，审计费用由国家承担。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j19"}, {"type": "judgment", "question": "只要功能需要，App就可以尽可能多地收集个人信息。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j20"}, {"type": "judgment", "question": "个人信息保护合规审计报告属于公司内部机密，任何情况下都不得对外提供。", "options": ["对", "错"], "answer": "错", "explanation": "", "id": "j21"}, {"type": "judgment", "question": "匿名化处理后的信息不再属于个人信息。", "options": ["对", "错"], "answer": "对", "explanation": "", "id": "j22"}, {"id": "m57", "type": "multi", "question": "个人信息控制者存储个人信息时，应遵循的要求有()", "options": ["A.存储期限应为实现个人信息主体授权使用的目的所必需的最短时间", "B.超出存储期限后，应对个人信息进行删除或匿名化处理", "C.采用加密等安全措施存储个人信息", "D.可以无限期存储个人信息"], "answer": "ABC", "explanation": ""},
  {"type": "single", "question": "根据《个人信息保护法》，处理个人信息应当遵循的原则不包括以下哪项？（  ）", "options": ["A.合法原则", "B.正当原则", "C.充分原则", "D.诚信原则"], "answer": "C", "explanation": "第五条：处理个人信息应当遵循合法、正当、必要和诚信原则。", "id": "p204"},
  {"type": "single", "question": "个人信息的保存期限应当为实现处理目的所必要的（  ）。", "options": ["A.最长时间", "B.最短时间", "C.合理时间", "D.固定时间"], "answer": "B", "explanation": "第十九条：除法律、行政法规另有规定外，个人信息的保存期限应当为实现处理目的所必要的最短时间。", "id": "p205"},
  {"type": "single", "question": "处理敏感个人信息应当取得个人的（  ）。", "options": ["A.口头同意", "B.默示同意", "C.单独同意", "D.集体同意"], "answer": "C", "explanation": "第二十九条：处理敏感个人信息应当取得个人的单独同意。", "id": "p206"},
  {"type": "single", "question": "个人信息保护影响评估报告和处理情况记录应当至少保存（  ）。", "options": ["A.一年", "B.两年", "C.三年", "D.五年"], "answer": "C", "explanation": "第五十六条：个人信息保护影响评估报告和处理情况记录应当至少保存三年。", "id": "p207"},
  {"type": "single", "question": "个人信息处理者处理不满十四周岁未成年人个人信息的，应当取得（  ）的同意。", "options": ["A.未成年人本人", "B.学校老师", "C.未成年人的父母或者其他监护人", "D.社区工作人员"], "answer": "C", "explanation": "第三十一条：个人信息处理者处理不满十四周岁未成年人个人信息的，应当取得未成年人的父母或者其他监护人的同意。", "id": "p208"},
  {"type": "single", "question": "根据《个人信息保护法》，以下哪项不属于个人信息的处理活动？（  ）", "options": ["A.收集", "B.存储", "C.销毁", "D.匿名化"], "answer": "D", "explanation": "第四条：个人信息的处理包括个人信息的收集、存储、使用、加工、传输、提供、公开、删除等。", "id": "p209"},
  {"type": "single", "question": "个人信息处理者不得以个人不同意处理其个人信息或者撤回同意为由，拒绝提供产品或者服务，但（  ）除外。", "options": ["A.处理个人信息属于提供产品或者服务所必需的", "B.涉及敏感个人信息的", "C.向境外提供个人信息的", "D.利用自动化决策的"], "answer": "A", "explanation": "第十六条：处理个人信息属于提供产品或者服务所必需的除外。", "id": "p210"},
  {"type": "single", "question": "个人有权向个人信息处理者（  ）其个人信息。", "options": ["A.查阅、复制", "B.删除、销毁", "C.修改、转让", "D.出售、出租"], "answer": "A", "explanation": "第四十五条：个人有权向个人信息处理者查阅、复制其个人信息。", "id": "p211"},
  {"type": "single", "question": "受托人未经个人信息处理者同意，（  ）转委托他人处理个人信息。", "options": ["A.可以", "B.不得", "C.视情况而定", "D.紧急情况下可以"], "answer": "B", "explanation": "第二十一条：未经个人信息处理者同意，受托人不得转委托他人处理个人信息。", "id": "p212"},
  {"type": "single", "question": "发生或者可能发生个人信息泄露、篡改、丢失的，个人信息处理者应当（  ）采取补救措施。", "options": ["A.在24小时内", "B.在48小时内", "C.立即", "D.在合理期限内"], "answer": "C", "explanation": "第五十七条：发生或者可能发生个人信息泄露、篡改、丢失的，个人信息处理者应当立即采取补救措施。", "id": "p213"},
  {"type": "single", "question": "拒不改正违法处理个人信息行为的，对违法处理个人信息的应用程序，责令（  ）。", "options": ["A.罚款", "B.暂停或者终止提供服务", "C.吊销营业执照", "D.公开道歉"], "answer": "B", "explanation": "第六十六条：拒不改正的，并处一百万元以下罚款；对违法处理个人信息的应用程序，责令暂停或者终止提供服务。", "id": "p214"},
  {"type": "single", "question": "情节严重的违法处理个人信息行为，对直接负责的主管人员可以处（  ）罚款。", "options": ["A.一万元以上十万元以下", "B.五万元以上五十万元以下", "C.十万元以上一百万元以下", "D.一百万元以上"], "answer": "C", "explanation": "第六十六条：情节严重的，对直接负责的主管人员和其他直接责任人员处十万元以上一百万元以下罚款。", "id": "p215"},
  {"type": "multi", "question": "以下哪些属于敏感个人信息？（  ）", "options": ["A.生物识别信息", "B.宗教信仰", "C.医疗健康信息", "D.行踪轨迹信息"], "answer": "ABCD", "explanation": "第二十八条：敏感个人信息包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息。", "id": "p216"},
  {"type": "multi", "question": "个人信息处理者应当事前进行个人信息保护影响评估的情形包括（  ）。", "options": ["A.处理敏感个人信息", "B.利用个人信息进行自动化决策", "C.向境外提供个人信息", "D.委托处理个人信息"], "answer": "ABCD", "explanation": "第五十五条：处理敏感个人信息、利用个人信息进行自动化决策、委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息、向境外提供个人信息等情形应当事前评估。", "id": "p217"},
  {"type": "multi", "question": "个人对其个人信息的处理享有的权利包括（  ）。", "options": ["A.知情权", "B.决定权", "C.限制他人处理的权利", "D.拒绝他人处理的权利"], "answer": "ABCD", "explanation": "第四十四条：个人对其个人信息的处理享有知情权、决定权，有权限制或者拒绝他人对其个人信息进行处理。", "id": "p218"},
  {"type": "multi", "question": "个人信息处理者向境外提供个人信息应当具备的条件包括（  ）。", "options": ["A.通过国家网信部门组织的安全评估", "B.经专业机构进行个人信息保护认证", "C.按照国家网信部门制定的标准合同与境外接收方订立合同", "D.经个人口头同意"], "answer": "ABC", "explanation": "第三十八条：应当具备通过安全评估、经认证、订立标准合同等条件之一，口头同意不属于合法条件。", "id": "p219"},
  {"type": "multi", "question": "个人信息处理者应当采取的措施包括（  ）。", "options": ["A.制定内部管理制度和操作规程", "B.对个人信息实行分类管理", "C.采取相应的加密、去标识化等安全技术措施", "D.制定并组织实施个人信息安全事件应急预案"], "answer": "ABCD", "explanation": "第五十一条：个人信息处理者应当采取制定内部管理制度、分类管理、加密去标识化、权限管理、安全培训、应急预案等措施。", "id": "p220"},
  {"type": "judgment", "question": "匿名化处理后的信息不属于个人信息。", "options": ["对", "错"], "answer": "对", "explanation": "第四条：个人信息不包括匿名化处理后的信息。", "id": "p221"},
  {"type": "judgment", "question": "个人撤回同意后，撤回前基于个人同意已进行的个人信息处理活动无效。", "options": ["对", "错"], "answer": "错", "explanation": "第十五条：个人撤回同意，不影响撤回前基于个人同意已进行的个人信息处理活动的效力。", "id": "p222"},
  {"type": "judgment", "question": "关键信息基础设施运营者应当将在境内收集和产生的个人信息存储在境内。", "options": ["对", "错"], "answer": "对", "explanation": "第四十条：关键信息基础设施运营者和处理个人信息达到国家网信部门规定数量的个人信息处理者，应当将在境内收集和产生的个人信息存储在境内。", "id": "p223"},
  {"type": "single", "question": "发生个人信息泄露时，个人信息处理者应当立即采取什么措施？（  ）", "options": ["A.补救措施", "B.赔偿措施", "C.公示措施", "D.回避措施"], "answer": "A", "explanation": "第五十七条：发生或者可能发生个人信息泄露、篡改、丢失的，个人信息处理者应当立即采取补救措施", "id": "p2224"},
  {"type": "single", "question": "个人信息泄露通知中，不包括下列哪项内容？（  ）", "options": ["A.信息种类、原因和可能造成的危害", "B.个人信息处理者的联系方式", "C.泄露事件的责任人姓名", "D.补救措施和个人可采取的措施"], "answer": "C", "explanation": "第五十七条：通知应包括信息种类原因危害、补救措施、联系方式，不包括责任人姓名", "id": "p2225"},
  {"type": "single", "question": "个人信息处理者采取措施能够有效避免信息泄露造成危害的，可以如何处理？（  ）", "options": ["A.必须通知个人", "B.可以不通知个人", "C.必须通知监管部门", "D.可以不采取补救措施"], "answer": "B", "explanation": "第五十七条：个人信息处理者采取措施能够有效避免信息泄露、篡改、丢失造成危害的，可以不通知个人", "id": "p2226"},
  {"type": "single", "question": "履行个人信息保护职责的部门认为个人信息泄露可能造成危害的，有权要求什么？（  ）", "options": ["A.要求个人信息处理者通知个人", "B.要求个人信息处理者赔偿损失", "C.要求个人信息处理者公开道歉", "D.要求个人信息处理者停止营业"], "answer": "A", "explanation": "第五十七条：履行个人信息保护职责的部门认为可能造成危害的，有权要求个人信息处理者通知个人", "id": "p2227"},
  {"type": "single", "question": "提供重要互联网平台服务的个人信息处理者，应当成立什么样的独立机构进行监督？（  ）", "options": ["A.主要由外部成员组成的独立机构", "B.主要由内部员工组成的独立机构", "C.由政府官员组成的独立机构", "D.由用户代表组成的独立机构"], "answer": "A", "explanation": "第五十八条：成立主要由外部成员组成的独立机构对个人信息保护情况进行监督", "id": "p2228"},
  {"type": "single", "question": "重要互联网平台制定平台规则应遵循什么原则？（  ）", "options": ["A.公开、公平、公正的原则", "B.效率优先的原则", "C.利益最大化的原则", "D.保密、安全、稳定的原则"], "answer": "A", "explanation": "第五十八条：遵循公开、公平、公正的原则，制定平台规则", "id": "p2229"},
  {"type": "single", "question": "对严重违反法律处理个人信息的平台内产品或服务提供者，平台应当如何处理？（  ）", "options": ["A.停止提供服务", "B.罚款处理", "C.警告处理", "D.降级处理"], "answer": "A", "explanation": "第五十八条：对严重违反法律、行政法规处理个人信息的平台内的产品或者服务提供者，停止提供服务", "id": "p2230"},
  {"type": "single", "question": "重要互联网平台应当定期发布什么报告？（  ）", "options": ["A.个人信息保护社会责任报告", "B.财务审计报告", "C.用户增长报告", "D.技术安全报告"], "answer": "A", "explanation": "第五十八条：定期发布个人信息保护社会责任报告，接受社会监督", "id": "p2231"},
  {"type": "single", "question": "接受委托处理个人信息的受托人应当采取什么措施？（  ）", "options": ["A.必要措施保障所处理的个人信息的安全", "B.将个人信息转委托给第三方", "C.自行决定个人信息的处理方式", "D.向个人收取处理费用"], "answer": "A", "explanation": "第五十九条：采取必要措施保障所处理的个人信息的安全，并协助个人信息处理者履行本法规定的义务", "id": "p2232"},
  {"type": "single", "question": "国家哪个部门负责统筹协调个人信息保护工作？（  ）", "options": ["A.国家网信部门", "B.国家市场监督管理部门", "C.国家公安部门", "D.国家工信部门"], "answer": "A", "explanation": "第六十条：国家网信部门负责统筹协调个人信息保护工作和相关监督管理工作", "id": "p2233"},
  {"type": "single", "question": "履行个人信息保护职责的部门可以组织对什么进行测评并公布结果？（  ）", "options": ["A.应用程序等个人信息保护情况", "B.企业的财务状况", "C.产品的市场占有率", "D.员工的工作效率"], "answer": "A", "explanation": "第六十一条：组织对应用程序等个人信息保护情况进行测评，并公布测评结果", "id": "p2234"},
  {"type": "single", "question": "履行个人信息保护职责的部门履行职责时，不可以采取下列哪项措施？（  ）", "options": ["A.询问有关当事人", "B.查阅、复制有关合同、记录", "C.直接没收企业全部资产", "D.实施现场检查"], "answer": "C", "explanation": "第六十三条：可采取的措施包括询问、查阅复制资料、现场检查、检查设备物品等，不包括直接没收全部资产", "id": "p2235"},
  {"type": "single", "question": "查封或扣押用于违法个人信息处理活动的设备、物品，需要经过谁的批准？（  ）", "options": ["A.本部门主要负责人书面报告并经批准", "B.国务院直接批准", "C.公安机关批准", "D.无需批准，可直接执行"], "answer": "A", "explanation": "第六十三条：向本部门主要负责人书面报告并经批准，可以查封或者扣押", "id": "p2236"},
  {"type": "single", "question": "发现个人信息处理活动存在较大风险时，监管部门可以对谁进行约谈？（  ）", "options": ["A.法定代表人或者主要负责人", "B.普通员工", "C.用户代表", "D.第三方审计机构"], "answer": "A", "explanation": "第六十四条：可以对该个人信息处理者的法定代表人或者主要负责人进行约谈", "id": "p2237"},
  {"type": "single", "question": "监管部门发现个人信息处理活动存在较大风险时，可以委托什么机构进行合规审计？（  ）", "options": ["A.专业机构", "B.企业内部审计部门", "C.用户代表", "D.行业协会"], "answer": "A", "explanation": "第六十四条：可以委托专业机构对该个人信息处理者的个人信息处理活动进行合规审计", "id": "p2238"},
  {"type": "single", "question": "任何组织、个人对违法个人信息处理活动有权向哪个部门进行投诉、举报？（  ）", "options": ["A.履行个人信息保护职责的部门", "B.消费者协会", "C.工商联合会", "D.行业协会"], "answer": "A", "explanation": "第六十五条：任何组织、个人有权对违法个人信息处理活动向履行个人信息保护职责的部门进行投诉、举报", "id": "p2239"},
  {"type": "single", "question": "收到投诉、举报的部门应当如何处理？（  ）", "options": ["A.依法及时处理，并将处理结果告知投诉、举报人", "B.可以不予处理", "C.仅记录备案即可", "D.转交给企业自行处理"], "answer": "A", "explanation": "第六十五条：收到投诉、举报的部门应当依法及时处理，并将处理结果告知投诉、举报人", "id": "p2240"},
  {"type": "single", "question": "违反本法规定处理个人信息，拒不改正的，对直接负责的主管人员处多少罚款？（  ）", "options": ["A.一万元以上十万元以下", "B.一百元以上一千元以下", "C.十万元以上一百万元以下", "D.一千元以上一万元以下"], "answer": "A", "explanation": "第六十六条：对直接负责的主管人员和其他直接责任人员处一万元以上十万元以下罚款", "id": "p2241"},
  {"type": "single", "question": "违反本法规定处理个人信息，情节严重的，由哪级以上的部门进行处罚？（  ）", "options": ["A.省级以上", "B.市级以上", "C.县级以上", "D.国家级"], "answer": "A", "explanation": "第六十六条：情节严重的，由省级以上履行个人信息保护职责的部门责令改正", "id": "p2242"},
  {"type": "single", "question": "违反本法规定处理个人信息，情节严重的，可以并处多少罚款？（  ）", "options": ["A.五千万元以下或者上一年度营业额百分之五以下", "B.一百万元以下", "C.一千万元以下", "D.一亿元以下"], "answer": "A", "explanation": "第六十六条：并处五千万元以下或者上一年度营业额百分之五以下罚款", "id": "p2243"},
  {"type": "single", "question": "违反本法规定处理个人信息，情节严重的，对直接负责的主管人员可以处多少罚款？（  ）", "options": ["A.十万元以上一百万元以下", "B.一万元以上十万元以下", "C.一百万元以上一千万元以下", "D.五万元以上五十万元以下"], "answer": "A", "explanation": "第六十六条：情节严重的，对直接负责的主管人员和其他直接责任人员处十万元以上一百万元以下罚款", "id": "p2244"},
  {"type": "single", "question": "违反本法规定处理个人信息，情节严重的，可以禁止责任人员担任什么职务？（  ）", "options": ["A.董事、监事、高级管理人员和个人信息保护负责人", "B.普通员工", "C.技术顾问", "D.外部审计人员"], "answer": "A", "explanation": "第六十六条：可以决定禁止其在一定期限内担任相关企业的董事、监事、高级管理人员和个人信息保护负责人", "id": "p2245"},
  {"type": "single", "question": "国家机关不履行本法规定的个人信息保护义务的，由谁责令改正？（  ）", "options": ["A.其上级机关或者履行个人信息保护职责的部门", "B.同级人民代表大会", "C.国务院", "D.公安机关"], "answer": "A", "explanation": "第六十八条：国家机关不履行本法规定的个人信息保护义务的，由其上级机关或者履行个人信息保护职责的部门责令改正", "id": "p2246"},
  {"type": "single", "question": "处理个人信息侵害个人信息权益造成损害，个人信息处理者不能证明自己没有过错的，应当承担什么责任？（  ）", "options": ["A.损害赔偿等侵权责任", "B.刑事责任", "C.行政责任", "D.无需承担责任"], "answer": "A", "explanation": "第六十九条：个人信息处理者不能证明自己没有过错的，应当承担损害赔偿等侵权责任", "id": "p2247"},
  {"type": "single", "question": "个人信息处理者违反本法规定侵害众多个人的权益的，哪个组织可以依法向法院提起诉讼？（  ）", "options": ["A.人民检察院、法律规定的消费者组织和由国家网信部门确定的组织", "B.只有个人本人", "C.任何企业", "D.只有公安机关"], "answer": "A", "explanation": "第七十条：人民检察院、法律规定的消费者组织和由国家网信部门确定的组织可以依法向人民法院提起诉讼", "id": "p2248"},
  {"type": "multi", "question": "个人信息泄露、篡改、丢失的通知应当包括哪些事项？（  ）", "options": ["A.信息种类、原因和可能造成的危害", "B.补救措施和个人可以采取的减轻危害的措施", "C.个人信息处理者的联系方式", "D.泄露事件的责任人姓名"], "answer": "ABC", "explanation": "第五十七条：通知应包括信息种类原因危害、补救措施、联系方式三项，不包括责任人姓名", "id": "p2249"},
  {"type": "multi", "question": "提供重要互联网平台服务的个人信息处理者应当履行哪些义务？（  ）", "options": ["A.建立健全个人信息保护合规制度体系", "B.成立主要由外部成员组成的独立机构进行监督", "C.遵循公开、公平、公正原则制定平台规则", "D.定期发布个人信息保护社会责任报告"], "answer": "ABCD", "explanation": "第五十八条：包括建立合规制度体系并成立独立机构、公平公正制定规则、停止为严重违规者服务、定期发布社会责任报告", "id": "p2250"},
  {"type": "multi", "question": "履行个人信息保护职责的部门可以采取哪些措施？（  ）", "options": ["A.询问有关当事人", "B.查阅、复制有关合同、记录、账簿等资料", "C.实施现场检查", "D.检查设备、物品，必要时查封或扣押"], "answer": "ABCD", "explanation": "第六十三条：包括询问当事人、查阅复制资料、实施现场检查、检查设备物品经批准可查封扣押", "id": "p2251"},
  {"type": "multi", "question": "违反本法规定处理个人信息，拒不改正的，可能面临哪些处罚？（  ）", "options": ["A.责令改正，给予警告", "B.没收违法所得", "C.责令暂停或者终止提供服务", "D.处一百万元以下罚款"], "answer": "ABCD", "explanation": "第六十六条：责令改正给予警告、没收违法所得、对违法应用程序责令暂停或终止提供服务、处一百万元以下罚款", "id": "p2252"},
  {"type": "multi", "question": "根据本法，下列哪些用语的含义是正确的？（  ）", "options": ["A.个人信息处理者是指自主决定处理目的、处理方式的组织、个人", "B.自动化决策是指利用计算机程序自动分析、评估个人情况并进行决策的活动", "C.去标识化是指经处理后不借助额外信息无法识别特定自然人的过程", "D.匿名化是指经处理无法识别特定自然人且不能复原的过程"], "answer": "ABCD", "explanation": "第七十三条：分别定义了个人信息处理者、自动化决策、去标识化、匿名化的含义", "id": "p2253"},
  {"type": "multi", "question": "受托人接受委托处理个人信息时应当履行哪些义务？（  ）", "options": ["A.依照本法和有关法律、行政法规的规定", "B.采取必要措施保障所处理的个人信息的安全", "C.协助个人信息处理者履行本法规定的义务", "D.自主决定个人信息的处理方式"], "answer": "ABC", "explanation": "第五十九条：应依照法律规定、采取必要措施保障安全、协助处理者履行义务，不得自主决定处理方式", "id": "p2254"},
  {"type": "judgment", "question": "个人信息处理者采取措施能够有效避免信息泄露造成危害的，可以不通知个人。", "options": ["对", "错"], "answer": "对", "explanation": "第五十七条：个人信息处理者采取措施能够有效避免信息泄露、篡改、丢失造成危害的，可以不通知个人", "id": "p2255"},
  {"type": "judgment", "question": "国家机关不履行本法规定的个人信息保护义务的，不需要承担任何责任。", "options": ["对", "错"], "answer": "错", "explanation": "第六十八条：国家机关不履行义务的，由上级机关或监管部门责令改正；对直接负责人员依法给予处分", "id": "p2256"},
  {"type": "judgment", "question": "去标识化是指个人信息经过处理无法识别特定自然人且不能复原的过程。", "options": ["对", "错"], "answer": "错", "explanation": "第七十三条：去标识化是不借助额外信息无法识别的过程；匿名化才是无法识别且不能复原的过程", "id": "p2257"},
  {"type": "judgment", "question": "任何组织、个人有权对违法个人信息处理活动向履行个人信息保护职责的部门进行投诉、举报。", "options": ["对", "错"], "answer": "对", "explanation": "第六十五条：任何组织、个人有权对违法个人信息处理活动向履行个人信息保护职责的部门进行投诉、举报", "id": "p2258"},
  {"type": "single", "question": "《个人信息保护合规审计管理办法》自何时起施行？（  ）", "options": ["A.2024年5月1日", "B.2025年5月1日", "C.2025年1月1日", "D.2024年1月1日"], "answer": "B", "explanation": "第二十条 本办法自2025年5月1日起施行。", "id": "p3259"},
  {"type": "single", "question": "处理超过多少万人个人信息的个人信息处理者，应当每两年至少开展一次个人信息保护合规审计？（  ）", "options": ["A.500万人", "B.800万人", "C.1000万人", "D.1500万人"], "answer": "C", "explanation": "第四条 处理超过1000万人个人信息的个人信息处理者，应当每两年至少开展一次个人信息保护合规审计。", "id": "p3260"},
  {"type": "single", "question": "处理多少万人以上个人信息的个人信息处理者应当指定个人信息保护负责人？（  ）", "options": ["A.50万人", "B.100万人", "C.200万人", "D.500万人"], "answer": "B", "explanation": "第十二条 处理100万人以上个人信息的个人信息处理者应当指定个人信息保护负责人。", "id": "p3261"},
  {"type": "single", "question": "发生个人信息安全事件，导致多少人以上个人信息泄露的，保护部门可以要求委托专业机构进行合规审计？（  ）", "options": ["A.10万人", "B.50万人", "C.100万人", "D.200万人"], "answer": "C", "explanation": "第五条（三）发生个人信息安全事件，导致100万人以上个人信息或者10万人以上敏感个人信息泄露。", "id": "p3262"},
  {"type": "single", "question": "发生个人信息安全事件，导致多少人以上敏感个人信息泄露的，保护部门可以要求委托专业机构进行合规审计？（  ）", "options": ["A.1万人", "B.5万人", "C.10万人", "D.50万人"], "answer": "C", "explanation": "第五条（三）导致100万人以上个人信息或者10万人以上敏感个人信息泄露、篡改、丢失、毁损的。", "id": "p3263"},
  {"type": "single", "question": "个人信息处理者按照保护部门要求开展合规审计的，整改完成后应在多少个工作日内报送整改情况报告？（  ）", "options": ["A.5个工作日", "B.10个工作日", "C.15个工作日", "D.30个工作日"], "answer": "C", "explanation": "第十一条 在整改完成后15个工作日内，向保护部门报送整改情况报告。", "id": "p3264"},
  {"type": "single", "question": "个人信息保护合规审计报告应当由谁签字并加盖专业机构公章？（  ）", "options": ["A.审计人员", "B.专业机构主要负责人、合规审计负责人", "C.个人信息处理者负责人", "D.保护部门负责人"], "answer": "B", "explanation": "第十条 个人信息保护合规审计报告应当由专业机构主要负责人、合规审计负责人签字并加盖专业机构公章。", "id": "p3265"},
  {"type": "single", "question": "同一专业机构及其关联机构不得连续多少次以上对同一审计对象开展个人信息保护合规审计？（  ）", "options": ["A.两次", "B.三次", "C.四次", "D.五次"], "answer": "B", "explanation": "第十五条 同一专业机构及其关联机构、同一合规审计负责人不得连续三次以上对同一审计对象开展个人信息保护合规审计。", "id": "p3266"},
  {"type": "single", "question": "关键信息基础设施运营者向境外提供个人信息，应当经什么程序？（  ）", "options": ["A.备案", "B.认证", "C.安全评估", "D.签订标准合同"], "answer": "C", "explanation": "附件十五：关键信息基础设施运营者向境外提供是否经安全评估。", "id": "p3267"},
  {"type": "single", "question": "累计向境外提供多少人以上个人信息，应当经安全评估？（  ）", "options": ["A.10万人", "B.50万人", "C.100万人", "D.200万人"], "answer": "C", "explanation": "附件十五：累计向境外提供100万人以上个人信息是否经安全评估。", "id": "p3268"},
  {"type": "single", "question": "向境外提供10万人以上不满100万人个人信息的，应当经什么程序？（  ）", "options": ["A.仅需备案", "B.经认证或签订标准合同并备案", "C.仅需安全评估", "D.仅需告知个人"], "answer": "B", "explanation": "附件十五：10万人以上不满100万人是否经认证或签订标准合同并备案。", "id": "p3269"},
  {"type": "single", "question": "个人信息保护合规审计是指什么活动？（  ）", "options": ["A.对个人信息处理者的财务状况进行审计", "B.对个人信息处理者的个人信息处理活动是否遵守法律、行政法规的情况进行审查和评价的监督活动", "C.对个人信息处理者的网络安全进行技术检测", "D.对个人信息处理者的员工进行背景调查"], "answer": "B", "explanation": "第二条 本办法所称个人信息保护合规审计，是指对个人信息处理者的个人信息处理活动是否遵守法律、行政法规的情况进行审查和评价的监督活动。", "id": "p3270"},
  {"type": "single", "question": "个人信息处理者自行开展合规审计的，应当由谁进行？（  ）", "options": ["A.必须由保护部门进行", "B.由个人信息处理者内部机构或者委托专业机构", "C.只能由内部机构进行", "D.只能由外部专业机构进行"], "answer": "B", "explanation": "第三条 应当由个人信息处理者内部机构或者委托专业机构定期对其处理个人信息遵守法律、行政法规的情况进行合规审计。", "id": "p3271"},
  {"type": "single", "question": "专业机构对合规审计中获得的信息应当如何处理？（  ）", "options": ["A.可以留存备份", "B.可以分享给关联机构", "C.依法保密，不得泄露，审计结束后及时删除", "D.可以出售给第三方"], "answer": "C", "explanation": "第十三条 应当依法保密，不得泄露或者非法向他人提供，在合规审计工作结束后及时删除相关信息。", "id": "p3272"},
  {"type": "single", "question": "专业机构是否可以转委托其他机构开展个人信息保护合规审计？（  ）", "options": ["A.可以，但需经保护部门批准", "B.可以，但需经个人信息处理者同意", "C.不得转委托", "D.可以，无限制"], "answer": "C", "explanation": "第十四条 专业机构不得转委托其他机构开展个人信息保护合规审计。", "id": "p3273"},
  {"type": "single", "question": "个人信息处理者按照保护部门要求开展合规审计的，审计费用由谁承担？（  ）", "options": ["A.保护部门承担", "B.专业机构自行承担", "C.个人信息处理者承担", "D.双方共同承担"], "answer": "C", "explanation": "第八条 个人信息处理者应当为专业机构正常开展工作提供必要支持，并承担审计费用。", "id": "p3274"},
  {"type": "single", "question": "对同一个人信息安全事件或者风险，保护部门是否可以重复要求委托专业机构开展合规审计？（  ）", "options": ["A.可以重复要求", "B.不得重复要求", "C.可以要求三次", "D.视情况而定"], "answer": "B", "explanation": "第五条 对同一个人信息安全事件或者风险，不得重复要求个人信息处理者委托专业机构开展个人信息保护合规审计。", "id": "p3275"},
  {"type": "single", "question": "自动化决策审计中，是否应当提供便捷的拒绝方式？（  ）", "options": ["A.无需提供", "B.应当提供便捷拒绝方式", "C.仅需告知即可", "D.由企业自行决定"], "answer": "B", "explanation": "附件九、自动化决策审计重点：是否提供便捷拒绝方式。", "id": "p3276"},
  {"type": "single", "question": "委托处理个人信息前，是否应当开展影响评估？（  ）", "options": ["A.无需评估", "B.应当开展影响评估", "C.仅需口头评估", "D.由受托人评估"], "answer": "B", "explanation": "附件六、委托处理审计重点：委托前是否开展影响评估。", "id": "p3277"},
  {"type": "single", "question": "个人信息处理规则审计中，是否应当明确个人查阅、复制、转移、更正、删除等途径？（  ）", "options": ["A.无需明确", "B.应当明确", "C.仅需告知部分途径", "D.由企业自行决定"], "answer": "B", "explanation": "附件三：是否明确个人查阅复制转移更正删除等途径。", "id": "p3278"},
  {"type": "single", "question": "敏感个人信息审计中，处理生物识别等敏感信息是否应当取得单独同意？（  ）", "options": ["A.无需单独同意", "B.应当取得单独同意", "C.仅需口头同意", "D.由企业自行决定"], "answer": "B", "explanation": "附件十三：处理生物识别等敏感信息是否取得单独同意。", "id": "p3279"},
  {"type": "single", "question": "个人信息处理规则审计中，是否应当明确保存期限及到期处理方式？（  ）", "options": ["A.无需明确", "B.应当明确", "C.仅需内部掌握", "D.由企业自行决定"], "answer": "B", "explanation": "附件三：是否明确保存期限及到期处理方式。", "id": "p3280"},
  {"type": "single", "question": "在线告知个人信息处理规则是否应当向个人提供文本信息？（  ）", "options": ["A.无需提供", "B.应当提供文本信息或者通过适当方式向个人履行告知义务", "C.仅需口头告知", "D.由企业自行决定"], "answer": "B", "explanation": "附件四：在线告知是否提供文本信息或者通过适当方式向个人履行告知义务。", "id": "p3281"},
  {"type": "single", "question": "个人信息保护合规审计报告应当至少保存多少年？（  ）", "options": ["A.一年", "B.两年", "C.三年", "D.五年"], "answer": "C", "explanation": "根据《个人信息保护法》第五十六条：个人信息保护影响评估报告和处理情况记录应当至少保存三年。", "id": "p3282"},
  {"type": "single", "question": "自动化决策审计中，应当防止根据个人偏好对个人实行不合理的什么待遇？（  ）", "options": ["A.差别待遇", "B.优惠待遇", "C.统一待遇", "D.特殊待遇"], "answer": "A", "explanation": "附件九：是否采取了有效措施，防止自动化决策根据消费者的偏好等对个人在交易条件上实行不合理的差别待遇。", "id": "p3283"},
  {"type": "multi", "question": "个人信息处理者有以下哪些情形的，保护部门可以要求委托专业机构进行合规审计？（  ）", "options": ["A.发现个人信息处理活动存在严重影响个人权益的较大风险", "B.个人信息处理活动可能侵害众多个人的权益", "C.发生个人信息安全事件，导致100万人以上个人信息泄露", "D.发生个人信息安全事件，导致10万人以上敏感个人信息泄露"], "answer": "ABCD", "explanation": "第五条：（一）发现较大风险；（二）可能侵害众多个人权益；（三）发生安全事件导致100万人以上个人信息或10万人以上敏感个人信息泄露。", "id": "p3284"},
  {"type": "multi", "question": "合法性基础审计应重点审查哪些内容？（  ）", "options": ["A.是否取得个人同意", "B.是否为充分知情前提下自愿明确作出", "C.变更时是否重新取得同意", "D.是否取得单独同意或书面同意"], "answer": "ABCD", "explanation": "附件二：是否取得个人同意，是否为充分知情前提下自愿明确作出，变更时是否重新取得同意，是否取得单独同意或书面同意。", "id": "p3285"},
  {"type": "multi", "question": "委托处理审计重点包括哪些内容？（  ）", "options": ["A.委托前是否开展影响评估", "B.合同是否约定目的期限方式种类保护措施及双方权利义务", "C.是否对受托人进行监督", "D.是否向受托人支付费用"], "answer": "ABC", "explanation": "附件六：委托前是否开展影响评估，合同是否约定相关内容，是否对受托人进行监督。", "id": "p3286"},
  {"type": "multi", "question": "自动化决策审计重点包括哪些内容？（  ）", "options": ["A.是否保证透明度和结果公平公正", "B.是否事前告知个人", "C.是否进行影响评估", "D.是否提供便捷拒绝方式"], "answer": "ABCD", "explanation": "附件九：是否保证透明度和结果公平公正，是否事前告知个人，是否进行影响评估，是否提供便捷拒绝方式，是否防止不合理差别待遇。", "id": "p3287"},
  {"type": "multi", "question": "敏感个人信息审计重点包括哪些内容？（  ）", "options": ["A.处理生物识别等敏感信息是否取得单独同意", "B.处理未成年人信息是否取得监护人同意", "C.是否进行影响评估", "D.是否告知必要性和影响"], "answer": "ABCD", "explanation": "附件十三：处理生物识别等敏感信息是否取得单独同意，处理未成年人信息是否取得监护人同意，是否进行影响评估，是否告知必要性和影响。", "id": "p3288"},
  {"type": "multi", "question": "专业机构应当具备哪些条件？（  ）", "options": ["A.有与服务相适应的审计人员", "B.有与服务相适应的场所", "C.有与服务相适应的设施", "D.有与服务相适应的资金"], "answer": "ABCD", "explanation": "第七条 专业机构应当具备开展个人信息保护合规审计的能力，有与服务相适应的审计人员、场所、设施和资金等。", "id": "p3289"},
  {"type": "multi", "question": "跨境提供审计重点包括哪些内容？（  ）", "options": ["A.关键信息基础设施运营者向境外提供是否经安全评估", "B.累计向境外提供100万人以上个人信息是否经安全评估", "C.10万人以上不满100万人是否经认证或签订标准合同并备案", "D.是否向个人告知跨境提供事项"], "answer": "ABC", "explanation": "附件十五：关键信息基础设施运营者向境外提供是否经安全评估；累计100万人以上是否经安全评估；10万人以上不满100万人是否经认证或签订标准合同并备案。", "id": "p3290"},
  {"type": "judgment", "question": "《个人信息保护合规审计管理办法》适用于在中华人民共和国境内开展个人信息保护合规审计。", "options": ["对", "错"], "answer": "对", "explanation": "第二条 在中华人民共和国境内开展个人信息保护合规审计，适用本办法。", "id": "p3291"},
  {"type": "judgment", "question": "对国家机关和法律、法规授权的具有管理公共事务职能的组织的个人信息保护合规审计，适用本办法。", "options": ["对", "错"], "answer": "错", "explanation": "第十九条 对国家机关和法律、法规授权的具有管理公共事务职能的组织的个人信息保护合规审计，不适用本办法。", "id": "p3292"},
  {"type": "judgment", "question": "任何组织、个人有权对个人信息保护合规审计中的违法活动向保护部门进行投诉、举报。", "options": ["对", "错"], "answer": "对", "explanation": "第十七条 任何组织、个人有权对个人信息保护合规审计中的违法活动向保护部门进行投诉、举报。", "id": "p3293"},
  {"type": "judgment", "question": "保护部门对个人信息处理者开展个人信息保护合规审计情况进行监督检查。", "options": ["对", "错"], "answer": "对", "explanation": "第十六条 保护部门对个人信息处理者开展个人信息保护合规审计情况进行监督检查。", "id": "p3294"},
  {"type": "single", "question": "根据《数据安全法》，数据是指任何以电子或者其他方式对什么的记录？（  ）", "options": ["A.信息", "B.数据", "C.文件", "D.资料"], "answer": "A", "explanation": "第三条：本法所称数据，是指任何以电子或者其他方式对信息的记录。", "id": "p4295"},
  {"type": "single", "question": "数据处理活动包括以下哪项？（  ）", "options": ["A.收集、存储、使用、加工、传输、提供、公开", "B.收集、存储、使用、加工、传输、销售、公开", "C.收集、存储、使用、加工、传输、提供、买卖", "D.收集、存储、使用、加工、传输、提供、删除"], "answer": "A", "explanation": "第三条：数据处理，包括数据的收集、存储、使用、加工、传输、提供、公开等。", "id": "p4296"},
  {"type": "single", "question": "维护数据安全，应当坚持什么安全观？（  ）", "options": ["A.总体国家安全观", "B.网络安全观", "C.信息安全观", "D.数据安全观"], "answer": "A", "explanation": "第四条：维护数据安全，应当坚持总体国家安全观。", "id": "p4297"},
  {"type": "single", "question": "哪个机构负责国家数据安全工作的决策和议事协调？（  ）", "options": ["A.中央国家安全领导机构", "B.国家网信部门", "C.国务院", "D.公安部"], "answer": "A", "explanation": "第五条：中央国家安全领导机构负责国家数据安全工作的决策和议事协调。", "id": "p4298"},
  {"type": "single", "question": "哪个部门负责统筹协调网络数据安全和相关监督管理工作？（  ）", "options": ["A.国家网信部门", "B.公安机关", "C.国家安全机关", "D.工业和信息化部"], "answer": "A", "explanation": "第六条：国家网信部门依照本法规定，负责统筹协调网络数据安全和相关监督管理工作。", "id": "p4299"},
  {"type": "single", "question": "国家建立数据分类分级保护制度，将数据分为哪三类？（  ）", "options": ["A.一般数据、重要数据、核心数据", "B.普通数据、重要数据、核心数据", "C.一般数据、关键数据、核心数据", "D.普通数据、关键数据、核心数据"], "answer": "A", "explanation": "第十九条：将数据分为一般数据、重要数据、核心数据，实行分类分级保护。", "id": "p4300"},
  {"type": "single", "question": "国家建立数据安全风险评估、报告、信息共享、什么机制？（  ）", "options": ["A.监测预警", "B.监测通报", "C.监测报告", "D.监测评估"], "answer": "A", "explanation": "第二十条：国家建立数据安全风险评估、报告、信息共享、监测预警机制。", "id": "p4301"},
  {"type": "single", "question": "国家建立数据安全审查制度，对什么进行国家安全审查？（  ）", "options": ["A.影响或者可能影响国家安全的数据处理活动", "B.所有数据处理活动", "C.跨境数据处理活动", "D.重要数据处理活动"], "answer": "A", "explanation": "第二十二条：对影响或者可能影响国家安全的数据处理活动进行国家安全审查。", "id": "p4302"},
  {"type": "single", "question": "依法作出的数据安全审查决定为什么决定？（  ）", "options": ["A.最终决定", "B.初步决定", "C.临时决定", "D.参考决定"], "answer": "A", "explanation": "第二十二条：依法作出的安全审查决定为最终决定。", "id": "p4303"},
  {"type": "single", "question": "开展数据处理活动应当建立健全什么数据安全管理制度？（  ）", "options": ["A.全流程", "B.全周期", "C.全方位", "D.全过程"], "answer": "A", "explanation": "第二十七条：建立健全全流程数据安全管理制度。", "id": "p4304"},
  {"type": "single", "question": "重要数据的处理者应当明确什么和管理机构？（  ）", "options": ["A.数据安全负责人", "B.数据保护负责人", "C.信息安全负责人", "D.网络安全负责人"], "answer": "A", "explanation": "第二十七条：重要数据的处理者应当明确数据安全负责人和管理机构，落实数据安全保护责任。", "id": "p4305"},
  {"type": "single", "question": "发现数据安全缺陷、漏洞等风险时，应当立即采取什么措施？（  ）", "options": ["A.补救措施", "B.报告措施", "C.处置措施", "D.预警措施"], "answer": "A", "explanation": "第二十九条：发现数据安全缺陷、漏洞等风险时，应当立即采取补救措施。", "id": "p4306"},
  {"type": "single", "question": "发生数据安全事件时，应当立即采取什么措施？（  ）", "options": ["A.处置措施", "B.补救措施", "C.应急措施", "D.报告措施"], "answer": "A", "explanation": "第二十九条：发生数据安全事件时，应当立即采取处置措施，按照规定及时告知用户并向有关主管部门报告。", "id": "p4307"},
  {"type": "single", "question": "重要数据的处理者应当按照规定对其数据处理活动定期开展什么？（  ）", "options": ["A.风险评估", "B.安全检查", "C.合规审查", "D.审计评估"], "answer": "A", "explanation": "第三十条：重要数据的处理者应当按照规定对其数据处理活动定期开展风险评估，并向有关主管部门报送风险评估报告。", "id": "p4308"},
  {"type": "single", "question": "关键信息基础设施运营者境内收集产生的重要数据出境安全管理，适用哪部法律？（  ）", "options": ["A.《中华人民共和国网络安全法》", "B.《中华人民共和国数据安全法》", "C.《中华人民共和国个人信息保护法》", "D.《中华人民共和国国家安全法》"], "answer": "A", "explanation": "第三十一条：适用《中华人民共和国网络安全法》的有关规定。", "id": "p4309"},
  {"type": "single", "question": "任何组织、个人收集数据，应当采取什么方式？（  ）", "options": ["A.合法、正当的方式", "B.合理、必要的方式", "C.合规、安全的方式", "D.公开、透明的方式"], "answer": "A", "explanation": "第三十二条：应当采取合法、正当的方式，不得窃取或者以其他非法方式获取数据。", "id": "p4310"},
  {"type": "single", "question": "从事数据交易中介服务的机构，应当要求数据提供方说明什么？（  ）", "options": ["A.数据来源", "B.数据用途", "C.数据价值", "D.数据质量"], "answer": "A", "explanation": "第三十三条：应当要求数据提供方说明数据来源，审核交易双方的身份，并留存审核、交易记录。", "id": "p4311"},
  {"type": "single", "question": "公安机关调取数据，应当经过什么手续？（  ）", "options": ["A.严格的批准手续", "B.简单的备案手续", "C.常规的审批手续", "D.特别的授权手续"], "answer": "A", "explanation": "第三十五条：应当按照国家有关规定，经过严格的批准手续，依法进行。", "id": "p4312"},
  {"type": "single", "question": "境外的司法或执法机构请求调取境内数据，应当依照什么处理？（  ）", "options": ["A.中华人民共和国法律和缔结或参加的国际条约、协定等", "B.国际惯例和相关国际公约", "C.数据所在地法律和双边协定", "D.国际法和国内法相结合"], "answer": "A", "explanation": "第三十六条：应当依照中华人民共和国法律和中华人民共和国缔结或者参加的国际条约、协定等处理，或者通过外交途径提出。", "id": "p4313"},
  {"type": "single", "question": "违反本法第三十二条，违法所得不足一百万元的，处多少罚款？（  ）", "options": ["A.一百万元以上一千万元以下", "B.五十万元以上五百万元以下", "C.十万元以上一百万元以下", "D.一百万元以上五百万元以下"], "answer": "A", "explanation": "第四十五条：没有违法所得或者违法所得不足一百万元的，处一百万元以上一千万元以下罚款。", "id": "p4314"},
  {"type": "single", "question": "对核心数据处理不当，情节严重的，处多少罚款？（  ）", "options": ["A.二千万元以上一亿元以下", "B.一百万元以上一千万元以下", "C.五百万元以上五千万元以下", "D.一千万元以上五千万元以下"], "answer": "A", "explanation": "第四十六条：情节严重的，处二千万元以上一亿元以下罚款。", "id": "p4315"},
  {"type": "single", "question": "对核心数据处理不当（未达情节严重），处多少罚款？（  ）", "options": ["A.二百万元以上二千万元以下", "B.一百万元以上一千万元以下", "C.五十万元以上五百万元以下", "D.一千万元以上五千万元以下"], "answer": "A", "explanation": "第四十六条：违反本法规定，对核心数据处理不当的，处二百万元以上二千万元以下罚款。", "id": "p4316"},
  {"type": "single", "question": "各地区、各部门对本地区、本部门工作中收集和产生的数据及什么负责？（  ）", "options": ["A.数据安全", "B.数据质量", "C.数据完整", "D.数据准确"], "answer": "A", "explanation": "第六条：各地区、各部门对本地区、本部门工作中收集和产生的数据及数据安全负责。", "id": "p4317"},
  {"type": "single", "question": "开展数据处理活动以及研究开发数据新技术，应当符合什么？（  ）", "options": ["A.社会公德和伦理", "B.市场规则", "C.行业标准", "D.国际惯例"], "answer": "A", "explanation": "第二十八条：应当有利于促进经济社会发展，增进人民福祉，符合社会公德和伦理。", "id": "p4318"},
  {"type": "single", "question": "国家保护个人、组织与数据有关的什么，鼓励数据依法合理有效利用？（  ）", "options": ["A.权益", "B.所有权", "C.使用权", "D.收益权"], "answer": "A", "explanation": "第七条：国家保护个人、组织与数据有关的权益，鼓励数据依法合理有效利用，保障数据依法有序自由流动。", "id": "p4319"},
  {"type": "multi", "question": "《数据安全法》的立法目的包括哪些？（  ）", "options": ["A.规范数据处理活动", "B.保障数据安全", "C.促进数据开发利用", "D.保护个人、组织的合法权益"], "answer": "ABCD", "explanation": "第一条：为了规范数据处理活动，保障数据安全，促进数据开发利用，保护个人、组织的合法权益，维护国家主权、安全和发展利益，制定本法。", "id": "p4320"},
  {"type": "multi", "question": "以下哪些主管部门承担本行业、本领域数据安全监管职责？（  ）", "options": ["A.工业、电信", "B.交通、金融", "C.自然资源、卫生健康", "D.教育、科技"], "answer": "ABCD", "explanation": "第六条：工业、电信、交通、金融、自然资源、卫生健康、教育、科技等主管部门承担本行业、本领域数据安全监管职责。", "id": "p4321"},
  {"type": "multi", "question": "开展数据处理活动应当遵守哪些要求？（  ）", "options": ["A.遵守法律、法规", "B.尊重社会公德和伦理", "C.遵守商业道德和职业道德", "D.诚实守信"], "answer": "ABCD", "explanation": "第八条：应当遵守法律、法规，尊重社会公德和伦理，遵守商业道德和职业道德，诚实守信。", "id": "p4322"},
  {"type": "multi", "question": "国家数据安全工作协调机制统筹协调有关部门加强数据安全风险信息的哪些工作？（  ）", "options": ["A.获取", "B.分析", "C.研判", "D.预警"], "answer": "ABCD", "explanation": "第二十条：统筹协调有关部门加强数据安全风险信息的获取、分析、研判、预警工作。", "id": "p4323"},
  {"type": "multi", "question": "发生数据安全事件，有关主管部门应当采取哪些措施？（  ）", "options": ["A.依法启动应急预案", "B.采取相应的应急处置措施", "C.防止危害扩大", "D.消除安全隐患"], "answer": "ABCD", "explanation": "第二十一条：应当依法启动应急预案，采取相应的应急处置措施，防止危害扩大，消除安全隐患。", "id": "p4324"},
  {"type": "multi", "question": "从事数据交易中介服务的机构应当履行哪些义务？（  ）", "options": ["A.要求数据提供方说明数据来源", "B.审核交易双方的身份", "C.留存审核、交易记录", "D.保证数据质量"], "answer": "ABC", "explanation": "第三十三条：要求数据提供方说明数据来源，审核交易双方的身份，并留存审核、交易记录。", "id": "p4325"},
  {"type": "multi", "question": "违反本法规定，对核心数据处理不当，情节严重的，可以采取哪些措施？（  ）", "options": ["A.责令暂停相关业务", "B.停业整顿", "C.吊销相关业务许可证", "D.吊销营业执照"], "answer": "ABCD", "explanation": "第四十六条：还可以责令暂停相关业务、停业整顿、吊销相关业务许可证或者营业执照。", "id": "p4326"},
  {"type": "judgment", "question": "《数据安全法》适用于在中华人民共和国境内开展数据处理活动及其安全监管。", "options": ["对", "错"], "answer": "对", "explanation": "第二条：在中华人民共和国境内开展数据处理活动及其安全监管，适用本法。", "id": "p4327"},
  {"type": "judgment", "question": "数据安全是指通过采取必要措施，确保数据处于有效保护和合法利用的状态。", "options": ["对", "错"], "answer": "对", "explanation": "第三条：数据安全，是指通过采取必要措施，确保数据处于有效保护和合法利用的状态，以及具备保障持续安全状态的能力。", "id": "p4328"},
  {"type": "judgment", "question": "非经中华人民共和国主管机关批准，境内的组织、个人可以向境外司法或者执法机构提供存储于境内的数据。", "options": ["对", "错"], "answer": "错", "explanation": "第三十六条：非经中华人民共和国主管机关批准，境内的组织、个人不得向境外司法或者执法机构提供存储于中华人民共和国境内的数据。", "id": "p4329"},
  {"type": "judgment", "question": "开展数据处理活动发现数据安全漏洞等风险时，应当立即采取补救措施，而非在24小时内。", "options": ["对", "错"], "answer": "对", "explanation": "第二十九条：发现数据安全缺陷、漏洞等风险时，应当立即采取补救措施，并无24小时的规定。", "id": "p4330"},
  {"type": "single", "question": "根据《网络安全法》，网络运营者应当留存相关的网络日志不少于多长时间？（  ）", "options": ["A. 三个月", "B. 六个月", "C. 一年", "D. 两年"], "answer": "B", "explanation": "《网络安全法》第二十一条", "id": "p5331"},
  {"type": "single", "question": "网络产品、服务的提供者发现安全缺陷、漏洞等风险时，应当采取下列哪项措施？（  ）", "options": ["A. 立即公开漏洞信息", "B. 立即采取补救措施，并向有关主管部门报告", "C. 仅内部修复即可", "D. 等待用户反馈"], "answer": "B", "explanation": "《网络安全法》第二十二条", "id": "p5332"},
  {"type": "single", "question": "根据《网络安全法》，关键信息基础设施的运营者在境内运营中收集和产生的个人信息和重要数据应当如何存储？（  ）", "options": ["A. 可以在境外存储", "B. 应当在境内存储", "C. 由企业自行决定存储地点", "D. 应当在亚洲地区存储"], "answer": "B", "explanation": "《网络安全法》第三十七条", "id": "p5333"},
  {"type": "single", "question": "网络运营者收集、使用个人信息，应当遵循的原则不包括下列哪项？（  ）", "options": ["A. 合法", "B. 正当", "C. 必要", "D. 全面"], "answer": "D", "explanation": "《网络安全法》第四十一条", "id": "p5334"},
  {"type": "single", "question": "根据《网络安全法》，未经被收集者同意，网络运营者不得向他人提供个人信息，但下列哪种情形除外？（  ）", "options": ["A. 经过处理无法识别特定个人且不能复原的", "B. 经过加密处理的", "C. 经过脱敏处理的", "D. 经过匿名化但可复原的"], "answer": "A", "explanation": "《网络安全法》第四十二条", "id": "p5335"},
  {"type": "single", "question": "个人发现网络运营者收集、存储的其个人信息有错误的，有权要求网络运营者采取下列哪项措施？（  ）", "options": ["A. 删除", "B. 更正", "C. 复制", "D. 转移"], "answer": "B", "explanation": "《网络安全法》第四十三条", "id": "p5336"},
  {"type": "single", "question": "违反《网络安全法》规定，没有违法所得的，最高可处以多少罚款？（  ）", "options": ["A. 五十万元", "B. 一百万元", "C. 二百万元", "D. 五百万元"], "answer": "B", "explanation": "《网络安全法》第六十四条", "id": "p5337"},
  {"type": "single", "question": "根据《网络数据安全管理条例》，国家对网络数据实行什么保护制度？（  ）", "options": ["A. 统一保护", "B. 分类分级保护", "C. 重点保护", "D. 一般保护"], "answer": "B", "explanation": "《网络数据安全管理条例》第三条", "id": "p5338"},
  {"type": "single", "question": "网络数据处理者处理重要数据，应当依法开展数据安全风险评估，并向有关主管部门报送什么文件？（  ）", "options": ["A. 安全审计报告", "B. 风险评估报告", "C. 等级保护测评报告", "D. 渗透测试报告"], "answer": "B", "explanation": "《网络数据安全管理条例》第十条", "id": "p5339"},
  {"type": "single", "question": "根据《网络数据安全管理条例》，网络数据处理者年处理个人信息超过多少人的，应当向网信部门申请网络安全审查？（  ）", "options": ["A. 50万人", "B. 100万人", "C. 200万人", "D. 500万人"], "answer": "B", "explanation": "《网络数据安全管理条例》第十二条", "id": "p5340"},
  {"type": "single", "question": "处理100万人以上个人信息的网络数据处理者，应当多久开展一次数据安全评估？（  ）", "options": ["A. 每半年", "B. 每年", "C. 每两年", "D. 每三年"], "answer": "B", "explanation": "《网络数据安全管理条例》第十三条", "id": "p5341"},
  {"type": "single", "question": "根据《网络数据安全管理条例》，对重要数据的访问、使用、加工、传输等操作进行记录，留存时间不少于多少年？（  ）", "options": ["A. 一年", "B. 两年", "C. 三年", "D. 五年"], "answer": "C", "explanation": "《网络数据安全管理条例》第十七条", "id": "p5342"},
  {"type": "single", "question": "网络数据处理者处理个人信息应当具有明确、合理的目的，采取对个人权益影响最小的方式，不得怎样收集个人信息？（  ）", "options": ["A. 分类收集", "B. 过度收集", "C. 加密收集", "D. 匿名收集"], "answer": "B", "explanation": "《网络数据安全管理条例》第二十条", "id": "p5343"},

const SINGLE = QUESTIONS.filter(q => q.type === 'single');
const MULTI = QUESTIONS.filter(q => q.type === 'multi');
const JUDGMENT = QUESTIONS.filter(q => q.type === 'judgment');

// ==================== STATE ====================
const STORAGE_KEY = 'quiz_compliance_v1';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
if (!state.answers) state.answers = {};     // id -> {selected, correct}
if (!state.wrong) state.wrong = [];          // [id, ...]
if (!state.wrongCount) state.wrongCount = {};  // id -> number（累计错误次数）
if (!state.favorites) state.favorites = [];  // [id, ...]
if (!state.examHistory) state.examHistory = [];

// 随机练习状态
let randomCurrentQ = null;  // 当前随机题

// Current view state
let currentPage = 'dashboard';
let currentType = null;
let currentIndex = 0;
let currentQuestions = [];
let selectedOptions = new Set();
let answered = false;

// Exam state
let examActive = false;
let examQuestions = [];
let examIndex = 0;
let examAnswers = {};
let examTimer = null;
let examTimeLeft = 0;

// ==================== HELPERS ====================
function getQuestionsByType(type) {
  if (type === 'single') return SINGLE;
  if (type === 'multi') return MULTI;
  if (type === 'judgment') return JUDGMENT;
  return QUESTIONS;
}

function getTypeLabel(type) {
  return { single: '单选题', multi: '多选题', judgment: '判断题' }[type] || '';
}

function getStats() {
  const total = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter(a => a.correct).length;
  const wrong = state.wrong.length;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  return { total, correct, wrong, rate };
}

function getTypeStats(type) {
  const qs = getQuestionsByType(type);
  const ids = qs.map(q => q.id);
  const done = ids.filter(id => state.answers[id]).length;
  const correct = ids.filter(id => state.answers[id]?.correct).length;
  return { total: qs.length, done, correct, rate: done > 0 ? Math.round(correct / done * 100) : 0 };
}

function updateHeaderStats() {
  const s = getStats();
  document.getElementById('hdr-done').textContent = s.total;
  document.getElementById('hdr-rate').textContent = s.total > 0 ? s.rate + '%' : '-';
  document.getElementById('badge-single').textContent = SINGLE.length;
  document.getElementById('badge-multi').textContent = MULTI.length;
  document.getElementById('badge-judge').textContent = JUDGMENT.length;
  document.getElementById('badge-wrong').textContent = state.wrong.length;
  document.getElementById('badge-fav').textContent = state.favorites.length;
  document.getElementById('badge-short').textContent = OPEN_QUESTIONS.filter(q=>q.type==='short').length;
  document.getElementById('badge-case').textContent = OPEN_QUESTIONS.filter(q=>q.type==='case').length;
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ==================== NAVIGATION ====================
function switchPage(page, type) {
  // 切换 open 题型时重置 openIndex
  if (page === 'open' && type !== currentType) {
    openIndex = 0;
    openHintVisible = false;
    openAnswerVisible = false;
  }
  currentPage = page;
  currentType = type || null;
  currentIndex = 0;
  selectedOptions = new Set();
  answered = false;
  // 切换到随机练习时重置题目
  if (page === 'random') {
    randomCurrentQ = null;
  }

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  let selector = `[data-page="${page}${type ? '-' + type : ''}"]`;

  const navEl = document.querySelector(selector);
  if (navEl) navEl.classList.add('active');

  // Close mobile menu
  document.getElementById('sidebar').classList.remove('mobile-open');

  render();
}

function render() {

  if (currentPage === 'dashboard') renderDashboard(main);

  else if (currentPage === 'random') renderRandom(main);

// ==================== INTERACTIONS ====================
function selectOption(idx, isExam) {
  if (answered && !isExam) return;
  
  const q = currentPage === 'random' ? randomCurrentQ : currentQuestions[currentIndex];
  const isMulti = q.type === 'multi';
  
  if (isExam) {
    if (isMulti) {
      if (selectedOptions.has(idx)) selectedOptions.delete(idx);
      else selectedOptions.add(idx);
    } else {
      selectedOptions = new Set([idx]);
    }
    // Save exam answer
    examAnswers[q.id] = [...selectedOptions];
    render();
    return;
  }

  if (isMulti) {
    if (selectedOptions.has(idx)) selectedOptions.delete(idx);
    else selectedOptions.add(idx);
    render();
    return;
  }
  
  // Single choice or judgment - auto check
  selectedOptions = new Set([idx]);
  checkAnswer(q, isExam);
}

function confirmMulti() {
  if (selectedOptions.size === 0) return;
  const q = currentPage === 'random' ? randomCurrentQ : currentQuestions[currentIndex];
  checkAnswer(q, false);
}

function checkAnswer(q, isExam) {
  if (isExam) return;
  
  answered = true;
  let correct = false;
  
  if (q.type === 'judgment') {
    const selected = [...selectedOptions][0];
    const selectedAnswer = selected === 0 ? '对' : '错';
    correct = selectedAnswer === q.answer;
  } else {
    const selectedLetters = [...selectedOptions].map(i => String.fromCharCode(65 + i)).sort().join('');
    const correctLetters = q.answer.split('').sort().join('');
    correct = selectedLetters === correctLetters;
  }
  
  state.answers[q.id] = { selected: [...selectedOptions], correct };
  
  if (!correct) {
    if (!state.wrong.includes(q.id)) state.wrong.push(q.id);
    state.wrongCount[q.id] = (state.wrongCount[q.id] || 0) + 1;
  } else {
    state.wrong = state.wrong.filter(id => id !== q.id);
  }
  
  saveState(state);
  render();
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (currentPage === 'examActive') {
    finishExam();
  } else {
    // Go back to dashboard or show completion
    render();
  }
}

function nextRandomQuestion() {
  drawRandomQuestion();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function goToQuestion(idx) {
  currentIndex = idx;
  answered = false;
  selectedOptions = new Set();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleFavorite(id) {
  if (state.favorites.includes(id)) {
    state.favorites = state.favorites.filter(fid => fid !== id);
  } else {
    state.favorites.push(id);
  }
  saveState(state);
  render();
}

function startExam() {
  // Random select questions
  const shuffled_s = [...SINGLE].sort(() => Math.random() - 0.5).slice(0, 30);
  const shuffled_m = [...MULTI].sort(() => Math.random() - 0.5).slice(0, 8);
  const shuffled_j = [...JUDGMENT].sort(() => Math.random() - 0.5).slice(0, 4);
  
  examQuestions = [...shuffled_s, ...shuffled_m, ...shuffled_j];
  examIndex = 0;
  examAnswers = {};
  examTimeLeft = 60 * 60; // 60 minutes
  examActive = true;
  
  currentPage = 'examActive';
  currentQuestions = examQuestions;
  currentIndex = 0;
  selectedOptions = new Set();
  answered = false;
  
  // Start timer
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(() => {
    examTimeLeft--;
    const timerEl = document.getElementById('exam-timer');
    if (timerEl) {
      const m = Math.floor(examTimeLeft / 60);
      const s = examTimeLeft % 60;
      timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    if (examTimeLeft <= 0) finishExam();
  }, 1000);
  
  render();
}
