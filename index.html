<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人信息保护合规审计 · 刷题系统</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --surface3: #2c3040;
  --border: #353a4a;
  --text: #e4e6ed;
  --text2: #9ca0b0;
  --text3: #6b7084;
  --accent: #6c8cff;
  --accent2: #4a6ae5;
  --accent-glow: rgba(108,140,255,0.15);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Open Questions */
.open-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  margin-bottom: 16px;
  background: var(--surface2);
}
.open-qnum {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.open-question {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 14px;
  white-space: pre-wrap;
}
.open-actions { display: flex; gap: 10px; margin-bottom: 10px; }
.open-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface3);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.open-btn:hover { background: var(--surface); color: var(--text); }
.open-btn.active.hint-btn { background: rgba(251,191,36,0.15); border-color: var(--yellow); color: var(--yellow); }
.open-btn.active.answer-btn { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.open-block {
  margin-top: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 14px 16px;
  background: var(--surface);
}
.answer-block { border-color: rgba(74,222,128,0.3); }
.open-block-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.open-block-content {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text2);
  white-space: pre-wrap;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo span { color: var(--accent); }

.header-stats {
  display: flex;
  gap: 20px;
  font-size: 13px;
  color: var(--text2);
}

.header-stats .stat-val { color: var(--text); font-weight: 600; }

/* Layout */
.app { display: flex; min-height: calc(100vh - 57px); }

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  flex-shrink: 0;
  overflow-y: auto;
  height: calc(100vh - 57px);
  position: sticky;
  top: 57px;
}

.nav-group { margin-bottom: 20px; }
.nav-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 12px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: all 0.15s;
  font-weight: 400;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }

.nav-item .icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.nav-item .badge {
  margin-left: auto;
  font-size: 11px;
  background: var(--surface3);
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}

.main {
  flex: 1;
  padding: 28px 36px;
  max-width: 900px;
  overflow-y: auto;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}

/* Dashboard */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.dash-card .num {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
}

.dash-card .label {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.dash-card.accent .num { color: var(--accent); }
.dash-card.green .num { color: var(--green); }
.dash-card.red .num { color: var(--red); }
.dash-card.yellow .num { color: var(--yellow); }

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--surface3);
  border-radius: 4px;
  overflow: hidden;
  margin: 12px 0;
}

.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}

/* Question display */
.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.q-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
}

.q-tag.single { background: rgba(108,140,255,0.15); color: var(--accent); }
.q-tag.multi { background: var(--yellow-bg); color: var(--yellow); }
.q-tag.judgment { background: rgba(168,85,247,0.15); color: #a855f7; }

.q-num { font-size: 13px; color: var(--text3); }

.q-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.8;
  margin-bottom: 24px;
  color: var(--text);
}

.q-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.q-actions button {
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.q-actions button:hover { border-color: var(--accent); color: var(--accent); }
.q-actions button.fav-active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 15px;
  line-height: 1.6;
  user-select: none;
}

.option:hover { border-color: var(--accent); background: var(--accent-glow); }

.option .opt-mark {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  transition: all 0.15s;
  margin-top: 1px;
}

.option.selected { border-color: var(--accent); background: var(--accent-glow); }
.option.selected .opt-mark { border-color: var(--accent); background: var(--accent); color: #fff; }

.option.correct { border-color: var(--green); background: var(--green-bg); }
.option.correct .opt-mark { border-color: var(--green); background: var(--green); color: #fff; }

.option.wrong { border-color: var(--red); background: var(--red-bg); }
.option.wrong .opt-mark { border-color: var(--red); background: var(--red); color: #fff; }

.option.disabled { pointer-events: none; }

.option.multi-mode .opt-mark { border-radius: 6px; }

/* Explanation */
.explanation {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 16px 20px;
  margin-top: 16px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text2);
  display: none;
}

.explanation.show { display: block; }
.explanation .exp-title { color: var(--accent); font-weight: 600; margin-bottom: 6px; font-size: 13px; }

.result-line {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  display: none;
}

.result-line.show { display: flex; align-items: center; gap: 8px; }
.result-line.correct { color: var(--green); }
.result-line.wrong { color: var(--red); }

/* Navigation buttons */
.nav-btns {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 12px;
}

.btn {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover { background: var(--accent2); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--accent); color: var(--text); }

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-confirm-multi {
  background: var(--accent);
  color: #fff;
  padding: 10px 28px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: none;
}

.btn-confirm-multi.show { display: inline-block; }

/* Question grid (for navigation) */
.q-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
  margin: 16px 0;
}

.q-grid-item {
  width: 100%;
  aspect-ratio: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text2);
}

.q-grid-item:hover { border-color: var(--accent); }
.q-grid-item.current { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
.q-grid-item.answered-correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.q-grid-item.answered-wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }

/* Exam mode */
.exam-timer {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.exam-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* Exam result */
.exam-result {
  text-align: center;
  padding: 40px 20px;
}

.exam-score {
  font-size: 72px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
}

.exam-score-label { font-size: 14px; color: var(--text3); margin-top: 4px; }

.exam-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 28px 0;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state .title { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }

/* Settings */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.setting-row:last-child { border-bottom: none; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .q-grid { grid-template-columns: repeat(8, 1fr); }
  .header { padding: 12px 16px; }
  .mobile-menu-btn { display: block; }
}

.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
}

@media (max-width: 768px) {
  .mobile-menu-btn { display: block; }
  .sidebar.mobile-open {
    display: block;
    position: fixed;
    top: 57px;
    left: 0;
    z-index: 200;
    width: 260px;
    height: calc(100vh - 57px);
    box-shadow: 4px 0 20px rgba(0,0,0,0.4);
  }
}

/* Fade animation */
.fade-in {
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    <div class="logo"><span>合规审计</span> 刷题系统</div>
  </div>
  <div class="header-stats">
    <div>已做 <span class="stat-val" id="hdr-done">0</span></div>
    <div>正确率 <span class="stat-val" id="hdr-rate">-</span></div>
  </div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="nav-group">
      <div class="nav-label">练习模式</div>
      <div class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard">
        <span class="icon">📊</span> 总览 
      </div>
      <div class="nav-item" onclick="switchPage('practice', 'single')" data-page="practice-single">
        <span class="icon">📝</span> 单选题 <span class="badge" id="badge-single">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('practice', 'multi')" data-page="practice-multi">
        <span class="icon">☑️</span> 多选题 <span class="badge" id="badge-multi">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('practice', 'judgment')" data-page="practice-judgment">
        <span class="icon">⚖️</span> 判断题 <span class="badge" id="badge-judge">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('random')" data-page="random">
        <span class="icon">🎲</span> 随机练习
      </div>
      <div class="nav-item" onclick="switchPage('open','short')" data-page="open-short">
        <span class="icon">✍️</span> 简答题 <span class="badge" id="badge-short">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('open','case')" data-page="open-case">
        <span class="icon">📂</span> 案例分析 <span class="badge" id="badge-case">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-label">考试 & 复习</div>
      <div class="nav-item" onclick="switchPage('exam')" data-page="exam">
        <span class="icon">🏆</span> 模拟考试
      </div>
      <div class="nav-item" onclick="switchPage('wrong')" data-page="wrong">
        <span class="icon">❌</span> 错题本 <span class="badge" id="badge-wrong">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('fav')" data-page="fav">
        <span class="icon">⭐</span> 收藏夹 <span class="badge" id="badge-fav">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-label">设置</div>
      <div class="nav-item" onclick="switchPage('settings')" data-page="settings">
        <span class="icon">⚙️</span> 设置
      </div>
    </div>
  </div>

  <div class="main" id="main-content">
    <!-- Content rendered by JS -->
  </div>
</div>

<script>
// ==================== OPEN QUESTIONS DATA ====================
const OPEN_QUESTIONS = [
  // ===== 简答题（来自原题库）=====
  {
    id: "o1", type: "short", category: "简答题",
    question: "列举个人信息处理活动的合法性基础的重点审查事项。",
    hint: "从知情同意、重新取得同意、单独同意/书面同意、不需要取得同意四个维度展开。",
    answer: `重点审查以下四个方面：
①【知情同意】基于个人同意处理个人信息的，是否取得个人同意，该同意是否由个人在充分知情的前提下自愿、明确作出。
②【重新取得同意】基于个人同意处理个人信息的，个人信息的处理目的、处理方式、处理的个人信息种类发生变更的，是否重新取得个人同意。
③【单独同意或书面同意】是否依照法律、行政法规规定取得个人单独同意或者书面同意。
④【不需要取得个人同意的情形】处理个人信息未取得个人同意的，是否属于法律、行政法规规定不需取得个人同意的情形。`
  },
  {
    id: "o2", type: "short", category: "简答题",
    question: "列举个人信息委托处理的重点审查事项。",
    hint: "从评估、合同、监督三个环节入手。",
    answer: `①【委托前影响评估】个人信息处理者在委托处理个人信息前，是否开展个人信息保护影响评估。
②【委托处理合同】与受托人签订的合同，是否约定了委托处理的目的、期限、方式、个人信息的种类、保护措施以及双方的权利义务等。
③【定期查验受托人】是否采取定期检查等方式，对受托人的个人信息处理活动进行监督。`
  },
  {
    id: "o3", type: "short", category: "简答题",
    question: "列举处理敏感个人信息的重点审查事项。",
    hint: "包含单独同意、未成年人监护人同意、必要性、影响评估、告知、书面同意、限制性规定共七点。",
    answer: `①处理生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等敏感个人信息，是否事前取得个人的单独同意。
②处理不满十四周岁未成年人个人信息，是否事前取得未成年人父母或其他监护人的同意。
③处理敏感个人信息的目的、方式、范围是否合法、正当、必要。
④是否在事前进行个人信息保护影响评估。
⑤是否向个人告知处理敏感个人信息的必要性以及对个人权益的影响（法律规定保密或无需告知的除外）。
⑥法律、行政法规规定应当取得书面同意的，是否取得书面同意。
⑦是否遵守法律、行政法规对处理敏感个人信息的限制性规定。`
  },
  {
    id: "o4", type: "short", category: "简答题",
    question: "列举个人信息删除权保障情况的重点审查事项。",
    hint: "对应《个保法》规定的五种应当删除的情形，以及技术上难以实现时的替代措施。",
    answer: `①处理目的已实现、无法实现或不再必要时，是否删除或匿名化处理个人信息。
②个人信息处理者停止提供产品或服务，或个人注销账号时，是否删除或匿名化处理。
③保存期限已届满，是否删除或匿名化处理。
④个人撤回同意，是否删除或匿名化处理。
⑤个人信息处理者违反法律法规或约定处理个人信息，是否删除或匿名化处理。

③范围关系：两者可能交叉（如涉及1000万人以上的个人信息，按《数安条例》须遵守重要数据处理者相关义务），但不完全重合（如气象数据、地理数据不含个人信息但属重要数据）。`

    answer: `【单独同意的法律含义】
根据《数安条例》，"单独同意"是指个人针对其个人信息进行特定处理而专门作出的具体、明确的同意。

【与一揽子同意的区别】
·一揽子同意：指用户在隐私政策或用户协议中一次性对多项个人信息处理活动作出概括性同意，通常以勾选隐私政策方式实现。
·单独同意：须就特定处理活动（如向第三方提供、处理敏感个人信息等）单独设置同意入口，不得与其他同意事项捆绑。

【需要取得单独同意的情形】
包括：向第三方提供个人信息、处理敏感个人信息、在公共场所收集人脸信息用于非安全目的、向境外提供个人信息等。`

const QUESTIONS = [{"type": "single", "question": "对于关键信息基础设施运营者和处理个人信息达到国家网信部门规定数量的个人信息处理者处理个人信息的相关活动，以下描述错误的是?（）", "options": ["A.在中华人民共和国境内收集和产生的个人信息，应当存储在境内。", "B.在中华人民共和国境内收集和产生的个人信息确需向境外提供的，应当通过国家网信部门组织的安全评估。", "C.法律、行政法规和国家网信部门规定可以不进行安全评估的，可以从其规定。", "D.在中华人民共和国境内收集和产生的个人信息可以存储在境内或者境外。"], "answer": "D", "explanation": "《个人信息保护法》第四十条关键信息基础设施运营者和处理个人信息达到国家网信部门规定数量的个人信息处理者，应当将在中华人民共和国境内收集和产生的个人信息存储在境内。确需向境外提供的，应当通过国家网信部门组织的安全评估；法律、行政法规和国家网信部门规定可以不进行安全评估的，从其规定。", "id": "s1"}, {"type": "single", "question": "根据《个人信息保护法》,以下哪类信息不属于敏感个人信息?(  )", "options": ["A.身份证号码", "B.个人征信信息", "C.电话号码", "D.14周岁以下(不含)未成年人的个人信息"], "answer": "C", "explanation": "", "id": "s2"}, {"type": "single", "question": "个人信息处理者在受理个人信息主体注销账户请求后，需要人工处理的，应在多长时间内必须完成核查和处理?(  )", "options": ["A.2个工作日", "B.7个工作日", "C.15个工作日", "D.30个工作日"], "answer": "C", "explanation": "", "id": "s3"}, {"type": "single", "question": "以下哪项不属于个人信息主体自主作出的肯定性动作?(  )", "options": ["A.主动点击", "B.注册", "C.填写", "D.默认勾选"], "answer": "D", "explanation": "", "id": "s4"}, {"type": "single", "question": "开展以下哪种个人信息处理活动需要进行个人信息保护影响评估?(  )", "options": ["A.处理敏感个人信息", "B.自动化决策", "C.个人信息出境", "D.以上都是"], "answer": "D", "explanation": "", "id": "s5"}, {"type": "single", "question": "关于利用个人信息进行自动化决策，以下说法错误的是?(  )", "options": ["A.应当保证决策的透明度和结果公平、公正", "B.不得对个人在交易条件上实行不合理的差别待遇", "C.必须向个人提供拒绝方式或不针对其个人特征的选项", "D.需要征得个人的单独同意"], "answer": "D", "explanation": "", "id": "s6"}, {"type": "single", "question": "以下关于敏感个人信息的理解哪个是正确的?(  )", "options": ["A.敏感个人信息和重要数据是指同一个概念", "B.敏感个人信息不同于隐私", "C.所有处理敏感个人信息的情形必须取得个人信息主体的同意", "D.敏感个人信息不包括个人财产信息"], "answer": "B", "explanation": "", "id": "s7"}, {"type": "single", "question": "根据我国《个人信息保护法》,通过自动化决策方式向个人进行信息推送、商业营销，应当同时提供不针对其个人特征的选项，或者向个人提供便捷的(  )方式。", "options": ["A.选择", "B.拒绝", "C.同意", "D.查看"], "answer": "B", "explanation": "", "id": "s8"}, {"type": "single", "question": "在公共场所安装图像采集、个人身份识别设备，所收集的个人图像、身份识别信息只能用于( ),不得用于其他目的；取得个人单独同意的除外。", "options": ["A、维护公共秩序的目的", "B、维护信息安全的目的", "C、维护公序良俗的目的维护公共安全的目的", "D、维护公共安全的目的"], "answer": "D", "explanation": "", "id": "s9"}, {"type": "single", "question": "下列选项违反收集个人信息的最小必要原则的是?(  )", "options": ["A.甲使用一款导航App导航，该App要求甲输入出发地和目的地并要求打开手机的位置权限。", "B.乙使用一款导航App,该App还包含了网约车功能，但要求用户提供电话号码、支付方式才能使用网约车功能。", "C.丙使用一款外卖App,该App要求丙提供个人的收货地址、联系方式、支付方式和位置权限。", "D.丁使用一款购物App,该App要求丁提供个人的收货地址、联系方式和支付方式。"], "answer": "C", "explanation": "C要位置权限无意义，属于非必须的个人信息。", "id": "s10"}, {"type": "single", "question": "以下哪种情况可以向第三方提供收集到的敏感个人信息?(  )", "options": ["A.经过处理无法识别特定个人且不能复原", "B.向个人详细说明向第三方提供个人信息的用途和范围", "C.收集个人信息前已经通过一揽子授权的方式取得了个人的同意", "D.第三方承诺不对外泄露提供的敏感个人信息"], "answer": "A", "explanation": "BCD均错误。B没有征得个人的单独同意，C同样，D承诺没有意义，必须征得个人单独同意，除非是法律规定的例外情况。", "id": "s11"}, {"type": "single", "question": "在处理下列哪种个人信息时，应当制定专门的个人信息处理规则?", "options": ["A.敏感个人信息", "B.不满十四周岁未成年人个人信息", "C.关键信息基础设施收集的个人信息", "D.向境外提供的个人信息"], "answer": "B", "explanation": "根据《个人信息保护法》第三十一条“个人信息处理者处理不满十四周岁未成年人个人信息的，应当制定专门的个人信息处理规则。”,B选项正确，当选；A、C、D均未要求必须制定专门的处理规则，都不当选。", "id": "s12"}, {"type": "single", "question": "个人信息主体请求注销账户，注销过程如需进行身份核验，要求个人信息主体再次提供的个人信息类型应：", "options": ["A.要求和注册时提供的个人信息类型一样多", "B.不多于注册、使用等服务环节收集的个人信息类型", "C.根据实际情况，由个人信息处理者确定提供的个人信息类型", "D.至少包括联系方式和身份证号码"], "answer": "B", "explanation": "《GB/T35273—2020个人信息安全规范》8.5个人信息主体注销账户对个人信息控制者的要求包括：\na)通过注册账户提供产品或服务的个人信息控制者，应向个人信息主体提供注销账户的方法，且方法简便易操作；\nb)受理注销账户请求后，需要人工处理的，应在承诺时限内(不超过15个工作日)完成核查和处理；\nc)注销过程如需进行身份核验，要求个人信息主体再次提供的个人信息类型不应多于注册、使用等服务环节收集的个人信息类型；\nd)注销过程不应设置不合理的条件或提出额外要求增加个人信息主体义务，如注销单个账户视同注销多个产品或服务，要求个人信息主体填写精确的历史操作记录作为注销的必要条件等；", "id": "s13"}, {"type": "single", "question": "小安在某求职网站上上传了自己的一些基本信息，希望有公司会聘用他，但是有一天他发现该网站公布的他的信息有错误，小安连忙联系了网站的运营方，该运营方应当为小安：", "options": ["A.提供注销账户的方法", "B.提供请求更正或补充信息的方法", "C.提供删除信息的方法", "D.提供信息复制的方法"], "answer": "B", "explanation": "《个人信息保护法》第四十六条：个人发现其个人信息不准确或者不完整的，有权请求个人信息处理者更正、补充。个人请求更正、补充其个人信息的，个人信息处理者应当对其个人信息予以核实，并及时更正、补充。", "id": "s14"}, {"type": "single", "question": "下列哪一项是个人信息处理者委托处理个人信息时的正确做法?(  )", "options": ["A.在委托合同中约定个人信息安全保护措施", "B.受托人超过受托范围处理个人信息", "C.不对受托人的个人信息处理活动进行监督", "D.未经委托人同意，转委托他人处理个人信息"], "answer": "A", "explanation": "《个人信息保护法》第二十一条个人信息处理者委托处理个人信息的，应当与受托人约定委托处理的目的、期限、处理方式、个人信息的种类、保护措施以及双方的权利和义务等，并对受托人的个人信息处理活动进行监督。\n受托人应当按照约定处理个人信息，不得超出约定的处理目的、处理方式等处理个人信息；委托合同不生效、无效、被撤销或者终止的，受托人应当将个人信息返还个人信息处理者或者予以删除，不得保留。\n未经个人信息处理者同意，受托人不得转委托他人处理个人信息。\n根据前述规定，B、C、D错误，A选项符合受托人与委托人约定约定保护措施的规定。", "id": "s15"}, {"type": "single", "question": "个人信息保护影响评估应包括的内容是?(  )", "options": ["A、个人信息的处理目的、处理方式等是否合法、正当、必要", "B、对个人权益的影响及安全风险", "C、所采取的保护措施是否合法、有效并与风险程度相适应", "D、以上都包含"], "answer": "D", "explanation": "《个人信息保护法》第五十六条\n个人信息保护影响评估应当包括下列内容：\n(一)【合规性】个人信息的处理目的、处理方式等是否合法、正当、必要；\n(二)【影响】对个人权益的影响及安全风险；\n(三)【针对影响采取的控制措施】所采取的保护措施是否合法、有效并与风险程度相适应。\n个人信息保护影响评估报告和处理情况记录应当至少保存三年。", "id": "s16"}, {"type": "single", "question": "下列选项，应当将个人信息存储在中华人民共和国境内的是?(  )", "options": ["A.甲县民政局收集的婚姻登记信息", "B.乙公司是一家初创企业，非关键信息基础设施运营者，拥有十多万消费者客户,因业务需要签订的一千份电子合同，合同上有客户个人信息。", "C.丙公司是关键信息基础设施运营者，其在非洲援建时在非洲收集的当地员工个人信息。", "D.丁公司处理敏感个人信息量达到了一个亿，其在香港的分公司收集的香港居民个人信息。"], "answer": "A", "explanation": "", "id": "s17"}, {"type": "single", "question": "下列选项违反《个人信息保护法》的是?(  )", "options": ["A.甲平台利用个人信息进行自动化决策，识别出是新用户后，会给新用户提供一张8折优惠券。", "B.乙公司通过自动化决策方式向用户进行个性化广告推荐，乙公司会在个性化推荐之外同时展示了其他的广告。", "C.丙公司通过自动化决策向用户进行个性化广告推荐，丙公司向用户提供了关闭个性化广告推荐的选项，但用户很难找到该选项。", "D.丁银行的App有自动判断用户贷款额度的功能，用户对App自动判断的额度有异议的，可以申请人工复核。"], "answer": "C", "explanation": "", "id": "s18"}, {"type": "single", "question": "下列关于未成年人个人信息保护的选项正确的是?(  )", "options": ["A.18周岁以下未成年人的个人信息为敏感个人信息。", "B.处理16周岁以下未成年人个人信息应当取得该未成年人父母或其他监护人同意", "C.处理16周岁以下未成年人个人信息应当制定专门的处理规则。", "D.15岁的小明在注册账号时，只需自己同意就可以填写相关个人信息。(正确答案)"], "answer": "D", "explanation": "", "id": "s19"}, {"type": "single", "question": "小王是公司的数据管理专员，目前正在忙于数据出境安全评估的申报工作。在申报之前，公司应当先进行自评估，下列哪一项不属于自评估应当考虑的?(  )", "options": ["A.拟向境外提供的数据的经济价值", "B.拟向境外提供的数据的规模", "C.境外接收方处理数据的必要性", "D.境外接收方是否有能力保障出境数据的安全"], "answer": "A", "explanation": "", "id": "s20"}, {"type": "single", "question": "下列哪项行为行为需要进行网络安全审查?(  )", "options": ["A.境内A公司是一家视频网站，注册用户100万，想到纳斯达克上市。", "B.境内B公司是一家网购平台，平台用户注册量有1000万，欲到香港上市。", "C.境内C公司是一家提供跨国订酒店业务的公司，注册用户500万，因业务需要需要向境外提供个人信息。", "D.境内D公司自上年1月1日起累计向境外提供了10万个人信息。"], "answer": "A", "explanation": "网络安全审查办法第七条 掌握超过100万用户个人信息的网络平台运营者赴国外上市，必须向网络安全审查办公室申报网络安全审查。", "id": "s21"}, {"type": "single", "question": "下列哪项行为会被认为“未公开收集使用个人信息规则”?(  )", "options": ["A.在App中设有独立隐私政策文本", "B.隐私政策需要通过4次操作才能访问", "C.在App首次运行时通过弹窗方式提示用户阅读隐私政策", "D.隐私政策的文字又小又密，阅读吃力。"], "answer": "D", "explanation": "", "id": "s22"}, {"type": "single", "question": "以下哪项行为属于“未明示收集使用个人信息的目的、方式和范围”?(  )", "options": ["A.个人信息使用规则对应的内容通俗易懂", "B.在隐私政策中明示App收集使用个人信息的目的、方式和范围", "C.直接更新隐私政策，不通知用户。", "D.申请打开收集个人信息权限时同步告知用户目的"], "answer": "C", "explanation": "", "id": "s23"}, {"type": "single", "question": "以下哪项行为不会被认定为“未经用户同意收集使用个人信息”?(  )", "options": ["A.实际收集的个人信息没有超出用户授权范围", "B.以默认选择同意隐私政策等非明示方式征求用户同意", "C.故意隐瞒、掩饰收集使用个人信息的真实目的，误导用户同意收集个人信息", "D.违反公布的收集使用规则收集使用个人信息。"], "answer": "A", "explanation": "", "id": "s24"}, {"type": "single", "question": "收集使用个人信息的目的、方式、范围发生变化时，下列哪项行为不属于通知用户的适当方式?（）", "options": ["A.直接更新", "B.弹窗消息", "C.邮件告知", "D.红点提示"], "answer": "A", "explanation": "", "id": "s25"}, {"type": "single", "question": "下列哪项活动适用《个人信息保护法》?(  )", "options": ["A.甲参加同学聚会，为了方便同学日后联系，收集了同学们的联系方式并建立了同学录。", "B.乙参加同学聚会，为了向同学们推送自家产品，收集了同学们的联系方式。(正确答案)", "C.丙喜欢追星，会去收集喜欢明星的生日、爱好、个人行程等信息。", "D.丁的爷爷奶奶想出去旅游，丁收集爷爷奶奶的身份信息帮他们订机票，酒店。"], "answer": "B", "explanation": "解析：B。\n《个人信息保护法》第七十二条自然人因个人或者家庭事务处理个人信息的，不适用本法。\n法律对各级人民政府及其有关部门组织实施的统计、档案管理活动中的个人信息处理有规定的，适用其规定。", "id": "s26"}, {"type": "single", "question": "下列告知方式符合法律规定的是?(  )", "options": ["A.甲App的某项需要收集用户的位置信息，在隐私政策里告知用户需要使用位置信息的是哪些功能，并在该功能需要调用位置信息时弹窗告知用户。", "B.乙App在其隐私政策里写到：为了更好地为用户提供服务，将会收集用户姓名、位置信息和检索记录等信息。", "C.丙App在其隐私政策里详尽地列出了哪种功能需要处理哪种个人信息，同时为了让隐私政策更可信，使用了大量的专业术语。", "D.丁App在其隐私政策里使用通俗易懂的语言告知了用户需要哪些功能需要处理哪种个人信息，但其隐私政策使用字体过小、排版紧凑，用户阅读起来很费劲。"], "answer": "A", "explanation": "", "id": "s27"}, {"type": "single", "question": "下列处理个人信息的活动，无需对个人进行告知的是?(  )", "options": ["A.甲到房屋登记中心办理房屋登记，房屋登记中心需要收集甲的姓名、身份证号和房屋信息。", "B.乙到银行办理贷款业务，银行需要查询乙的征信信息。", "C.公安机关办理一起涉黑案件，经有关办案程序批准后对犯罪嫌疑人丙进行监听。", "D.丁医院急诊室来了一名的患者，为了对进行救治，需要了解其个人基本信息、既往病史等，医生通过系统直接获取用户信息。"], "answer": "C", "explanation": "解析：C。\n《个人信息保护法》第十八条个人信息处理者处理个人信息，有法律、行政法规规定应当保密或者不需要告知的情形的，可以不向个人告知前条第一款规定的事项\n紧急情况下为保护自然人的生命健康和财产安全无法及时向个人告知的，个人信息处理者应当在紧急情况消除后及时告知。", "id": "s28"}, {"type": "single", "question": "哪项技术是个人信息合规审计中用于验证数据完整性和未被篡改的关键手段?", "options": ["A.数字签名", "B.数据去重", "C.入侵检测", "D.数据脱敏"], "answer": "A", "explanation": "A.数字签名。数字签名可以验证数据的完整性和来源。", "id": "s29"}, {"type": "single", "question": "在个人信息合规审计中，哪项技术可以帮助处理敏感数据?", "options": ["A.数据挖掘", "B.数据脱敏", "C.数据加密", "D.数据仓库"], "answer": "B", "explanation": "答案：B.数据脱敏。数据脱敏技术可以替换或修改敏感数据，以保护个人信息的隐私和安全。", "id": "s30"}, {"type": "single", "question": "在进行个人信息合规审计时，哪项技术有助于识别和防止未授权的数据访问?", "options": ["A.加密通信", "B.数据挖掘", "C.去标识化", "D.访问控制"], "answer": "D", "explanation": "D.访问控制。访问控制技术可以限制对数据的访问，只有经过授权的用户才能访问相关数据。", "id": "s31"}, {"type": "single", "question": "个人信息处理者应当每年编制本组织个人信息保护合规审计计划，年度审计计划应当报(  )批准，并确保相关方知悉。", "options": ["A.IT管理部门", "B.组织最高管理层", "C.法务部门", "D.内部审计部门"], "answer": "B", "explanation": "", "id": "s32"}, {"type": "single", "question": "处理超过(  )个人信息的个人信息处理者，每年至少开展一次；其他个人信息处理者，每(  )年至少开展一次。", "options": ["A.10万人；1", "B.100万人；1", "C.10万人；2", "D.100万人；2"], "answer": "D", "explanation": "", "id": "s33"}, {"type": "single", "question": "个人信息保护合规审计过程中收集或发现的与审计依据有关并能够证实的记录、事实陈述或其他信息，是(  )。", "options": ["A.审计证据", "B.审计发现", "C.审计结论", "D.审计结果"], "answer": "A", "explanation": "", "id": "s34"}, {"type": "single", "question": "执行个人信息保护合规审计的专业机构应当保持独立性和客观性，连续为同一审计对象开展个人信息保护合规审计不得超过(  )次。", "options": ["A.1", "B.2", "C.3", "D.4"], "answer": "C", "explanation": "", "id": "s35"}, {"type": "single", "question": "审计个人信息处理者在个人信息安全事件应急预案方面的合规性时，哪一项不是必需的?(  )", "options": ["A.公司是否制定个人信息安全事件应急预案(若有，则提供该预案的文本)", "B.公司的个人信息安全事件应急预案是否经过信息安全专家审定", "C.公司是否就个人信息安全事件应急预案实施演练(若有，请提供演练记录)", "D.预案是否与公司面临的风险相适应"], "answer": "B", "explanation": "", "id": "s36"}, {"type": "single", "question": "执行个人信息保护合规审计任务时，审计团队收集的审计证据不包括以下哪项?(  )", "options": ["A.用户交互界面截图", "B.同行的数据合规实践", "C.公司内部流程与记录", "D.信息安全等技术文档"], "answer": "B", "explanation": "", "id": "s37"}, {"type": "single", "question": "审计个人信息处理者在个人信息权利响应上的合规时，可以从下列哪个方面收集审计证据?(  )", "options": ["A.应用的用户交互界面", "B.隐私政策/个人信息保护政策", "C.技术措施", "D.以上都需要"], "answer": "D", "explanation": "", "id": "s38"}, {"type": "single", "question": "审计下列哪项合规义务，审计团队需进入信息系统收集审计证据?(  )", "options": ["A.处理敏感个人信息前，应向个人告知处理敏感个人信息的必要性以及对个人权益的影响", "B.对外提供个人信息前应实施个人信息保护影响评估", "C.获取儿童监护人的同意前，应验证儿童监护人的身份。", "D.对于通过信息系统收集处理个人信息的个人信息处理者，如收集处理个人信息是基于取得用户同意的，则个人信息处理者应对用户的同意进行记录。"], "answer": "D", "explanation": "", "id": "s39"}, {"id": "s123", "type": "single", "question": "审计隐私政策(个人信息保护政策)时，下列哪项不应被判定为不合规?", "options": ["A.更新隐私政策中，将原本为订票而收集的地理位置权限同时用于网约车叫车，未重新取得用户同意。", "B.更新隐私政策时，增加了隐私政策中陈述收集的个人信息字段，未重新取得用户同意", "C.更新的隐私政策中变更了处理者的联系邮箱，仅告知用户，未重新取得用户同意。", "D.隐私政策陈述的安全保护措施与公司实际不一致"], "answer": "C", "explanation": ""}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，该办法自何时起施行？", "options": ["A.2024年5月20日", "B.2025年5月1日", "C.2024年2月12日", "D.2025年1月1日"], "answer": "B", "explanation": "", "id": "s40"}, {"type": "single", "question": "处理超过多少万人个人信息的个人信息处理者，应当每两年至少开展一次个人信息保护合规审计？", "options": ["A.100万", "B.500万", "C.1000万", "D.5000万"], "answer": "C", "explanation": "", "id": "s41"}, {"type": "single", "question": "以下哪项不属于《App违法违规收集使用个人信息行为认定方法》中定义的“未公开收集使用规则”的行为？", "options": ["A.在App中没有隐私政策", "B.隐私政策内容晦涩难懂、冗长繁琐", "C.未逐一列出App收集使用个人信息的目的、方式、范围", "D.征得用户同意前就开始收集个人信息"], "answer": "D", "explanation": "", "id": "s42"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，个人信息保护合规审计是指对个人信息处理者的个人信息处理活动是否遵守什么的情况进行审查和评价的监督活动？", "options": ["A.法律、行政法规", "B.公司内部规定", "C.行业最佳实践", "D.用户协议"], "answer": "A", "explanation": "", "id": "s43"}, {"type": "single", "question": "App以默认选择同意隐私政策等非明示方式征求用户同意，可被认定为什么行为？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的", "C.未经用户同意收集使用个人信息", "D.违反必要原则"], "answer": "C", "explanation": "", "id": "s44"}, {"type": "single", "question": "对个人信息处理者指定的个人信息保护负责人履职情况进行合规审计时，不属于重点审查事项的是？", "options": ["A.是否具有相关的工作经历和专业知识", "B.是否被赋予充分的权限", "C.是否公开联系方式", "D.是否为公司高层管理人员"], "answer": "D", "explanation": "", "id": "s45"}, {"type": "single", "question": "在申请打开可收集个人信息的权限，或申请收集用户身份证号、银行账号等个人敏感信息时，未同步告知用户其目的，属于下列哪种行为？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的、方式和范围", "C.未经用户同意收集使用个人信息", "D.超范围收集个人信息"], "answer": "B", "explanation": "", "id": "s46"}, {"type": "single", "question": "《网络安全标准实践指南——个人信息保护合规审计要求》文件的发布机构是？", "options": ["A.全国网络安全标准化技术委员会", "B.国家互联网信息办公室", "C.工业和信息化部", "D.公安部"], "answer": "A", "explanation": "", "id": "s47"}, {"type": "single", "question": "利用用户个人信息和算法定向推送信息，但未提供非定向推送信息的选项，这可被认定为什么？", "options": ["A.算法滥用", "B.算法歧视", "C.未经用户同意收集使用个人信息", "D.超出用户授权范围"], "answer": "C", "explanation": "", "id": "s48"}, {"type": "single", "question": "根据《个人信息保护合规审计指引》，对个人信息处理者开展的个人信息保护相关的安全教育和培训情况进行合规审计时，应当重点审查？", "options": ["A.培训内容、方式、对象、频率等能否满足需要", "B.培训是否收费", "C.培训讲师的资历", "D.员工是否全部参加"], "answer": "A", "explanation": "", "id": "s49"}, {"type": "single", "question": "App更新时自动将用户设置的权限恢复到默认状态，这是什么行为？", "options": ["A.技术故障", "B.未经用户同意更改其设置的可收集个人信息权限状态", "C.提升用户体验的必要措施", "D.未明示收集规则"], "answer": "B", "explanation": "", "id": "s50"}, {"type": "single", "question": "以下哪项不是《网络安全标准实践指南——个人信息保护合规审计要求》中列出的审计依据？", "options": ["A.《个人信息保护法》", "B.《App违法违规收集使用个人信息行为认定方法》", "C.GB/T35273《信息安全技术-个人信息安全规范》", "D.《欧盟通用数据保护条例》（GDPR）"], "answer": "D", "explanation": "", "id": "s51"}, {"type": "single", "question": "个人信息处理者发生或者可能发生个人信息泄露、篡改、丢失事件时，未采取补救措施，属于违反了？", "options": ["A.安全保障义务", "B.告知同意义务", "C.必要原则", "D.透明度原则"], "answer": "A", "explanation": "", "id": "s52"}, {"type": "single", "question": "在App首次运行时，未通过弹窗、文本链接及附件等明确方式，向用户展示隐私政策，属于？", "options": ["A.未公开收集使用规则", "B.未明示收集目的", "C.未经用户同意", "D.违反必要原则"], "answer": "A", "explanation": "", "id": "s53"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，当保护部门发现个人信息处理活动存在较大风险时，可以要求个人信息处理者做什么？", "options": ["A.立即停止运营", "B.缴纳罚款", "C.委托专业机构进行合规审计", "D.公开道歉"], "answer": "C", "explanation": "", "id": "s54"}, {"type": "single", "question": "某App收集用户的行踪轨迹信息用于“改进产品体验”，但“改进产品体验”的描述过于模糊，难以理解，这可被认定为？", "options": ["A.未公开收集规则", "B.未明示收集使用个人信息的目的", "C.超范围收集", "D.欺诈诱骗"], "answer": "B", "explanation": "", "id": "s55"}, {"type": "single", "question": "某App以“不授权某权限就退出App”的方式强迫用户授权，这属于？", "options": ["A.典型的商业模式", "B.未公开收集规则", "C.正常的用户引导", "D.违反必要原则，以多种方式强制用户同意"], "answer": "D", "explanation": "", "id": "s56"}, {"type": "single", "question": "《个人信息保护合规审计指引》中，对“处理个人信息的合法性”进行审计，不包括审查哪项内容？", "options": ["A.个人信息处理活动是否具有明确、合理的目的", "B.个人信息处理是否具有合法性基础", "C.个人信息处理是否遵循“告知-同意”规则", "D.个人信息处理是否能为企业带来最大收益"], "answer": "D", "explanation": "", "id": "s57"}, {"type": "single", "question": "用户明确表示不同意某App收集其个人信息后，该App仍频繁征求用户同意，干扰其正常使用，这属于？", "options": ["A.正常提醒", "B.未经用户同意收集使用个人信息", "C.技术BUG", "D.尽力争取用户"], "answer": "B", "explanation": "", "id": "s58"}, {"type": "single", "question": "个人信息处理者自行开展个人信息保护合规审计的，审计主体可以是？", "options": ["A.只能是外部专业机构", "B.只能是公司法务部门", "C.内部机构或者委托专业机构", "D.只能是公司CEO"], "answer": "C", "explanation": "", "id": "s59"}, {"type": "single", "question": "处理超1000万以上的个人信息处理者，要求每几年至少开展一次合规审计（）", "options": ["A、1年", "B、2年", "C、3年", "D、4年"], "answer": "B", "explanation": "", "id": "s60"}, {"type": "single", "question": "某平台分发应用程序时，发现其中有应用程序存在违法违规收集个人信息情况，应（ ）", "options": ["A、正常分发", "B、向用户告知该情况", "C、停止分发", "D、将该应用程序放在平台程序列表末尾"], "answer": "C", "explanation": "", "id": "s61"}, {"type": "single", "question": "以下属于无效的审计证据的是（ ）", "options": ["A、被篡改的日志", "B、由测试机构加盖公章的测试报告", "C、被访谈人员签字或书面确认的记录", "D、经过了正当的起草或批准程序并生效实施的管理制度"], "answer": "A", "explanation": "", "id": "s62"}, {"type": "single", "question": "个人信息处理者按照保护部门要求开展个人信息保护合规审计的，在完成合规审计后，应 （ ）", "options": ["A、将审计报告提交给监管部门备案", "B、个人信息保护合规审计报告应当由专业机构主要负责人、合规审计负责人签字并加盖专业机构公章。", "C、无需任何后续操作", "D、将审计报告公开发布"], "answer": "B", "explanation": "", "id": "s63"}, {"type": "single", "question": "哪项活动前，法律规定必须进行个人信息保护影响评估？", "options": ["A.对个人权益具有重大影响的个人信息处理活动", "B. 所有的个人信息处理活动", "C. 每次App版本更新", "D. 公司市场推广活动"], "answer": "A", "explanation": "", "id": "s64"}, {"type": "single", "question": "某App的隐私政策中使用大量专业术语，导致用户难以理解，这可被认定为？", "options": ["A. 未明示收集使用个人信息的目的、方式和范围", "B. 技术实力强的表现", "C. 法律文件规范性的体现", "D. 未公开收集使用规则"], "answer": "A", "explanation": "", "id": "s65"}, {"type": "single", "question": "以下哪项不是《个人信息保护法》规定的个人信息处理原则？", "options": ["A. 合法、正当、必要", "B. 诚实信用", "C. 公开、透明", "D. 商业利益最大化"], "answer": "D", "explanation": "", "id": "s66"}, {"type": "single", "question": "App将所收集的个人信息，在未告知用户的情况下，共享给关联公司，这违反了什么原则？", "options": ["A. 最小必要原则", "B. 存储期限最小化原则", "C. 公开透明与告知同意原则", "D. 数据安全原则"], "answer": "C", "explanation": "", "id": "s67"}, {"type": "single", "question": "某App要求用户一次性同意开启所有权限，包括非必要的权限，否则无法使用。这种行为属于？", "options": ["A. 优化用户体验", "B. 违反必要原则，强迫用户同意", "C. 行业惯例", "D. 高效的授权方式"], "answer": "B", "explanation": "", "id": "s68"}, {"type": "single", "question": "审计报告中“审计发现”部分不包含以下哪个内容？", "options": ["A. 问题的详细描述", "B. 问题的性质定性", "C. 问题产生的原因分析", "D. 对被审计人员的处罚建议"], "answer": "D", "explanation": "", "id": "s69"}, {"type": "single", "question": "某App收集了用户的通讯录信息，但其核心功能是播放音乐，这种行为很可能被认定为？", "options": ["A. 违反必要原则，收集与提供服务无关的个人信息", "B. 丰富了App的功能", "C. 为未来的“社交听歌”功能做准备", "D. 用户已同意，不构成违规"], "answer": "A", "explanation": "", "id": "s70"}, {"type": "single", "question": "个人信息处理者向他人提供其处理的个人信息的，应当向个人告知接收方的相关信息，但不包括？", "options": ["A. 接收方的名称或者姓名", "B. 联系方式", "C. 处理目的、处理方式和个人信息的种类", "D. 接收方的员⼯数量"], "answer": "D", "explanation": "", "id": "s71"}, {"type": "single", "question": "当收集使用个人信息的目的、方式、范围发生变化时，App运营者应该怎么做？", "options": ["A. 无需任何操作", "B. 以适当方式通知用户，如更新隐私政策并提醒阅读", "C. 在后台默默更新即可", "D. 等待下次用户重新安装App时再告知"], "answer": "B", "explanation": "", "id": "s72"}, {"type": "single", "question": "某App以利益诱惑的方式，如“同意授权即送红包”，诱导用户同意提供非必要的个人信息，这种行为属于？", "options": ["A. 正常的营销活动", "B. 提升用户福利", "C. 以欺诈、诱骗等不正当方式误导用户", "D. 创新的用户互动方式"], "answer": "C", "explanation": "", "id": "s73"}, {"type": "single", "question": "《个人信息保护合规审计指引》中，对数据出境情况进行审计，不包括以下哪个方面？", "options": ["A. 是否符合法定条件和要求", "B. 是否向个人告知相关情况并取得其单独同意", "C. 是否进行了个人信息保护影响评估", "D. 境外接收方的国家是否与我国有时差"], "answer" 需向境外提供个人信息", "B.按照劳动合同实施跨境人力资源管理，确需向境外提供员工个人信息", "C.为员工招聘实施跨境人力资源管理，确需向境外提供员工个人信息", "D.为履行境外证券监管法定义务，确需向境外提供个人信息"], "answer": "A", "explanation": "", "id": "s95"}, {"type": "single", "question": "《个人信息保护合规审计管理办法》的制定主要依据是以下哪部法律", "options": ["A.《网络安全法》", "B.《数据安全法》", "C.《个人信息保护法》", "D.《电子商务法》"], "answer": "C", "explanation": "", "id": "s96"}, {"type": "single", "question": "某大型电商平台(注册用户8000万，月活用户2000万)自行开展个人信息保护合规审计时，必须履行以下哪项义务", "options": ["A.指定个人信息保护负责人负责审计工作", "B.成立主要由外部成员组成的独立监督机构", "C.聘请第三方专业机构实施年度审计", "D.向网信部门备案审计管理制度"], "answer": "B", "explanation": "", "id": "s97"}, {"type": "single", "question": "某短视频平台注册用户达1.2亿人，根据《个人信息保护合规审计管理办法》，其开展个人信息保护合规审计的最低频率要求是", "options": ["A.每三年至少一次", "B.每两年至少一次", "C.每五年至少一次", "D.根据风险自主确定频率"], "answer": "B", "explanation": "", "id": "s98"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》，审计人员查验“知情同意”合法性时，必须核验的关键要点是", "options": ["A.是否在业务合同中约定个人信息处理条款", "B.个人是否自愿、明确作出同意，无默认/强制同意", "C.是否通过电子邮件发送隐私政策", "D.是否每半年更新一次同意记录"], "answer": "B", "explanation": "", "id": "s99"}, {"type": "single", "question": "某电商平台使用用户行为数据自动化设定商品价格，审计人员查验其是否防止“不合理差别待遇”时，最关键的方法是", "options": ["A. 要求平台公开全部算法逻辑", "B.审查个人信息保护影响评估报告中的风险措施", "C.核验是否对所有用户提供人工复核选项", "D.检查自动化决策系统是否明示“可能影响交易条件“"], "answer": "B", "explanation": "", "id": "s100"}, {"type": "single", "question": "根据《个人信息保护合规审计管理办法》关于敏感个人信息处理的要求，个人信息处理者在处理敏感个人信息前必须履行哪项核心义务", "options": ["A.向主管部门提交年度数据安全报告", "B.公开披露敏感个人信息的处理目的", "C.获得个人信息主体的单独同意", "D.在事前进行个人信息保护影响评估"], "answer": "D", "explanation": "", "id": "s101"}, {"type": "single", "question": "若数据处理者需要向外国司法或执法机构提供存储于中国境内的个人信息，必须首先满足以下哪项法定条件", "options": ["A.获得国家网信部门的数据出境安全评估批准", "B.经过中华人民共和国主管机关的书面批准", "C.向个人信息主体逐项告知并获取单独同意", "D.在省级公安机关完成备案登记"], "answer": "B", "explanation": "", "id": "s102"}, {"type": "single", "question": "审计个人信息处理者是否保障个人在个人信息处理活动中的权利时，首要核查的核心义务是什么", "options": ["A.确保所有权利申请均在5个工作日内处理完毕", "B.建立便捷的个人行使权利的申请受理和处理机制", "C.向用户提供数据跨境传输的详细路径说明", "D.公开披露个人信息安全事件的历史记录"], "answer": "B", "explanation": "", "id": "s103"}, {"type": "single", "question": "根据我国《数据安全法》，下列陈述正确的是", "options": ["A.所有的数据处理者都应当设立数据安全负责人和数据安全管理机构", "B.所有的数据处理都应当设立专门的数据安全管理机构，但不要求设立数据安全负责人", "C.重要数据处理者应当设立数据安全负责人和数据安全管理机构", "D.重要数据处理应当设立专门的数据安全管理机构，但不要求设立数据安全负责人"], "answer": "C", "explanation": "", "id": "s104"}, {"type": "single", "question": "根据我国《数据安全法》，关于数据处理者义务的陈述正确的是", "options": ["A.数据处理者向境外提供数据时，都应当经过国家网信部门组织的数据出境安全评估", "B.数据处理者向境外提供个人信息时，都应当经过国家网信部门组织的数据出境安全评估", "C.数据处理者向境外提供重要数据时，可以采用标准合同的方式", "D.关键信息基础设施运营者向境外提供重要数据时应当经过国家网信部门组织的数据出境安全评估"], "answer": "D", "explanation": "", "id": "s105"}, {"type": "single", "question": "响应个人信息主体对其个人信息的査询、更正、删除、副本获取，撤回授权同意，注销账户的请求，个人信息处理者应在()期限内作出答复及合理解释，并告知个人信息主体外部纠纷解决途径。", "options": ["A.十五天内", "B.三十天内", "C.十五天内或法律法规规定的期限内", "D.三十天内或法律法规规定的期限内"], "answer": "D", "explanation": "", "id": "s106"}, {"id": "s124", "type": "single", "question": "个人信息保护影响评估报告和处理情况记录应当至少保存多少年？", "options": ["A.一年", "B.两年", "C.三年", "D.五年"], "answer": "C", "explanation": ""}, {"type": "single", "question": "以下说法中正确的是", "options": ["A.个人信息处理者与其他方有共享、转让协议的情况下，个人生物识别信息可以共享、转让", "B.在采集终端中直接使用个人生物识别信息实现身份识别、认证等功能", "C.将个人生物识别信息与个人身份信息存储在一个数据库表中", "D.收集个人生物识别信息前，无需单独征得个人信息主体的明示同意"], "answer": "B", "explanation": "", "id": "s107"}, {"type": "single", "question": "个人信息控制者向其他个人信息控制者提供个人信息前，应向个人信息主体告知接收方的名称或姓名、联系方式、处理目的、处理方式和个人信息的( )等。", "options": ["A.数量", "B.类型", "C.存储期限", "D.敏感程度"], "answer": "B", "explanation": "", "id": "s108"}, {"type": "single", "question": "个人信息控制者应将隐私政策发布在( )，并便于访问和阅读。", "options": ["A.内部办公系统", "B.企业内部宣传栏", "C.不易被发现的网站角落", "D.其收集使用个人信息的产品或服务的显著位置"], "answer": "D", "explanation": "", "id": "s109"}, {"type": "single", "question": "根据GB/T 45574-2025，个人信息处理者处理生物识别信息，在符合第5章和GB/T( )要求的基础上，符合其提出的特殊要求。", "options": ["A. 37988(数据安全能力成熟度模型)", "B. 41817(个人信息安全工程指南)", "C. 40660(生物特征识别信息保护基本要求)", "D. 37964(个人信息去标识化指南)"], "answer": "C", "explanation": "1、 我们讨论的主题是敏感个人信息处理的特殊安全要求，特别关注生物识别信息的处理。2. 提到在处理生物识别信息时，个人信息处理者需遵循第五章及相关国家标准的要求。\n在考试场景中，可能仅给出一串数字如373798 418174066037964，没有文字解释，要求考生识别出这是与敏感信息处理相关的标准代码。\n强调考生需要熟悉与敏感个人信息处理相关的国家标准，以便在考试中能够识别并正确回答相关问题。\n本题正确答案为C", "id": "s110"}, {"type": "single", "question": "个人信息处理者在什么情况下可以免于取得个人同意?", "options": ["A.为订立、履行合同所必需", "B.为提供个性化推荐服务", "C.为提高用户参与度进行用户画像", "D.为商业营销目的收集信息"], "answer": "A", "explanation": "", "id": "s111"}, {"type": "single", "question": "个人信息处理者向境外提供个人信息时，不需要向个人告知哪项内容?", "options": ["A.境外接收方的身份", "B.境外接收方的联系方式", "C.境外接收方的股东结构", "D.个人向境外接收方行使权利的方式"], "answer": "C", "explanation": "", "id": "s112"}, {"type": "single", "question": "在互联网房产经纪服务场景中，业主自行填写并提交房产信息后，平台应当:", "options": ["A.立即发布房源信息", "B.再次电话告知发布影响并取得同意", "C.等待3天后自动发布", "D.仅需系统审核即可发布"], "answer": "B", "explanation": "", "id": "s113"}, {"type": "single", "question": "GB/T 41391标准定义了“第三方应用”，以下不属于第三方应用提供的形式的是():", "options": ["A.小程序", "B.Web页面", "C.未直接向用户提供服务的SDK", "D. SDK"], "answer": "C", "explanation": "", "id": "s114"}, {"type": "single", "question": "以下哪项不属于敏感个人信息()", "options": ["A.身份证号", "B.设备IMEI号", "C.行踪轨迹", "D.健康状况"], "answer": "B", "explanation": "", "id": "s115"}, {"type": "single", "question": "根据GB/T 41391标准，不应频繁申请权限干扰用户正常使用，下列说法不属于“频繁”的形式是()", "options": ["A.单个场景在用户拒绝授权后，48h内弹框提示用户打开权限的次数超过1次;", "B.在用户拒绝授权后，24h内弹框提示用户打开权限的次数超过1次;", "C.每次重新打开App，都向用户索要权限", "D.使用相关业务功能时，提示用户缺少相关权限"], "answer": "D", "explanation": "", "id": "s116"}, {"type": "single", "question": "收集通讯录信息时，下列说法错误的是", "options": ["A、当用户使用添加或输入特定联系人信息(全量通讯录)等功能时，应仅读取用户选取的特定联系人信息，并允许用户自主输入联系人信息;", "B、通过系统权限读写通讯录的行为应由用户主动触发,并仅在相应业务功能使用时申请;集用户通讯录信息的删除渠道;", "C、如用户撤回同意通讯录权限，应提供已收通讯录信息提供至第三方。", "D.不应在未取得用户同意的情况下，在通讯录中增加、删除、修改联系人信息，或将收集的"], "answer": "C", "explanation": "", "id": "s117"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，敏感个人信息是一旦泄露或者非法使用，容易导致自然人的（）受到侵害或者人身、财产安全受到危害的个人信息，包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息，以及不满十四周岁未成年人的个人信息。", "options": ["A、人身安全", "B、人格尊严", "C、人格权益", "D、人身权利"], "answer": "B", "explanation": "", "id": "s118"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，个人信息处理者在处理个人信息前，应当以显著方式、清晰易懂的语言真实、准确、完整地向个人告知下列事项中哪一项是错误的：", "options": ["A、个人信息处理者的名称或者姓名和联系方式；", "B、个人信息的处理目的、处理方式，处理的个人信息种类、保存期限；", "C、个人行使本法规定权利的方式和程序；", "D、个人信息的处理目的、处理方式，处理的个人信息种类。"], "answer": "D", "explanation": "", "id": "s119"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，履行个人信息保护职责的部门在履行职责中，发现违法处理个人信息涉嫌犯罪的，应当及时移送（）依法处理。", "options": ["A、公安机关", "B、检察机关", "C、检查机关", "D、通信管理局"], "answer": "A", "explanation": "", "id": "s120"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，（）的个人信息处理者共同决定个人信息的处理目的和处理方式的，应当约定各自的权利和义务。但是，该约定不影响个人向其中任何一个个人信息处理者要求行使本法规定的权利。", "options": ["A、三个以上", "B、一个以上", "C、五个以上", "D、两个以上"], "answer": "D", "explanation": "", "id": "s121"}, {"type": "single", "question": "根据《中华人民共和国个人信息保护法》规定，履行个人信息保护职责的部门在履行职责中，发现个人信息处理活动存在（）或者发生个人信息安全事件的，可以按照规定的权限和程序对该个人信息处理者的法定代表人或者主要负责人进行约谈，或者要求个人信息处理者委托专业机构对其个人信息处理活动进行合规审计。", "options": ["A、低风险", "B、高风险", "C、风险", "D、较大风险"], "answer": "D", "explanation": "", "id": "s122"}, {"type": "multi", "question": "个人信息处理者利用个人信息进行自动化决策，应当保证决策的透明度和结果公平、公正，不得对个人在交易价格等交易条件上实行不合理的差别待遇。个人信息处理者应：(  )", "options": ["A.在使用过程中定期(至少每年一次)开展个人信息保护影响评估，并依评估结果改进保护个人信息主体的措施。", "B.在使用过程中定期(至少每半年一次)开展个人信息保护影响评估，并依评估结果改进保护个人信息主体的措施。", "C.在规划设计阶段或首次使用前开展个人信息保护影响评估，并依评估结果采取有效的保护个人信息主体的措施。", "D.向个人信息主体提供针对自动决策结果的投诉渠道，并支持对自动决策结果的人工复核。"], "answer": "ACD", "explanation": "标准35273 个人信息安全规范中7.7章节原文。", "id": "m1"}, {"type": "multi", "question": "依据《个人信息保护法》规定，下列哪些情形，个人信息处理者应当主动删除个人信息?(个人信息处理者未删除的，个人有权请求删除)(  )", "options": ["A.处理目的已实现、无法实现或者为实现处理目的不再必要", "B.个人信息处理者停止提供产品或者服务，或者保存期限已届满", "C.个人撤回同意", "D.人信息处理者违反法律、行政法规或者违反约定处理个人信息"], "answer": "ABCD", "explanation": "", "id": "m2"}, {"type": "multi", "question": "以下哪些行为违反了个人信息主体针对多项业务功能自主选择的要求?(  )", "options": ["A.以改善服务质量、提升使用体验、研发新产品、增强安全性等为由，强制要求个人信息主体同意收集其个人信息。", "B.当个人信息主体自主作出肯定性动作，如主动点击、勾选、填写等动作后，个人信息处理者在个人信息主体开启该业务功能前就开始收集个人信息。", "C.关闭或退出业务功能的途径或方式与个人信息主体选择使用业务功能的途径或方式同样方便。", "D.个人信息主体不授权同意使用、关闭或退出特定业务功能的，频繁征求个人信息主体的授权同意。"], "answer": "ABD", "explanation": "", "id": "m3"}, {"type": "multi", "question": "个人信息主体要求注销账户时，注销过程不应设置不合理的条件或提出额外要求增加个人信息主体义务，如(  )", "options": ["A.注销单个账户视同注销多个产品或服务", "B.注销账户后删除个人信息", "C.要求个人信息主体填写精确的历史操作记录作为注销的必要条件", "D.注销账户时必须要做身份核验"], "answer": "AC", "explanation": "", "id": "m4"}, {"type": "multi", "question": "个人信息主体权益定性方式可以分为以下几个维度?(  )", "options": ["A.限制个人自主决定权", "B.个人名誉受损或遭受精神压力", "C.引发差别性待遇", "D.人身财产受损"], "answer": "ABCD", "explanation": "", "id": "m5"}, {"type": "multi", "question": "依据《个人信息保护法》,哪些情况下个人信息处理者需要进行个人信息保护影响评估?(  )", "options": ["A.处理敏感个人信息", "B.利用个人信息进行自动化决策", "C.委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息", "D.向境外提供个人信息"], "answer": "ABCD", "explanation": "", "id": "m6"}, {"type": "multi", "question": "以下属于个人信息去标识化的有哪些?(  )", "options": ["A.住址：北京市昌平区天通苑8号楼808室→北京市**区**苑*号楼*室", "B.月薪：12000元→10000元～20000元(", "C.姓名：王小明→王重阳", "D.手机号152****1111"], "answer": "ABCD", "explanation": "", "id": "m7"}, {"type": "multi", "question": "委托第三方专业机构进行个人信息保护合规审计的，应由第三方专业机构组建审计组，必要时，在保持独立原则的前提下，组织内部的（）等具有审计或个人信息保护相关专业能力的人员可以参与审计并提供支持。*", "options": ["A.内审团队", "B.安全团队", "C.法务团队", "D.研发团队"], "answer": "ABC", "explanation": "", "id": "m8"}, {"type": "multi", "question": "审计方案编制完成后，审计组长和被审计方应对审计方案进行评审，审计方案评审应重点考虑以下哪些事项？（）", "options": ["A.结合以往开展的审计工作，审计方案是否可以改进。", "B.审计工作的过程和输出物是否遵循相关的法律法规、标准规范等的要求", "C.与审计工作有关的保密和安全事宜", "D.相关方对审计工作进一步的需求和期望"], "answer": "ABCD", "explanation": "", "id": "m9"}, {"type": "multi", "question": "个人信息保护合规审计常用的审计方法有哪些？（）", "options": ["A.访谈交流", "B.文件检查", "C.现场检查", "D.日志分析"], "answer": "ABCD", "explanation": "", "id": "m10"}, {"type": "multi", "question": "以下哪些行为可被认定为“未经用户同意收集使用个人信息”？", "options": ["A.征得用户同意前就开始收集个人信息", "B.用户明确表示不同意后，仍频繁征求用户同意、干扰用户正常使用", "C.实际收集的个人信息超出用户授权范围", "D.以默认选择同意隐私政策等非明示方式征求用户同意"], "answer": "ABCD", "explanation": "", "id": "m11"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，保护部门在哪些情况下可以要求个人信息处理者委托专业机构进行合规审计？", "options": ["A.发现个人信息处理活动存在较大风险的", "B.个人信息处理活动可能侵害众多个人权益的", "C.发生或者可能发生重大个人信息安全事件的", "D.个人信息处理者年度盈利未达预期的"], "answer": "ABC", "explanation": "", "id": "m12"}, {"type": "multi", "question": "《网络安全标准实践指南——个人信息保护合规审计要求》中，审计依据可包括哪些？", "options": ["A.国家法律，如《个人信息保护法》", "B.部门规章，如《个人信息保护合规审计办法》", "C.规范性文件，如《App违法违规收集使用个人信息行为认定方法》", "D.国家标准，如GB/T35273《个人信息安全规范》"], "answer": "ABCD", "explanation": "", "id": "m13"}, {"type": "multi", "question": "对个人信息保护影响评估情况进行合规审计时，应当重点审查哪些内容？", "options": ["A.是否依照法律规定开展评估", "B.是否对个人信息的处理目的、处理方式等进行合法、正当、必要评估", "C.是否对个人权益的影响及安全风险进行评估", "D.是否对所采取的保护措施的合法性、有效性进行评估"], "answer": "ABCD", "explanation": "", "id": "m14"}, {"type": "multi", "question": "以下哪些属于个人敏感信息？", "options": ["A.行踪轨迹", "B.设备MAC地址", "C.身份证号", "D.银行账号"], "answer": "ACD", "explanation": "", "id": "m15"}, {"type": "multi", "question": "以下哪些行为可被认定为“未明示收集使用个人信息的目的、方式和范围”？", "options": ["A.未逐一列出App收集使用个人信息的目的、方式、范围", "B.收集使用个人信息的目的发生变化时，未以适当方式通知用户", "C.申请收集身份证号时，未同步告知用户其目的", "D.有关收集使用规则的内容晦涩难懂、冗长繁琐"], "answer": "ABCD", "explanation": "", "id": "m16"}, {"type": "multi", "question": "对个人信息处理者指定的个人信息保护负责人履职情况进行合规审计，应重点审查？", "options": ["A.是否具有相关的工作经历和专业知识", "B.是否被赋予充分的权限", "C.是否在重大事项决策前有权提出意见和建议", "D.其薪酬水平是否在行业内具有竞争力"], "answer": "ABC", "explanation": "", "id": "m17"}, {"type": "multi", "question": "个人信息处理者在处理个人信息时，应遵循的基本原则包括？", "options": ["A.合法、正当、必要和诚信原则", "B.目的明确、合理，并与处理目的直接相关", "C.采取对个人权益影响最小的方式", "D.公开处理规则，明示处理的目的、方式和范围"], "answer": "ABCD", "explanation": "", "id": "m18"}, {"type": "multi", "question": "以下哪些行为违反了个人信息收集的“最小必要”原则？", "options": ["A.一款手电筒App，要求读取用户的通讯录", "B.一款地图App，要求获取用户的位置信息", "C.一款阅读App，要求开启用户的摄像头权限", "D.一款计算器App，要求收集用户的个人照片"], "answer": "ACD", "explanation": "", "id": "m19"}, {"type": "multi", "question": "个人在个人信息处理活动中享有的权利包括？", "options": ["A.知情权、决定权", "B.查阅、复制权", "C.更正、补充权", "D.删除权"], "answer": "ABCD", "explanation": "", "id": "m20"}, {"type": "multi", "question": "哪些属于《App违法违规收集使用个人信息行为认定方法》中认定的违法违规行为大类？", "options": ["A.未公开收集使用规则", "B.未明示收集使用个人信息的目的、方式和范围", "C.未经用户同意收集使用个人信息", "D.违反必要原则收集与其提供的服务无关的个人信息"], "answer": "ABCD", "explanation": "", "id": "m21"}, {"type": "multi", "question": "对个人信息处理的“安全保障”情况进行审计，可以包括审查？", "options": ["A.是否制定了内部管理制度和操作规程", "B.是否采取了加密、去标识化等安全技术措施", "C.是否制定并组织实施了个人信息安全事件应急预案", "D.是否购买了商业保险"], "answer": "ABC", "explanation": "", "id": "m22"}, {"type": "multi", "question": "个人信息处理者向境外提供个人信息，应当具备下列哪些条件之一？", "options": ["A.通过国家网信部门组织的安全评估", "B.按照国家网信部门的规定经专业机构进行个人信息保护认证", "C.与境外接收方订立标准合同", "D.获得公司董事会批准"], "answer": "ABC", "explanation": "", "id": "m23"}, {"type": "multi", "question": "专业的审计机构在进行个人信息保护合规审计时，应保持？", "options": ["A.独立性", "B.与被审计单位的良好私人关系", "C.客观性", "D.专业性"], "answer": "ACD", "explanation": "", "id": "m24"}, {"type": "multi", "question": "App运营者在定向推送新闻信息服务时，应当如何保障用户权益？", "options": ["A.向用户明示提供了定向推送服务", "B.向用户便捷的关闭定向推送服务的选项", "C.关闭定向推送后，App功能将受限", "D.必须付费才能关闭定向推送"], "answer": "AB", "explanation": "", "id": "m25"}, {"type": "multi", "question": "审计报告的“审计发现”部分，通常需要描述问题的哪些方面？", "options": ["A.事实", "B.定性", "C.原因", "D.影响或后果"], "answer": "ABCD", "explanation": "《数据安全技术个人信息保护合规审计要求》中审计报告包含内容原文。", "id": "m26"}, {"type": "multi", "question": "以下那些属于敏感个人信息（    ）", "options": ["A、用于登录终端的指纹", "B、抑郁症的医疗记录", "C、参加个保审计的考试地点", "D、CTO的宗教信仰"], "answer": "ABD", "explanation": "", "id": "m27"}, {"type": "multi", "question": "下列满足个人信息处理合规性的是（    ）", "options": ["A、贷款，分析收入支出数据", "B、未告知将个人信息共享给第三方", "C、疫情防控要求提供位置信息给疾控中心", "D、地产公司按照行业惯例查看人脸信息"], "answer": "AC", "explanation": "", "id": "m28"}, {"type": "multi", "question": "下列哪类个人信息向境外提供时应该开展数据出境安全评估（    ）", "options": ["a.3000个人信息同步给英国服务器", "b.关键基础设施处理者", "c.10万敏感个人信息", "d.99万个人信息"], "answer": "BC", "explanation": "", "id": "m29"}, {"type": "multi", "question": "哪个场景需要开展个人信息安全影响评估（    ）", "options": ["A、处理敏感个人信息", "B、利用个人信息进行自动化决策", "C、委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息", "D、向境外提供个人信息"], "answer": "ABCD", "explanation": "", "id": "m30"}, {"type": "multi", "question": "行使个人信息转移请求权，应当具备如下那些条件（    ）", "options": ["A.能够验证请求人的真实身份", "B.请求转移的是本人同意提供的或者基于合同收集的个人信息", "C.转移个人信息不损害他人合法权益", "D.支付合理的费用"], "answer": "ABC", "explanation": "GB/T 35273《信息安全技术 个人信息安全规范》8.7 响应个人信息主体的请求\n对个人信息控制者的要求包括：c)对合理的请求原则上不收取费用，但对一定时期内多次重复的请求，可视情收取一定成本费用。\n其中“支付合理费用”非行使个人信息转移请求权的必要条件，因此不选。", "id": "m31"}, {"type": "multi", "question": "以下哪些场景，个人信息处理者处理个人信息无需取得个人同意？", "options": ["A. 为订立、履行个人作为一方当事人的合同所必需", "B. 为履行法定职责或者法定义务所必需", "C. 为提升产品推荐精准度所必需", "D. 为应对突发公共卫生事件所必需"], "answer": "ABD", "explanation": "", "id": "m32"}, {"type": "multi", "question": "以下哪些做法有助于App运营者履行“告知”义务？", "options": ["A. 在App首次启动时，主动弹窗展示隐私政策摘要", "B. 在申请麦克风、相册等敏感权限时，同步说明使用目的", "C. 将隐私政策链接放在不显眼的位置", "D. 隐私政策内容清晰易懂，不使用晦涩术语"], "answer": "ABD", "explanation": "", "id": "m33"}, {"type": "multi", "question": "个人信息处理者应当对以下哪些活动定期进行合规审计？", "options": ["A. 遵守法律、行政法规的情况", "B. 个人信息处理活动的全过程", "C. 所采取的保护措施的有效性", "D. 公司的财务状况"], "answer": "ABC", "explanation": "", "id": "m34"}, {"type": "multi", "question": "一份完整的个人信息保护合规审计报告，其内容结构通常包括？", "options": ["A. 审计概述", "B. 审计依据", "C. 审计发现", "D. 审计结论与建议"], "answer": "ABCD", "explanation": "", "id": "m35"}, {"type": "multi", "question": "行使个人信息转移请求权，应当具备如下那些条件:)", "options": ["A.能够验证请求人的真实身份:", "B.请求转移的是本人同意提供的或者基于合同收集的个人信息;", "C.转移个人信息具备技术可行性;", "D.转移个人信息不损害他人合法权益;E.支付合理费用"], "answer": "ABCD", "explanation": "", "id": "m36"}, {"type": "multi", "question": "关于重要数据的范围，哪些说法是错误的:", "options": ["A.1000万人以上的个人信息是重要数据;", "B.汽车行业超过10万人的个人信息是重要数据;", "C.大量依法公开的企业工商数据是重要数据;", "D.超过10万人的敏感个人信息是重要数据,"], "answer": "ABCD", "explanation": "", "id": "m37"}, {"type": "multi", "question": "关于数据爬取，以下哪些说法是正确的:", "options": ["A.数据爬取均是违法活动;", "B.数据爬取不得非法侵入他人网络;", "C.数据爬取的流量不得超过网站日均流量三分之一;", "D.数据爬取不得破坏数据保护措施;E.数据爬取不得干扰网络服务正常运行。"], "answer": "BE", "explanation": "", "id": "m38"}, {"type": "multi", "question": "审计关键信息基础设施运营者(CIO)向境外提供个人信息时，审计人员必须执行哪些程序", "options": ["A. 查验数据出境安全评估报告，核验评估是否经国家网信部门组织", "B.检查平台系统记录，确认是否存在未经安全评估或超范围向境外提供个人信息", "C.审查评估报告中问题整改记录的完整性与有效性", "D.要求CIO提供所有接收方的当地数据保护认证证明"], "answer": "ABC", "explanation": "", "id": "m39"}, {"type": "multi", "question": "根据《个人信息保护合规审计管理办法》，专业机构开展个人信息保护合规审计时应满足哪些要求？", "options": ["A.不得将审计工作转委托给其他机构", "B.同一审计负责人对同一对象审计不得超过三次", "C.依法保密审计中获得的商业秘密和保密商务信息", "D.审计结束后应及时删除获取的个人信息"], "answer": "ACD", "explanation": "", "id": "m40"}, {"type": "multi", "question": "审计人员检查个人信息处理者是否履行删除或匿名化义务 const SINGLE = QUESTIONS.filter(q => q.type === 'single');
const MULTI = QUESTIONS.filter(q => q.type === 'multi');
const JUDGMENT = QUESTIONS.filter(q => q.type === 'judgment');

// ==================== STATE ====================
const STORAGE_KEY = 'quiz_compliance_v1';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
if (!state.answers) state.answers = {};     // id -> {selected, correct}
if (!state.wrong) state.wrong = [];          // [id, ...]
if (!state.favorites) state.favorites = [];  // [id, ...]
if (!state.examHistory) state.examHistory = [];

// Current view state
let currentPage = 'dashboard';
let currentType = null;
let currentIndex = 0;
let currentQuestions = [];
let selectedOptions = new Set();
let answered = false;

// Exam state
let examActive = false;
let examQuestions = [];
let examIndex = 0;
let examAnswers = {};
let examTimer = null;
let examTimeLeft = 0;

// ==================== HELPERS ====================
function getQuestionsByType(type) {
  if (type === 'single') return SINGLE;
  if (type === 'multi') return MULTI;
  if (type === 'judgment') return JUDGMENT;
  return QUESTIONS;
}

function getTypeLabel(type) {
  return { single: '单选题', multi: '多选题', judgment: '判断题' }[type] || '';
}

function getStats() {
  const total = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter(a => a.correct).length;
  const wrong = state.wrong.length;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  return { total, correct, wrong, rate };
}

function getTypeStats(type) {
  const qs = getQuestionsByType(type);
  const ids = qs.map(q => q.id);
  const done = ids.filter(id => state.answers[id]).length;
  const correct = ids.filter(id => state.answers[id]?.correct).length;
  return { total: qs.length, done, correct, rate: done > 0 ? Math.round(correct / done * 100) : 0 };
}

function updateHeaderStats() {
  const s = getStats();
  document.getElementById('hdr-done').textContent = s.total;
  document.getElementById('hdr-rate').textContent = s.total > 0 ? s.rate + '%' : '-';
  document.getElementById('badge-single').textContent = SINGLE.length;
  document.getElementById('badge-multi').textContent = MULTI.length;
  document.getElementById('badge-judge').textContent = JUDGMENT.length;
  document.getElementById('badge-wrong').textContent = state.wrong.length;
  document.getElementById('badge-fav').textContent = state.favorites.length;
  document.getElementById('badge-short').textContent = OPEN_QUESTIONS.filter(q=>q.type==='short').length;
  document.getElementById('badge-case').textContent = OPEN_QUESTIONS.filter(q=>q.type==='case').length;
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ==================== NAVIGATION ====================
function switchPage(page, type) {
  // 切换 open 题型时重置 openIndex
  if (page === 'open' && type !== currentType) {
    openIndex = 0;
    openHintVisible = false;
    openAnswerVisible = false;
  }
  currentPage = page;
  currentType = type || null;
  currentIndex = 0;
  selectedOptions = new Set();
  answered = false;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  let selector = `[data-page="${page}${type ? '-' + type : ''}"]`;
  if (!type) selector = `[data-page="${page}"]`;
  const navEl = document.querySelector(selector);
  if (navEl) navEl.classList.add('active');

  // Close mobile menu
  document.getElementById('sidebar').classList.remove('mobile-open');

  render();
}

function render() {
  const main = document.getElementById('main-content');
  
  if (currentPage === 'dashboard') renderDashboard(main);
  else if (currentPage === 'practice') renderPractice(main);
  else if (currentPage === 'random') renderRandom(main);
  else if (currentPage === 'exam') renderExam(main);
  else if (currentPage === 'wrong') renderWrong(main);
  else if (currentPage === 'fav') renderFavorites(main);
  else if (currentPage === 'settings') renderSettings(main);
  else if (currentPage === 'open') renderOpenPage(main);
  else if (currentPage === 'examActive') renderExamActive(main);
  else if (currentPage === 'examResult') renderExamResult(main);

  updateHeaderStats();
}

// ==================== DASHBOARD ====================
function renderDashboard(el) {
  const s = getStats();
  const ss = getTypeStats('single');
  const ms = getTypeStats('multi');
  const js = getTypeStats('judgment');
  
  el.innerHTML = `
    <div class="fade-in">
      <h2 style="margin-bottom:20px;font-size:22px;font-weight:700;">学习总览</h2>
      <div class="dash-grid">
        <div class="dash-card accent"><div class="num">${QUESTIONS.length}</div><div class="label">总题数</div></div>
        <div class="dash-card green"><div class="num">${s.total}</div><div class="label">已做题</div></div>
        <div class="dash-card"><div class="num" style="color:var(--green)">${s.rate}%</div><div class="label">正确率</div></div>
        <div class="dash-card red"><div class="num">${s.wrong}</div><div class="label">错题数</div></div>
      </div>
      
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">分类进度</h3>
        ${renderProgressRow('单选题', ss, 'single')}
        ${renderProgressRow('多选题', ms, 'multi')}
        ${renderProgressRow('判断题', js, 'judgment')}
      </div>
      
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">快速开始</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="switchPage('random')">🎲 随机练习</button>
          <button class="btn btn-secondary" onclick="switchPage('exam')">🏆 模拟考试</button>
          ${state.wrong.length > 0 ? '<button class="btn btn-secondary" onclick="switchPage(\'wrong\')">❌ 复习错题 (' + state.wrong.length + ')</button>' : ''}
        </div>
      </div>

      ${state.examHistory.length > 0 ? `
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">考试记录</h3>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${state.examHistory.slice(-5).reverse().map(e => `
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;">
              <span>${e.date}</span>
              <span style="color:var(--text2)">${e.total}题 · <span style="color:${e.score >= 60 ? 'var(--green)' : 'var(--red)'}">${e.score}分</span></span>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>
  `;
}

function renderProgressRow(label, stats, type) {
  const pct = stats.total > 0 ? Math.round(stats.done / stats.total * 100) : 0;
  return `
    <div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span style="cursor:pointer;color:var(--accent)" onclick="switchPage('practice','${type}')">${label}</span>
        <span style="color:var(--text3)">${stats.done}/${stats.total} · 正确率 ${stats.rate}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

// ==================== PRACTICE ====================
function renderPractice(el) {
  currentQuestions = getQuestionsByType(currentType);
  if (currentQuestions.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="title">暂无题目</div></div>';
    return;
  }
  
  renderQuestion(el, currentQuestions, currentIndex, false);
}

function renderRandom(el) {
  if (!currentQuestions.length || currentIndex === 0) {
    // 只从单选+多选+判断中随机抽题
    currentQuestions = [...QUESTIONS].sort(() => Math.random() - 0.5);
  }
  renderQuestion(el, currentQuestions, currentIndex, false);
}

function renderWrong(el) {
  const wrongQs = QUESTIONS.filter(q => state.wrong.includes(q.id));
  if (wrongQs.length === 0) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">🎉</div><div class="title">错题本为空</div><div>太棒了，继续保持！</div></div>';
    return;
  }
  currentQuestions = wrongQs;
  renderQuestion(el, currentQuestions, currentIndex, false);
}

function renderFavorites(el) {
  const favQs = QUESTIONS.filter(q => state.favorites.includes(q.id));
  if (favQs.length === 0) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">⭐</div><div class="title">收藏夹为空</div><div>点击题目中的收藏按钮添加</div></div>';
    return;
  }
  currentQuestions = favQs;
  renderQuestion(el, currentQuestions, currentIndex, false);
}

// ==================== QUESTION RENDERER ====================
function renderQuestion(el, questions, index, isExam) {
  if (index >= questions.length) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">🎉</div><div class="title">全部完成！</div></div>';
    return;
  }
  
  const q = questions[index];
  const prevAnswer = !isExam ? state.answers[q.id] : null;
  const isFav = state.favorites.includes(q.id);
  
  // Check if already answered in this session
  if (prevAnswer && !isExam) {
    answered = true;
    selectedOptions = new Set(prevAnswer.selected || []);
  }

  const tagClass = { single: 'single', multi: 'multi', judgment: 'judgment' }[q.type];
  const tagLabel = getTypeLabel(q.type);
  const isMulti = q.type === 'multi';
  
  let optionsHTML = '';
  if (q.type === 'judgment') {
    optionsHTML = ['对', '错'].map((opt, i) => {
      let cls = isMulti ? 'multi-mode' : '';
      const letter = String.fromCharCode(65 + i);
      if (answered || prevAnswer) {
        cls += ' disabled';
        if (selectedOptions.has(i)) {
          cls += prevAnswer?.correct || q.answer === opt ? ' correct' : ' wrong';
        } else if (q.answer === opt) {
          cls += ' correct';
        }
      } else if (selectedOptions.has(i)) {
        cls += ' selected';
      }
      return `<div class="option ${cls}" onclick="selectOption(${i}, ${isExam})">
        <span class="opt-mark">${opt === '对' ? '✓' : '✗'}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');
  } else {
    optionsHTML = q.options.map((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      let cls = isMulti ? 'multi-mode' : '';
      if (answered || prevAnswer) {
        cls += ' disabled';
        const correctLetters = q.answer.split('').map(l => l.charCodeAt(0) - 65);
        if (selectedOptions.has(i)) {
          cls += correctLetters.includes(i) ? ' correct' : ' wrong';
        } else if (correctLetters.includes(i)) {
          cls += ' correct';
        }
      } else if (selectedOptions.has(i)) {
        cls += ' selected';
      }
      // Remove leading letter prefix from option text
      let optText = opt.replace(/^[A-Da-d][.、\s]+/, '').trim();
      return `<div class="option ${cls}" onclick="selectOption(${i}, ${isExam})">
        <span class="opt-mark">${letter}</span>
        <span>${optText}</span>
      </div>`;
    }).join('');
  }

  // Result line
  let resultHTML = '';
  if (answered || prevAnswer) {
    const isCorrect = prevAnswer?.correct ?? false;
    resultHTML = `<div class="result-line show ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 回答正确' : '✗ 回答错误'} &nbsp;正确答案：${q.answer}</div>`;
  }

  // Explanation
  let expHTML = '';
  if ((answered || prevAnswer) && q.explanation) {
    expHTML = `<div class="explanation show"><div class="exp-title">解析</div>${q.explanation}</div>`;
  }

  // Confirm button for multi-choice
  let confirmBtn = '';
  if (isMulti && !answered && !prevAnswer && !isExam) {
    confirmBtn = `<button class="btn-confirm-multi ${selectedOptions.size > 0 ? 'show' : ''}" id="confirmBtn" onclick="confirmMulti()">确认提交 (${selectedOptions.size}项)</button>`;
  }

  // Navigation grid for practice mode
  let gridHTML = '';
  if (!isExam && questions.length > 1) {
    gridHTML = '<div class="q-grid">' + questions.map((qq, i) => {
      let gcls = '';
      if (i === index) gcls = 'current';
      else if (state.answers[qq.id]?.correct) gcls = 'answered-correct';
      else if (state.answers[qq.id] && !state.answers[qq.id].correct) gcls = 'answered-wrong';
      return `<div class="q-grid-item ${gcls}" onclick="goToQuestion(${i})">${i + 1}</div>`;
    }).join('') + '</div>';
  }

  el.innerHTML = `
    <div class="fade-in">
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-tag ${tagClass}">${tagLabel}</span>
          <span class="q-num">${index + 1} / ${questions.length}</span>
        </div>
        <div class="q-actions">
          <button onclick="toggleFavorite('${q.id}')" class="${isFav ? 'fav-active' : ''}">${isFav ? '★ 已收藏' : '☆ 收藏'}</button>
        </div>
      </div>
      
      <div class="q-text">${q.question}</div>
      ${isMulti && !answered && !prevAnswer ? '<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">（多选题，请选择所有正确选项后点击确认）</div>' : ''}
      <div class="options">${optionsHTML}</div>
      ${confirmBtn}
      ${resultHTML}
      ${expHTML}
      
      <div class="nav-btns">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← 上一题</button>
        <button class="btn btn-primary" onclick="nextQuestion()">${index >= questions.length - 1 ? '完成' : '下一题 →'}</button>
      </div>
      
      ${gridHTML}
    </div>
  `;
}

// ==================== INTERACTIONS ====================
function selectOption(idx, isExam) {
  if (answered && !isExam) return;
  
  const q = currentQuestions[currentIndex];
  const isMulti = q.type === 'multi';
  
  if (isExam) {
    if (isMulti) {
      if (selectedOptions.has(idx)) selectedOptions.delete(idx);
      else selectedOptions.add(idx);
    } else {
      selectedOptions = new Set([idx]);
    }
    // Save exam answer
    examAnswers[q.id] = [...selectedOptions];
    render();
    return;
  }

  if (isMulti) {
    if (selectedOptions.has(idx)) selectedOptions.delete(idx);
    else selectedOptions.add(idx);
    render();
    return;
  }
  
  // Single choice or judgment - auto check
  selectedOptions = new Set([idx]);
  checkAnswer(q, isExam);
}

function confirmMulti() {
  if (selectedOptions.size === 0) return;
  const q = currentQuestions[currentIndex];
  checkAnswer(q, false);
}

function checkAnswer(q, isExam) {
  if (isExam) return;
  
  answered = true;
  let correct = false;
  
  if (q.type === 'judgment') {
    const selected = [...selectedOptions][0];
    const selectedAnswer = selected === 0 ? '对' : '错';
    correct = selectedAnswer === q.answer;
  } else {
    const selectedLetters = [...selectedOptions].map(i => String.fromCharCode(65 + i)).sort().join('');
    const correctLetters = q.answer.split('').sort().join('');
    correct = selectedLetters === correctLetters;
  }
  
  state.answers[q.id] = { selected: [...selectedOptions], correct };
  
  if (!correct) {
    if (!state.wrong.includes(q.id)) state.wrong.push(q.id);
  } else {
    state.wrong = state.wrong.filter(id => id !== q.id);
  }
  
  saveState(state);
  render();
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (currentPage === 'examActive') {
    finishExam();
  } else {
    // Go back to dashboard or show completion
    render();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function goToQuestion(idx) {
  currentIndex = idx;
  answered = false;
  selectedOptions = new Set();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleFavorite(id) {
  if (state.favorites.includes(id)) {
    state.favorites = state.favorites.filter(fid => fid !== id);
  } else {
    state.favorites.push(id);
  }
  saveState(state);
  render();
}

function startExam() {
  // Random select questions
  const shuffled_s = [...SINGLE].sort(() => Math.random() - 0.5).slice(0, 30);
  const shuffled_m = [...MULTI].sort(() => Math.random() - 0.5).slice(0, 8);
  const shuffled_j = [...JUDGMENT].sort(() => Math.random() - 0.5).slice(0, 4);
  
  examQuestions = [...shuffled_s, ...shuffled_m, ...shuffled_j];
  examIndex = 0;
  examAnswers = {};
  examTimeLeft = 60 * 60; // 60 minutes
  examActive = true;
  
  currentPage = 'examActive';
  currentQuestions = examQuestions;
  currentIndex = 0;
  selectedOptions = new Set();
  answered = false;
  
  // Start timer
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(() => {
    examTimeLeft--;
    const timerEl = document.getElementById('exam-timer');
    if (timerEl) {
      const m = Math.floor(examTimeLeft / 60);
      const s = examTimeLeft % 60;
      timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    if (examTimeLeft <= 0) finishExam();
  }, 1000);
  
  render();
}

function renderExamActive(el) {
  const q = examQuestions[currentIndex];
  const isMulti = q.type === 'multi';
  
  // Restore selected options
  if (examAnswers[q.id]) {
    selectedOptions = new Set(examAnswers[q.id]);
  } else {

  }
  
  const m = Math.floor(examTimeLeft / 60);
  const s = examTimeLeft % 60;
  const timeStr = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  
  const answeredCount = Object.keys(examAnswers).length;
  
  const tagClass = { single: 'single', multi: 'multi', judgment: 'judgment' }[q.type];
  const tagLabel = getTypeLabel(q.type);
  
  let optionsHTML = '';
  if (q.type === 'judgment') {
    optionsHTML = ['对', '错'].map((opt, i) => {
      let cls = '';
      if (selectedOptions.has(i)) cls = 'selected';
      return `<div class="option ${cls}" onclick="examSelect(${i})">
        <span class="opt-mark">${opt === '对' ? '✓' : '✗'}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');
  } else {
    optionsHTML = q.options.map((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      let cls = isMulti ? 'multi-mode' : '';
      if (selectedOptions.has(i)) cls += ' selected';
      let optText = opt.replace(/^[A-Da-d][.、\s]+/, '').trim();
      return `<div class="option ${cls}" onclick="examSelect(${i})">

        <span>${optText}</span>
      </div>`;
    }).join('');

  const gridHTML = '<div class="q-grid">' + examQuestions.map((qq, i) => {
    let gcls = '';
    if (i === currentIndex) gcls = 'current';
    else if (examAnswers[qq.id]) gcls = 'answered-correct'; // just means answered
    return `<div class="q-grid-item ${gcls}" onclick="examGoTo(${i})">${i + 1}</div>`;
  }).join('') + '</div>';
  
  el.innerHTML = `
    <div class="fade-in">
      <div class="exam-bar">
        <div style="font-size:14px;color:var(--text2);">已答 <span style="color:var(--text);font-weight:600;">${answeredCount}</span> / ${examQuestions.length}</div>
        <div class="exam-timer" id="exam-timer">${timeStr}</div>
        <button class="btn btn-primary" onclick="finishExam()" style="font-size:13px;padding:8px 18px;">交卷</button>
      </div>
      
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-tag ${tagClass}">${tagLabel}</span>
          <span class="q-num">${currentIndex + 1} / ${examQuestions.length}</span>

function examSelect(idx) {
  const q = examQuestions[currentIndex];
  const isMulti = q.type === 'multi';
  
  if (isMulti) {
    if (selectedOptions.has(idx)) selectedOptions.delete(idx);
    else selectedOptions.add(idx);
  } else {
    selectedOptions = new Set([idx]);
  }
  
  examAnswers[q.id] = [...selectedOptions];
  render();
}

function examNext() {
  if (currentIndex < examQuestions.length - 1) {
    currentIndex++;
    selectedOptions = new Set();
    render();
  } else {
    finishExam();
  }
}

function examPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    selectedOptions = new Set();
    render();
  }
}

function examGoTo(idx) {
  currentIndex = idx;
  selectedOptions = new Set();
  render();
}

function finishExam() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  examActive = false;
  
  // Calculate score
  let score = 0;
  let correctCount = 0;
  let details = { single: { total: 0, correct: 0 }, multi: { total: 0, correct: 0 }, judgment: { total: 0, correct: 0 } };
  
  examQuestions.forEach(q => {
    const selected = examAnswers[q.id] || [];
    let isCorrect = false;
    
    if (q.type === 'judgment') {
      const ans = selected.length === 1 ? (selected[0] === 0 ? '对' : '错') : '';
      isCorrect = ans === q.answer;
      if (isCorrect) score += 2;
    } else if (q.type === 'single') {
      const ans = selected.map(i => String.fromCharCode(65 + i)).join('');
      isCorrect = ans === q.answer;
      if (isCorrect) score += 2;
    } else {
      const ans = selected.map(i => String.fromCharCode(65 + i)).sort().join('');
      const correct = q.answer.split('').sort().join('');
      isCorrect = ans === correct;
      if (isCorrect) score += 4;
    }
    
    if (isCorrect) correctCount++;
    details[q.type].total++;
    if (isCorrect) details[q.type].correct++;
    
    // Record in state
    state.answers[q.id] = { selected, correct: isCorrect };
    if (!isCorrect && !state.wrong.includes(q.id)) {
      state.wrong.push(q.id);
    } else if (isCorrect) {
      state.wrong = state.wrong.filter(id => id !== q.id);
    }
  });
  
  const totalPossible = details.single.total * 2 + details.multi.total * 4 + details.judgment.total * 2;
  
  // Save exam history
  const now = new Date();
  state.examHistory.push({
    date: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    score,
    totalPossible,
    total: examQuestions.length,
    correct: correctCount,
    details
  });
  
  saveState(state);
  
  // Show result
  currentPage = 'examResult';
  render();
}

}

function openNav(dir) {
  openIndex = Math.max(0, Math.min(openQuestions.length - 1, openIndex + dir));
  openHintVisible = false;
  openAnswerVisible = false;
  render();
}

function clearAnswers() {
  if (confirm('确定清除所有做题记录？')) {
    state.answers = {};
    saveState(state);
    render();
  }
}

function clearWrong() {
  if (confirm('确定清空错题本？')) {
    state.wrong = [];
    saveState(state);
    render();
  }
}

function clearFavorites() {
  if (confirm('确定清空收藏夹？')) {
    state.favorites = [];
    saveState(state);
    render();
  }
}

function resetAll() {
  if (confirm('确定重置所有数据？此操作不可恢复！')) {
    state = { answers: {}, wrong: [], favorites: [], examHistory: [] };
    saveState(state);
    render();
  }
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  if (currentPage === 'examActive' || currentPage === 'practice' || currentPage === 'random' || currentPage === 'wrong' || currentPage === 'fav') {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      if (currentPage === 'examActive') examNext();
      else nextQuestion();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (currentPage === 'examActive') examPrev();
      else prevQuestion();
    } else if (['1','2','3','4','a','b','c','d','A','B','C','D'].includes(e.key)) {
      let idx;
      if ('1234'.includes(e.key)) idx = parseInt(e.key) - 1;
      else idx = e.key.toUpperCase().charCodeAt(0) - 65;
      
      if (idx >= 0 && idx < (currentQuestions[currentIndex]?.options?.length || 0)) {
        if (currentPage === 'examActive') examSelect(idx);
        else selectOption(idx, false);
      }
    }
  }
});

// ==================== INIT ====================
render();
</script>
