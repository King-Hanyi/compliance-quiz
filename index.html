      <div class="exam-bar">
        <div style="font-size:14px;color:var(--text2);">已答 <span style="color:var(--text);font-weight:600;">${answeredCount}</span> / ${examQuestions.length}</div>
        <div class="exam-timer" id="exam-timer">${timeStr}</div>
        <button class="btn btn-primary" onclick="finishExam()" style="font-size:13px;padding:8px 18px;">交卷</button>
      </div>
      
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-tag ${tagClass}">${tagLabel}</span>
          <span class="q-num">${currentIndex + 1} / ${examQuestions.length}</span>
        </div>
      </div>
      
      <div class="q-text">${q.question}</div>
      ${isMulti ? '<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">（多选题）</div>' : ''}
      <div class="options">${optionsHTML}</div>
      
      <div class="nav-btns">
        <button class="btn btn-secondary" onclick="examPrev()" ${currentIndex === 0 ? 'disabled' : ''}>← 上一题</button>
        <button class="btn btn-primary" onclick="examNext()">${currentIndex >= examQuestions.length - 1 ? '交卷' : '下一题 →'}</button>
      </div>
      
      ${gridHTML}
    </div>
  `;
}

function examSelect(idx) {
  const q = examQuestions[currentIndex];
  const isMulti = q.type === 'multi';
  
  if (isMulti) {
    if (selectedOptions.has(idx)) selectedOptions.delete(idx);
    else selectedOptions.add(idx);
  } else {
    selectedOptions = new Set([idx]);
  }
  
  examAnswers[q.id] = [...selectedOptions];
  render();
}

function examNext() {
  if (currentIndex < examQuestions.length - 1) {
    currentIndex++;
    selectedOptions = new Set();
    render();
  } else {
    finishExam();
  }
}

function examPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    selectedOptions = new Set();
    render();
  }
}

function examGoTo(idx) {
  currentIndex = idx;
  selectedOptions = new Set();
  render();
}

function finishExam() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  examActive = false;
  
  // Calculate score
  let score = 0;
  let correctCount = 0;
  let details = { single: { total: 0, correct: 0 }, multi: { total: 0, correct: 0 }, judgment: { total: 0, correct: 0 } };
  
  examQuestions.forEach(q => {
    const selected = examAnswers[q.id] || [];
    let isCorrect = false;
    
    if (q.type === 'judgment') {
      const ans = selected.length === 1 ? (selected[0] === 0 ? '对' : '错') : '';
      isCorrect = ans === q.answer;
      if (isCorrect) score += 2;
    } else if (q.type === 'single') {
      const ans = selected.map(i => String.fromCharCode(65 + i)).join('');
      isCorrect = ans === q.answer;
      if (isCorrect) score += 2;
    } else {
      const ans = selected.map(i => String.fromCharCode(65 + i)).sort().join('');
      const correct = q.answer.split('').sort().join('');
      isCorrect = ans === correct;
      if (isCorrect) score += 4;
    }
    
    if (isCorrect) correctCount++;
    details[q.type].total++;
    if (isCorrect) details[q.type].correct++;
    
    // Record in state
    state.answers[q.id] = { selected, correct: isCorrect };
    if (!isCorrect) {
      if (!state.wrong.includes(q.id)) state.wrong.push(q.id);
      state.wrongCount[q.id] = (state.wrongCount[q.id] || 0) + 1;
    } else {
      state.wrong = state.wrong.filter(id => id !== q.id);
    }
  });
  
  const totalPossible = details.single.total * 2 + details.multi.total * 4 + details.judgment.total * 2;
  
  // Save exam history
  const now = new Date();
  state.examHistory.push({
    date: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    score,
    totalPossible,
    total: examQuestions.length,
    correct: correctCount,
    details
  });
  
  saveState(state);
  
  // Show result
  currentPage = 'examResult';
  render();
}

function renderExamResult(el) {
  const result = state.examHistory[state.examHistory.length - 1];
  const pct = Math.round(result.correct / result.total * 100);
  
  el.innerHTML = `
    <div class="fade-in exam-result">
      <div class="exam-score">${result.score}</div>
      <div class="exam-score-label">满分 100 分 · 正确率 ${pct}%</div>
      
      <div class="exam-detail-grid" style="margin-top:32px;">
        <div class="dash-card">
          <div class="num" style="color:var(--accent)">${result.details.single.correct}/${result.details.single.total}</div>
          <div class="label">单选题</div>
        </div>
        <div class="dash-card">
          <div class="num" style="color:var(--yellow)">${result.details.multi.correct}/${result.details.multi.total}</div>
          <div class="label">多选题</div>
        </div>
        <div class="dash-card">
          <div class="num" style="color:#a855f7">${result.details.judgment.correct}/${result.details.judgment.total}</div>
          <div class="label">判断题</div>
        </div>
      </div>
      
      <div style="margin-top:32px;display:flex;justify-content:center;gap:12px;">
        <button class="btn btn-primary" onclick="switchPage('dashboard')">返回首页</button>
        <button class="btn btn-secondary" onclick="reviewExam()">查看错题</button>
        <button class="btn btn-secondary" onclick="switchPage('exam')">再考一次</button>
      </div>
    </div>
  `;
}

function reviewExam() {
  switchPage('wrong');
}

// ==================== SETTINGS ====================
function renderSettings(el) {
  const s = getStats();
  el.innerHTML = `
    <div class="fade-in">
      <h2 style="margin-bottom:20px;font-size:22px;font-weight:700;">设置</h2>
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:8px;">数据管理</h3>
        <div class="setting-row">
          <div>
            <div style="font-size:14px;">清除做题记录</div>
            <div style="font-size:12px;color:var(--text3);">已完成 ${s.total} 题</div>
          </div>
          <button class="btn btn-secondary" onclick="clearAnswers()" style="font-size:13px;">清除</button>
        </div>
        <div class="setting-row">
          <div>
            <div style="font-size:14px;">清空错题本</div>
            <div style="font-size:12px;color:var(--text3);">${state.wrong.length} 道错题</div>
          </div>
          <button class="btn btn-secondary" onclick="clearWrong()" style="font-size:13px;">清空</button>
        </div>
        <div class="setting-row">
          <div>
            <div style="font-size:14px;">清空收藏夹</div>
            <div style="font-size:12px;color:var(--text3);">${state.favorites.length} 道收藏</div>
          </div>
          <button class="btn btn-secondary" onclick="clearFavorites()" style="font-size:13px;">清空</button>
        </div>
        <div class="setting-row">
          <div>
            <div style="font-size:14px;color:var(--red);">重置所有数据</div>
            <div style="font-size:12px;color:var(--text3);">清除所有记录、错题、收藏、考试历史</div>
          </div>
          <button class="btn btn-secondary" onclick="resetAll()" style="font-size:13px;color:var(--red);border-color:var(--red);">重置</button>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:8px;">关于</h3>
        <div style="font-size:14px;color:var(--text2);line-height:1.8;">
          <p>《个人信息保护合规审计人员-初中高级题库》刷题系统</p>
          <p>题库：单选 ${SINGLE.length} 题 · 多选 ${MULTI.length} 题 · 判断 ${JUDGMENT.length} 题 · 简答 ${OPEN_QUESTIONS.filter(q=>q.type==='short').length} 题 · 案例 ${OPEN_QUESTIONS.filter(q=>q.type==='case').length} 题</p>
          <p>客观题共 ${QUESTIONS.length} 题 · 主观题共 ${OPEN_QUESTIONS.length} 题 · 合计 ${QUESTIONS.length + OPEN_QUESTIONS.length} 题</p>
        </div>
      </div>
    </div>
  `;
}

// ==================== OPEN QUESTIONS PAGE ====================
let openQuestions = [];
let openIndex = 0;
let openHintVisible = false;
let openAnswerVisible = false;

function renderOpenPage(el) {
  const type = currentType; // 'short' or 'case'
  openQuestions = OPEN_QUESTIONS.filter(q => q.type === type);

  if (openQuestions.length === 0) {
    el.innerHTML = '<div class="card">暂无题目</div>';
    return;
  }

  // 保证 openIndex 合法
  if (openIndex >= openQuestions.length) openIndex = 0;

  const q = openQuestions[openIndex];
  const typeLabel = type === 'short' ? '简答题' : '案例分析';
  const total = openQuestions.length;

  el.innerHTML = `
    <div class="fade-in">
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-tag ${type === 'short' ? 'single' : 'multi'}">${typeLabel}</span>
          <span class="q-num">${openIndex + 1} / ${total}</span>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="open-question">${q.question.replace(/\n/g, '<br>')}</div>

        <div class="open-actions" style="margin-top:16px;">
          <button class="open-btn hint-btn ${openHintVisible ? 'active' : ''}"
            onclick="toggleOpen('hint')">
            ${openHintVisible ? '💡 收起提示' : '💡 关键提示'}
          </button>
          <button class="open-btn answer-btn ${openAnswerVisible ? 'active' : ''}"
            onclick="toggleOpen('answer')">
            ${openAnswerVisible ? '📋 收起答案' : '📋 查看答案'}
          </button>
        </div>

        ${openHintVisible ? `
        <div class="open-block" style="margin-top:12px;">
          <div class="open-block-label">💡 关键提示</div>
          <div class="open-block-content">${q.hint.replace(/\n/g, '<br>')}</div>
        </div>` : ''}

        ${openAnswerVisible ? `
        <div class="open-block answer-block" style="margin-top:12px;">
          <div class="open-block-label">📋 参考答案</div>
          <div class="open-block-content">${q.answer.replace(/\n/g, '<br>')}</div>
        </div>` : ''}
      </div>

      <div class="nav-btns">
        <button class="btn btn-secondary" onclick="openNav(-1)" ${openIndex === 0 ? 'disabled' : ''}>← 上一题</button>
        <button class="btn btn-primary" onclick="openNav(1)" ${openIndex === total - 1 ? 'disabled' : ''}>下一题 →</button>
      </div>

      <div class="q-grid">
        ${openQuestions.map((_, i) => `
          <div class="q-grid-item ${i === openIndex ? 'current' : ''}" onclick="openGoTo(${i})">${i + 1}</div>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleOpen(type) {
  if (type === 'hint') openHintVisible = !openHintVisible;
  else openAnswerVisible = !openAnswerVisible;
  render();
}

function openNav(dir) {
  openIndex = Math.max(0, Math.min(openQuestions.length - 1, openIndex + dir));
  openHintVisible = false;
  openAnswerVisible = false;
  render();
}

function openGoTo(i) {
  openIndex = i;
  openHintVisible = false;
  openAnswerVisible = false;
  render();
}

function clearAnswers() {
  if (confirm('确定清除所有做题记录？')) {
    state.answers = {};
    state.wrongCount = {};
    saveState(state);
    render();
  }
}

function clearWrong() {
  if (confirm('确定清空错题本？')) {
    state.wrong = [];
    state.wrongCount = {};
    saveState(state);
    render();
  }
}

function clearFavorites() {
  if (confirm('确定清空收藏夹？')) {
    state.favorites = [];
    saveState(state);
    render();
  }
}

function resetAll() {
  if (confirm('确定重置所有数据？此操作不可恢复！')) {
    state = { answers: {}, wrong: [], favorites: [], examHistory: [] };
    saveState(state);
    render();
  }
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  if (currentPage === 'examActive' || currentPage === 'practice' || currentPage === 'random' || currentPage === 'wrong' || currentPage === 'fav') {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      if (currentPage === 'examActive') examNext();
      else nextQuestion();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (currentPage === 'examActive') examPrev();
      else prevQuestion();
    } else if (['1','2','3','4','a','b','c','d','A','B','C','D'].includes(e.key)) {
      let idx;
      if ('1234'.includes(e.key)) idx = parseInt(e.key) - 1;
      else idx = e.key.toUpperCase().charCodeAt(0) - 65;
      
      if (idx >= 0 && idx < (currentQuestions[currentIndex]?.options?.length || 0)) {
        if (currentPage === 'examActive') examSelect(idx);
        else selectOption(idx, false);
      }
    }
  }
});

// ==================== INIT ====================
render();
</script>
